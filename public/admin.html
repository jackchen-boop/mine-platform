<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
    .tab-active { border-bottom: 2px solid #c9a96e; color: #c9a96e; }
    .tab-inactive { color: #64748b; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-mine-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-mine-gold/20 flex items-center justify-center border border-mine-gold/30"><span class="text-lg">⛏️</span></div>
          <span class="text-lg font-bold gold-gradient">矿资资本 · 管理后台</span>
        </a>
        <div class="flex items-center gap-3">
          <a href="/" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">首页</a>
          <a href="/live.html" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">直播</a>
          <button onclick="logout()" class="text-sm text-mine-danger hover:text-mine-danger/80 transition-colors">退出</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-20 pb-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-2xl font-bold mb-6">管理控制台</h1>

    <div id="summary-cards" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8"></div>

    <div class="flex gap-6 border-b border-mine-border mb-6 overflow-x-auto">
      <button class="tab-btn tab-active pb-3 text-sm font-medium whitespace-nowrap" data-tab="overview">概览</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="users">用户管理</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="projects">项目管理</button>
    </div>

    <div id="tab-overview" class="tab-content">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border">
          <h3 class="text-sm font-semibold mb-4">矿种分布</h3>
          <div id="mineral-dist" class="space-y-2"></div>
        </div>
        <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border">
          <h3 class="text-sm font-semibold mb-4">最新注册</h3>
          <div id="recent-users" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <div id="tab-users" class="tab-content hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-mine-border text-mine-text3"><th class="text-left py-3 px-4">ID</th><th class="text-left py-3 px-4">姓名</th><th class="text-left py-3 px-4">邮箱</th><th class="text-left py-3 px-4">角色</th><th class="text-left py-3 px-4">机构</th><th class="text-left py-3 px-4">状态</th></tr></thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-projects" class="tab-content hidden">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-sm font-semibold">项目列表</h3>
        <button onclick="toggleAddProject()" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight transition-colors">新增项目</button>
      </div>
      <div id="add-project-form" class="hidden p-5 rounded-2xl bg-mine-surface border border-mine-border mb-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <input type="text" id="new-code" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="项目编号" />
          <input type="text" id="new-name" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="项目名称" />
          <input type="text" id="new-mineral" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="矿种 (如 gold,copper)" />
          <input type="text" id="new-province" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="省份" />
          <input type="text" id="new-city" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="城市" />
          <input type="text" id="new-price" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="挂牌价" />
        </div>
        <textarea id="new-desc" rows="3" class="w-full mt-4 px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="项目描述"></textarea>
        <textarea id="new-desc-masked" rows="2" class="w-full mt-2 px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="脱敏描述（非会员可见）"></textarea>
        <div class="flex gap-2 mt-4">
          <button onclick="addProject()" class="px-6 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">保存</button>
          <button onclick="toggleAddProject()" class="px-6 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">取消</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-mine-border text-mine-text3"><th class="text-left py-3 px-4">编号</th><th class="text-left py-3 px-4">名称</th><th class="text-left py-3 px-4">矿种</th><th class="text-left py-3 px-4">地区</th><th class="text-left py-3 px-4">挂牌价</th><th class="text-left py-3 px-4">状态</th></tr></thead>
          <tbody id="projects-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('mine_token');
    if (!token) { window.location.href = '/auth.html'; }
    const user = JSON.parse(localStorage.getItem('mine_user') || '{}');
    if (user.role !== 'admin') { window.location.href = '/dashboard.html'; }

    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    function logout() { localStorage.removeItem('mine_token'); localStorage.removeItem('mine_user'); window.location.href = '/auth.html'; }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
        btn.classList.remove('tab-inactive'); btn.classList.add('tab-active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
      });
    });

    async function loadDashboard() {
      try {
        const res = await fetch('/api/admin/dashboard', { headers: authHeaders() });
        const data = await res.json();
        const s = data.summary || {};
        document.getElementById('summary-cards').innerHTML = `
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border"><div class="text-2xl font-bold gold-gradient">${s.userTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">注册用户</div></div>
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border"><div class="text-2xl font-bold gold-gradient">${s.projectTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">挂牌项目</div></div>
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border"><div class="text-2xl font-bold gold-gradient">${s.reportTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">AI分析</div></div>
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border"><div class="text-2xl font-bold gold-gradient">${s.inquiryTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">意向沟通</div></div>
        `;

        const md = document.getElementById('mineral-dist');
        md.innerHTML = (data.mineralDist || []).map(d => `
          <div class="flex items-center gap-3">
            <span class="text-xs text-mine-text2 w-20">${d.mineral_types}</span>
            <div class="flex-1 h-2 rounded-full bg-mine-surface2 overflow-hidden">
              <div class="h-full rounded-full bg-mine-gold" style="width:${Math.min(100, d.cnt * 20)}%"></div>
            </div>
            <span class="text-xs text-mine-text3">${d.cnt}</span>
          </div>
        `).join('');

        const ru = document.getElementById('recent-users');
        ru.innerHTML = (data.recentUsers || []).map(u => `
          <div class="flex items-center justify-between py-2 border-b border-mine-border last:border-0">
            <div>
              <span class="text-sm text-mine-text">${u.name}</span>
              <span class="text-xs text-mine-text3 ml-2">${u.email}</span>
            </div>
            <span class="text-xs px-2 py-0.5 rounded bg-mine-surface2 text-mine-text3">${u.role}</span>
          </div>
        `).join('');
      } catch (e) {}
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', { headers: authHeaders() });
        const data = await res.json();
        const tb = document.getElementById('users-table');
        tb.innerHTML = (data.users || []).map(u => `
          <tr class="border-b border-mine-border hover:bg-mine-surface2/50">
            <td class="py-3 px-4 text-mine-text3">${u.id}</td>
            <td class="py-3 px-4">${u.name}</td>
            <td class="py-3 px-4 text-mine-text2">${u.email}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded bg-mine-surface2 text-mine-text2">${u.role}</span></td>
            <td class="py-3 px-4 text-mine-text2">${u.organization || '-'}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded ${u.status === 'active' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-danger/20 text-mine-danger'}">${u.status}</span></td>
          </tr>
        `).join('');
      } catch (e) {}
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/admin/projects', { headers: authHeaders() });
        const data = await res.json();
        const tb = document.getElementById('projects-table');
        tb.innerHTML = (data.projects || []).map(p => `
          <tr class="border-b border-mine-border hover:bg-mine-surface2/50">
            <td class="py-3 px-4 text-mine-text3 font-mono">${p.code}</td>
            <td class="py-3 px-4">${p.name}</td>
            <td class="py-3 px-4 text-mine-text2">${p.mineral_types}</td>
            <td class="py-3 px-4 text-mine-text2">${p.province} ${p.city}</td>
            <td class="py-3 px-4 text-mine-gold">${p.asking_price || '-'}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded ${p.status === 'active' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-danger/20 text-mine-danger'}">${p.status}</span></td>
          </tr>
        `).join('');
      } catch (e) {}
    }

    function toggleAddProject() {
      document.getElementById('add-project-form').classList.toggle('hidden');
    }

    async function addProject() {
      const body = {
        code: document.getElementById('new-code').value,
        name: document.getElementById('new-name').value,
        mineral_types: document.getElementById('new-mineral').value,
        province: document.getElementById('new-province').value,
        city: document.getElementById('new-city').value,
        asking_price: document.getElementById('new-price').value,
        description: document.getElementById('new-desc').value,
        description_masked: document.getElementById('new-desc-masked').value,
      };
      try {
        const res = await fetch('/api/admin/projects', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { toggleAddProject(); loadProjects(); loadDashboard(); }
        else alert('保存失败');
      } catch (e) { alert('保存失败'); }
    }

    // Tab加载触发
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === 'users') loadUsers();
        if (btn.dataset.tab === 'projects') loadProjects();
      });
    });

    loadDashboard();
  </script>
</body>
</html>
