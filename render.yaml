services:
  - type: web
    name: vc-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: MINIMAX_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://vc-platform.onrender.com
