<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', warning: '#f59e0b',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
    .sidebar-item { display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;color:#94a3b8;font-size:14px;cursor:pointer;transition:all .2s; }
    .sidebar-item:hover { background:rgba(201,169,110,0.08);color:#c9a96e; }
    .sidebar-item.active { background:rgba(201,169,110,0.12);color:#c9a96e;border-right:2px solid #c9a96e; }
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center; }
    .modal-content { background:#12121a;border:1px solid #2a2a3a;border-radius:16px;max-width:560px;width:92%;max-height:90vh;overflow-y:auto;padding:24px; }
    .table-row:hover { background:rgba(26,26,38,0.5); }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:2px; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-mine-border">
    <div class="flex items-center justify-between h-14 px-4 lg:px-6">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-mine-gold/20 flex items-center justify-center border border-mine-gold/30 text-sm">⛏️</div>
        <span class="font-bold gold-gradient text-base">矿资资本 · 管理后台</span>
      </a>
      <div class="flex items-center gap-4">
        <span id="admin-name" class="text-sm text-mine-text2 hidden sm:inline"></span>
        <a href="/" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">首页</a>
        <button onclick="logout()" class="text-sm text-mine-danger hover:text-mine-danger/80 transition-colors">退出</button>
      </div>
    </div>
  </nav>

  <div class="flex pt-14 min-h-screen">
    <!-- Sidebar -->
    <aside class="w-52 border-r border-mine-border bg-mine-surface/50 hidden lg:block flex-shrink-0">
      <div class="p-3 space-y-1 sticky top-14">
        <div class="sidebar-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span class="text-lg">📊</span> 数据看板</div>
        <div class="sidebar-item" data-page="users" onclick="switchPage('users')"><span class="text-lg">👥</span> 用户管理</div>
        <div class="sidebar-item" data-page="workgroups" onclick="switchPage('workgroups')"><span class="text-lg">🛡️</span> 工作组管理</div>
        <div class="sidebar-item" data-page="projects" onclick="switchPage('projects')"><span class="text-lg">📁</span> 项目管理</div>
      </div>
    </aside>

    <!-- Mobile nav -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 z-50 bg-mine-surface border-t border-mine-border flex justify-around py-2">
      <button onclick="switchPage('dashboard')" class="text-xs text-mine-text2 flex flex-col items-center gap-1"><span class="text-lg">📊</span>看板</button>
      <button onclick="switchPage('users')" class="text-xs text-mine-text2 flex flex-col items-center gap-1"><span class="text-lg">👥</span>用户</button>
      <button onclick="switchPage('workgroups')" class="text-xs text-mine-text2 flex flex-col items-center gap-1"><span class="text-lg">🛡️</span>工作组</button>
      <button onclick="switchPage('projects')" class="text-xs text-mine-text2 flex flex-col items-center gap-1"><span class="text-lg">📁</span>项目</button>
    </div>

    <!-- Main content -->
    <main class="flex-1 p-4 lg:p-6 pb-20 lg:pb-6 max-w-6xl">

      <!-- ===== DASHBOARD ===== -->
      <div id="page-dashboard" class="page-section">
        <h1 class="text-xl font-bold mb-5">数据看板</h1>
        <div id="summary-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border">
            <h3 class="text-sm font-semibold mb-4">矿种分布</h3>
            <div id="mineral-dist" class="space-y-2"></div>
          </div>
          <div class="p-5 rounded-2xl bg-mine-surface border border-mine-border">
            <h3 class="text-sm font-semibold mb-4">最新注册</h3>
            <div id="recent-users" class="space-y-2"></div>
          </div>
        </div>
      </div>

      <!-- ===== USERS ===== -->
      <div id="page-users" class="page-section hidden">
        <div class="flex items-center justify-between mb-5">
          <h1 class="text-xl font-bold">用户管理</h1>
          <button onclick="openUserModal()" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">+ 新增用户</button>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-mine-border">
          <table class="w-full text-sm">
            <thead><tr class="bg-mine-surface2 text-mine-text3 text-xs uppercase"><th class="text-left py-3 px-4">ID</th><th class="text-left py-3 px-4">姓名</th><th class="text-left py-3 px-4">邮箱</th><th class="text-left py-3 px-4">角色</th><th class="text-left py-3 px-4">机构</th><th class="text-left py-3 px-4">状态</th><th class="text-right py-3 px-4">操作</th></tr></thead>
            <tbody id="users-table"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== WORKGROUPS ===== -->
      <div id="page-workgroups" class="page-section hidden">
        <div class="flex items-center justify-between mb-5">
          <h1 class="text-xl font-bold">工作组管理</h1>
          <button onclick="openWorkgroupModal()" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">+ 新增工作组</button>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-mine-border">
          <table class="w-full text-sm">
            <thead><tr class="bg-mine-surface2 text-mine-text3 text-xs uppercase"><th class="text-left py-3 px-4">ID</th><th class="text-left py-3 px-4">名称</th><th class="text-left py-3 px-4">代码</th><th class="text-left py-3 px-4">负责人</th><th class="text-left py-3 px-4">成员数</th><th class="text-left py-3 px-4">状态</th><th class="text-right py-3 px-4">操作</th></tr></thead>
            <tbody id="workgroups-table"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== PROJECTS ===== -->
      <div id="page-projects" class="page-section hidden">
        <div class="flex items-center justify-between mb-5">
          <h1 class="text-xl font-bold">项目管理</h1>
          <button onclick="openProjectModal()" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">+ 新增项目</button>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-mine-border">
          <table class="w-full text-sm">
            <thead><tr class="bg-mine-surface2 text-mine-text3 text-xs uppercase"><th class="text-left py-3 px-4">编号</th><th class="text-left py-3 px-4">名称</th><th class="text-left py-3 px-4">矿种</th><th class="text-left py-3 px-4">地区</th><th class="text-left py-3 px-4">优先级</th><th class="text-left py-3 px-4">状态</th><th class="text-right py-3 px-4">操作</th></tr></thead>
            <tbody id="projects-table"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- ===== MODALS ===== -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('mine_token');
    if (!token) { window.location.href = '/auth.html'; }
    const user = JSON.parse(localStorage.getItem('mine_user') || '{}');
    if (user.role !== 'admin') { window.location.href = '/dashboard.html'; }
    document.getElementById('admin-name').textContent = user.name || '管理员';

    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
    function logout() { localStorage.removeItem('mine_token'); localStorage.removeItem('mine_user'); window.location.href = '/auth.html'; }
    function showToast(msg) { const t = document.createElement('div'); t.className = 'fixed top-20 right-4 z-50 px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-gold/30 text-mine-gold text-sm'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

    // ===== Page Switching =====
    function switchPage(page) {
      document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
      document.getElementById('page-' + page).classList.remove('hidden');
      document.querySelectorAll('.sidebar-item').forEach(i => { i.classList.remove('active'); if (i.dataset.page === page) i.classList.add('active'); });
      if (page === 'dashboard') loadDashboard();
      if (page === 'users') loadUsers();
      if (page === 'workgroups') loadWorkgroups();
      if (page === 'projects') loadProjects();
    }

    // ===== Modal =====
    function openModal(html) { document.getElementById('modal-body').innerHTML = html; document.getElementById('modal-overlay').classList.remove('hidden'); }
    function closeModal(e) { if (!e || e.target.id === 'modal-overlay') document.getElementById('modal-overlay').classList.add('hidden'); }

    // ===== DASHBOARD =====
    async function loadDashboard() {
      try {
        const res = await fetch('/api/admin/dashboard', { headers: authHeaders() });
        const data = await res.json();
        const s = data.summary || {};
        document.getElementById('summary-cards').innerHTML = `
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.userTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">用户</div></div>
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.workgroupTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">工作组</div></div>
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.projectTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">项目</div></div>
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.reportTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">AI分析</div></div>
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.inquiryTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">意向沟通</div></div>
          <div class="p-4 rounded-xl bg-mine-surface border border-mine-border text-center"><div class="text-xl font-bold gold-gradient">${s.mineReportTotal || 0}</div><div class="text-xs text-mine-text3 mt-1">上传报告</div></div>
        `;
        document.getElementById('mineral-dist').innerHTML = (data.mineralDist || []).map(d => `
          <div class="flex items-center gap-3"><span class="text-xs text-mine-text2 w-20">${d.mineral_types}</span>
          <div class="flex-1 h-2 rounded-full bg-mine-surface2 overflow-hidden"><div class="h-full rounded-full bg-mine-gold" style="width:${Math.min(100, d.cnt * 15)}%"></div></div>
          <span class="text-xs text-mine-text3 w-6 text-right">${d.cnt}</span></div>
        `).join('');
        document.getElementById('recent-users').innerHTML = (data.recentUsers || []).map(u => `
          <div class="flex items-center justify-between py-2 border-b border-mine-border last:border-0">
            <div><span class="text-sm text-mine-text">${u.name}</span><span class="text-xs text-mine-text3 ml-2">${u.email}</span></div>
            <span class="text-xs px-2 py-0.5 rounded bg-mine-surface2 text-mine-text3">${u.role}</span>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    // ===== USERS =====
    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', { headers: authHeaders() });
        const data = await res.json();
        const tb = document.getElementById('users-table');
        tb.innerHTML = (data.users || []).map(u => `
          <tr class="table-row border-b border-mine-border">
            <td class="py-3 px-4 text-mine-text3">${u.id}</td>
            <td class="py-3 px-4 font-medium">${u.name}</td>
            <td class="py-3 px-4 text-mine-text2">${u.email}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded bg-mine-surface2 text-mine-text2">${u.role}</span></td>
            <td class="py-3 px-4 text-mine-text2">${u.organization || '-'}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded ${u.status === 'active' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-danger/20 text-mine-danger'}">${u.status}</span></td>
            <td class="py-3 px-4 text-right">
              <button onclick="openUserModal(${u.id}, '${u.name}', '${u.email}', '${u.phone || ''}', '${u.role}', '${u.org_type}', '${u.organization || ''}', '${u.status}')" class="text-xs text-mine-gold hover:underline mr-3">编辑</button>
              <button onclick="openResetPwdModal(${u.id}, '${u.name}')" class="text-xs text-mine-warning hover:underline mr-3">重置密码</button>
              ${u.id !== 1 ? `<button onclick="deleteUser(${u.id}, '${u.name}')" class="text-xs text-mine-danger hover:underline">删除</button>` : '<span class="text-xs text-mine-text3">-</span>'}
            </td>
          </tr>
        `).join('');
      } catch (e) { console.error(e); }
    }

    function openUserModal(id, name, email, phone, role, org_type, organization, status) {
      const isEdit = !!id;
      openModal(`
        <h2 class="text-lg font-bold mb-4">${isEdit ? '编辑用户' : '新增用户'}</h2>
        <div class="space-y-3">
          <div><label class="text-xs text-mine-text3 block mb-1">姓名 *</label><input id="u-name" value="${isEdit ? name : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          <div><label class="text-xs text-mine-text3 block mb-1">邮箱 *</label><input id="u-email" value="${isEdit ? email : ''}" ${isEdit ? 'disabled' : ''} class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm ${isEdit ? 'opacity-50' : ''}" /></div>
          ${!isEdit ? '<div><label class="text-xs text-mine-text3 block mb-1">密码 *（至少8位）</label><input id="u-password" type="password" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>' : ''}
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">角色</label>
              <select id="u-role" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                <option value="investor" ${role === 'investor' ? 'selected' : ''}>投资人</option>
                <option value="mine_enterprise" ${role === 'mine_enterprise' ? 'selected' : ''}>矿企</option>
                <option value="admin" ${role === 'admin' ? 'selected' : ''}>管理员</option>
              </select>
            </div>
            <div><label class="text-xs text-mine-text3 block mb-1">状态</label>
              <select id="u-status" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                <option value="active" ${status === 'active' ? 'selected' : ''}>正常</option>
                <option value="inactive" ${status === 'inactive' ? 'selected' : ''}>禁用</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">手机号</label><input id="u-phone" value="${isEdit ? phone : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
            <div><label class="text-xs text-mine-text3 block mb-1">机构名称</label><input id="u-organization" value="${isEdit ? organization : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="${isEdit ? `saveUser(${id})` : 'createUser()'}" class="flex-1 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">保存</button>
          <button onclick="closeModal()" class="flex-1 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">取消</button>
        </div>
      `);
    }

    async function createUser() {
      const body = {
        name: document.getElementById('u-name').value,
        email: document.getElementById('u-email').value,
        password: document.getElementById('u-password').value,
        phone: document.getElementById('u-phone').value,
        role: document.getElementById('u-role').value,
        organization: document.getElementById('u-organization').value,
      };
      try {
        const res = await fetch('/api/admin/users', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadUsers(); loadDashboard(); showToast('用户已创建'); }
        else { const d = await res.json(); alert(d.error || '创建失败'); }
      } catch (e) { alert('创建失败'); }
    }

    async function saveUser(id) {
      const body = {
        name: document.getElementById('u-name').value,
        role: document.getElementById('u-role').value,
        status: document.getElementById('u-status').value,
        phone: document.getElementById('u-phone').value,
        organization: document.getElementById('u-organization').value,
      };
      try {
        const res = await fetch('/api/admin/users/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadUsers(); loadDashboard(); showToast('用户已更新'); }
        else { const d = await res.json(); alert(d.error || '更新失败'); }
      } catch (e) { alert('更新失败'); }
    }

    function openResetPwdModal(id, name) {
      openModal(`
        <h2 class="text-lg font-bold mb-2">重置密码</h2>
        <p class="text-sm text-mine-text2 mb-4">为 <b>${name}</b> 设置新密码：</p>
        <input id="pwd-new" type="password" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm mb-4" placeholder="新密码（至少8位）" />
        <div class="flex gap-3">
          <button onclick="resetPassword(${id})" class="flex-1 py-2 rounded-lg bg-mine-warning text-mine-bg text-sm font-medium">确认重置</button>
          <button onclick="closeModal()" class="flex-1 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">取消</button>
        </div>
      `);
    }

    async function resetPassword(id) {
      const pwd = document.getElementById('pwd-new').value;
      if (!pwd || pwd.length < 8) { alert('密码至少8位'); return; }
      try {
        const res = await fetch('/api/admin/users/' + id + '/password', { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ password: pwd }) });
        if (res.ok) { closeModal(); showToast('密码已重置'); }
        else { const d = await res.json(); alert(d.error || '重置失败'); }
      } catch (e) { alert('重置失败'); }
    }

    async function deleteUser(id, name) {
      if (!confirm('确认删除用户 "' + name + '"？此操作不可恢复。')) return;
      try {
        const res = await fetch('/api/admin/users/' + id, { method: 'DELETE', headers: authHeaders() });
        if (res.ok) { loadUsers(); loadDashboard(); showToast('用户已删除'); }
        else { const d = await res.json(); alert(d.error || '删除失败'); }
      } catch (e) { alert('删除失败'); }
    }

    // ===== WORKGROUPS =====
    async function loadWorkgroups() {
      try {
        const res = await fetch('/api/admin/workgroups', { headers: authHeaders() });
        const data = await res.json();
        const tb = document.getElementById('workgroups-table');
        tb.innerHTML = (data.workgroups || []).map(wg => `
          <tr class="table-row border-b border-mine-border">
            <td class="py-3 px-4 text-mine-text3">${wg.id}</td>
            <td class="py-3 px-4 font-medium">${wg.name}</td>
            <td class="py-3 px-4 text-mine-text2 font-mono text-xs">${wg.code}</td>
            <td class="py-3 px-4 text-mine-text2">${wg.owner_name || '-'}</td>
            <td class="py-3 px-4">${wg.member_count || 0}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded ${wg.status === 'active' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-danger/20 text-mine-danger'}">${wg.status}</span></td>
            <td class="py-3 px-4 text-right">
              <button onclick="openWorkgroupMembersModal(${wg.id}, '${wg.name}')" class="text-xs text-mine-info hover:underline mr-3">成员</button>
              <button onclick="openWorkgroupModal(${wg.id}, '${wg.name}', '${wg.description || ''}', '${wg.status}')" class="text-xs text-mine-gold hover:underline mr-3">编辑</button>
              <button onclick="deleteWorkgroup(${wg.id}, '${wg.name}')" class="text-xs text-mine-danger hover:underline">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) { console.error(e); }
    }

    function openWorkgroupModal(id, name, description, status) {
      const isEdit = !!id;
      openModal(`
        <h2 class="text-lg font-bold mb-4">${isEdit ? '编辑工作组' : '新增工作组'}</h2>
        <div class="space-y-3">
          <div><label class="text-xs text-mine-text3 block mb-1">名称 *</label><input id="wg-name" value="${isEdit ? name : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          <div><label class="text-xs text-mine-text3 block mb-1">描述</label><textarea id="wg-desc" rows="2" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">${isEdit ? description : ''}</textarea></div>
          ${isEdit ? `<div><label class="text-xs text-mine-text3 block mb-1">状态</label>
            <select id="wg-status" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
              <option value="active" ${status === 'active' ? 'selected' : ''}>正常</option>
              <option value="inactive" ${status === 'inactive' ? 'selected' : ''}>禁用</option>
            </select>
          </div>` : ''}
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="${isEdit ? `saveWorkgroup(${id})` : 'createWorkgroup()'}" class="flex-1 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">保存</button>
          <button onclick="closeModal()" class="flex-1 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">取消</button>
        </div>
      `);
    }

    async function createWorkgroup() {
      const body = { name: document.getElementById('wg-name').value, description: document.getElementById('wg-desc').value };
      try {
        const res = await fetch('/api/admin/workgroups', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadWorkgroups(); loadDashboard(); showToast('工作组已创建'); }
        else { const d = await res.json(); alert(d.error || '创建失败'); }
      } catch (e) { alert('创建失败'); }
    }

    async function saveWorkgroup(id) {
      const body = { name: document.getElementById('wg-name').value, description: document.getElementById('wg-desc').value };
      if (document.getElementById('wg-status')) body.status = document.getElementById('wg-status').value;
      try {
        const res = await fetch('/api/admin/workgroups/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadWorkgroups(); showToast('工作组已更新'); }
        else { const d = await res.json(); alert(d.error || '更新失败'); }
      } catch (e) { alert('更新失败'); }
    }

    async function deleteWorkgroup(id, name) {
      if (!confirm('确认删除工作组 "' + name + '"？成员关系将一并清除。')) return;
      try {
        const res = await fetch('/api/admin/workgroups/' + id, { method: 'DELETE', headers: authHeaders() });
        if (res.ok) { loadWorkgroups(); loadDashboard(); showToast('工作组已删除'); }
        else { const d = await res.json(); alert(d.error || '删除失败'); }
      } catch (e) { alert('删除失败'); }
    }

    // Workgroup Members Modal
    async function openWorkgroupMembersModal(wgId, wgName) {
      try {
        const res = await fetch('/api/admin/workgroups/' + wgId, { headers: authHeaders() });
        const data = await res.json();
        const members = data.members || [];
        // 获取所有用户用于添加
        const usersRes = await fetch('/api/admin/users', { headers: authHeaders() });
        const usersData = await usersRes.json();
        const allUsers = (usersData.users || []).filter(u => u.status === 'active');
        const memberIds = new Set(members.map(m => m.user_id));
        const availableUsers = allUsers.filter(u => !memberIds.has(u.id));

        openModal(`
          <h2 class="text-lg font-bold mb-1">${wgName}</h2>
          <p class="text-xs text-mine-text3 mb-4">成员管理</p>
          <div class="space-y-2 max-h-60 overflow-y-auto mb-4">
            ${members.length === 0 ? '<p class="text-sm text-mine-text3">暂无成员</p>' : members.map(m => `
              <div class="flex items-center justify-between py-2 border-b border-mine-border last:border-0">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 rounded-full bg-mine-surface2 flex items-center justify-center text-sm border border-mine-border">${m.name.charAt(0)}</div>
                  <div><div class="text-sm">${m.name}</div><div class="text-xs text-mine-text3">${m.email}</div></div>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-xs px-2 py-0.5 rounded bg-mine-surface2 text-mine-text2">${m.member_role}</span>
                  <button onclick="removeWorkgroupMember(${wgId}, ${m.user_id}, '${m.name}')" class="text-xs text-mine-danger hover:underline">移除</button>
                </div>
              </div>
            `).join('')}
          </div>
          ${availableUsers.length > 0 ? `
            <div class="border-t border-mine-border pt-4">
              <p class="text-xs text-mine-text3 mb-2">添加成员</p>
              <div class="flex gap-2">
                <select id="wg-add-user" class="flex-1 px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                  <option value="">选择用户...</option>
                  ${availableUsers.map(u => `<option value="${u.id}">${u.name} (${u.email})</option>`).join('')}
                </select>
                <select id="wg-add-role" class="w-24 px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                  <option value="member">成员</option>
                  <option value="analyst">分析师</option>
                  <option value="bd">BD</option>
                </select>
                <button onclick="addWorkgroupMember(${wgId})" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium">添加</button>
              </div>
            </div>
          ` : '<p class="text-xs text-mine-text3">所有用户已加入</p>'}
          <div class="mt-4 text-center"><button onclick="closeModal()" class="px-6 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">关闭</button></div>
        `);
      } catch (e) { alert('加载失败'); }
    }

    async function addWorkgroupMember(wgId) {
      const userId = document.getElementById('wg-add-user').value;
      const role = document.getElementById('wg-add-role').value;
      if (!userId) { alert('请选择用户'); return; }
      try {
        const res = await fetch('/api/admin/workgroups/' + wgId + '/members', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ user_id: parseInt(userId), role }) });
        if (res.ok) { showToast('成员已添加'); await openWorkgroupMembersModal(wgId, ''); }
        else { const d = await res.json(); alert(d.error || '添加失败'); }
      } catch (e) { alert('添加失败'); }
    }

    async function removeWorkgroupMember(wgId, userId, name) {
      if (!confirm('确认移除成员 "' + name + '"？')) return;
      try {
        const res = await fetch('/api/admin/workgroups/' + wgId + '/members/' + userId, { method: 'DELETE', headers: authHeaders() });
        if (res.ok) { showToast('成员已移除'); await openWorkgroupMembersModal(wgId, ''); }
        else { const d = await res.json(); alert(d.error || '移除失败'); }
      } catch (e) { alert('移除失败'); }
    }

    // ===== PROJECTS =====
    async function loadProjects() {
      try {
        const res = await fetch('/api/admin/projects', { headers: authHeaders() });
        const data = await res.json();
        const tb = document.getElementById('projects-table');
        tb.innerHTML = (data.projects || []).map(p => `
          <tr class="table-row border-b border-mine-border">
            <td class="py-3 px-4 text-mine-text3 font-mono text-xs">${p.code || '-'}</td>
            <td class="py-3 px-4 font-medium">${p.name}</td>
            <td class="py-3 px-4 text-mine-text2">${p.mineral_types || '-'}</td>
            <td class="py-3 px-4 text-mine-text2">${p.province || ''} ${p.city || ''}</td>
            <td class="py-3 px-4">${p.priority_level ? '<span class="text-xs px-2 py-0.5 rounded font-bold ' + getPriorityClass(p.priority_level) + '">' + p.priority_level + '</span>' : '<span class="text-xs text-mine-text3">-</span>'}</td>
            <td class="py-3 px-4"><span class="text-xs px-2 py-0.5 rounded ${p.status === 'active' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-danger/20 text-mine-danger'}">${p.status}</span></td>
            <td class="py-3 px-4 text-right">
              <button onclick="openProjectModal(${p.id}, '${p.name}', '${p.code || ''}', '${p.mineral_types || ''}', '${p.province || ''}', '${p.city || ''}', '${p.asking_price || ''}', '${p.status}', '${p.priority_level || ''}')" class="text-xs text-mine-gold hover:underline mr-3">编辑</button>
              <button onclick="deleteProject(${p.id}, '${p.name}')" class="text-xs text-mine-danger hover:underline">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) { console.error(e); }
    }

    function getPriorityClass(lvl) {
      return lvl === 'S' ? 'bg-red-500/20 text-red-400' : lvl === 'A' ? 'bg-orange-500/20 text-orange-400' : lvl === 'B' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-mine-surface2 text-mine-text3';
    }

    function openProjectModal(id, name, code, mineral, province, city, price, status, priority) {
      const isEdit = !!id;
      openModal(`
        <h2 class="text-lg font-bold mb-4">${isEdit ? '编辑项目' : '新增项目'}</h2>
        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">项目编号</label><input id="p-code" value="${isEdit ? code : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
            <div><label class="text-xs text-mine-text3 block mb-1">项目名称 *</label><input id="p-name" value="${isEdit ? name : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">矿种</label><input id="p-mineral" value="${isEdit ? mineral : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" placeholder="如 gold,copper" /></div>
            <div><label class="text-xs text-mine-text3 block mb-1">挂牌价</label><input id="p-price" value="${isEdit ? price : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">省份</label><input id="p-province" value="${isEdit ? province : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
            <div><label class="text-xs text-mine-text3 block mb-1">城市</label><input id="p-city" value="${isEdit ? city : ''}" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" /></div>
          </div>
          ${isEdit ? `<div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-mine-text3 block mb-1">状态</label>
              <select id="p-status" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                <option value="active" ${status === 'active' ? 'selected' : ''}>正常</option>
                <option value="inactive" ${status === 'inactive' ? 'selected' : ''}>禁用</option>
              </select>
            </div>
            <div><label class="text-xs text-mine-text3 block mb-1">优先级</label>
              <select id="p-priority" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm">
                <option value="" ${!priority ? 'selected' : ''}>-</option>
                <option value="S" ${priority === 'S' ? 'selected' : ''}>S</option>
                <option value="A" ${priority === 'A' ? 'selected' : ''}>A</option>
                <option value="B" ${priority === 'B' ? 'selected' : ''}>B</option>
                <option value="C" ${priority === 'C' ? 'selected' : ''}>C</option>
              </select>
            </div>
          </div>` : ''}
          <div><label class="text-xs text-mine-text3 block mb-1">项目描述</label><textarea id="p-desc" rows="3" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm"></textarea></div>
          <div><label class="text-xs text-mine-text3 block mb-1">脱敏描述</label><textarea id="p-desc-masked" rows="2" class="w-full px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-sm" placeholder="非会员可见的脱敏版本"></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="${isEdit ? `saveProject(${id})` : 'createProject()'}" class="flex-1 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">保存</button>
          <button onclick="closeModal()" class="flex-1 py-2 rounded-lg border border-mine-border text-mine-text2 text-sm hover:border-mine-gold/40">取消</button>
        </div>
      `);
    }

    async function createProject() {
      const body = {
        code: document.getElementById('p-code').value,
        name: document.getElementById('p-name').value,
        mineral_types: document.getElementById('p-mineral').value,
        province: document.getElementById('p-province').value,
        city: document.getElementById('p-city').value,
        asking_price: document.getElementById('p-price').value,
        description: document.getElementById('p-desc').value,
        description_masked: document.getElementById('p-desc-masked').value,
      };
      try {
        const res = await fetch('/api/admin/projects', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadProjects(); loadDashboard(); showToast('项目已创建'); }
        else { const d = await res.json(); alert(d.error || '创建失败'); }
      } catch (e) { alert('创建失败'); }
    }

    async function saveProject(id) {
      const body = {
        name: document.getElementById('p-name').value,
        code: document.getElementById('p-code').value,
        mineral_types: document.getElementById('p-mineral').value,
        province: document.getElementById('p-province').value,
        city: document.getElementById('p-city').value,
        asking_price: document.getElementById('p-price').value,
        description: document.getElementById('p-desc').value,
        description_masked: document.getElementById('p-desc-masked').value,
      };
      if (document.getElementById('p-status')) body.status = document.getElementById('p-status').value;
      if (document.getElementById('p-priority')) body.priority_level = document.getElementById('p-priority').value;
      try {
        const res = await fetch('/api/admin/projects/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadProjects(); showToast('项目已更新'); }
        else { const d = await res.json(); alert(d.error || '更新失败'); }
      } catch (e) { alert('更新失败'); }
    }

    async function deleteProject(id, name) {
      if (!confirm('确认删除项目 "' + name + '"？此操作不可恢复。')) return;
      try {
        const res = await fetch('/api/admin/projects/' + id, { method: 'DELETE', headers: authHeaders() });
        if (res.ok) { loadProjects(); loadDashboard(); showToast('项目已删除'); }
        else { const d = await res.json(); alert(d.error || '删除失败'); }
      } catch (e) { alert('删除失败'); }
    }

    // Init
    loadDashboard();
  </script>
</body>
</html>
