<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会员中心 — 矿脉科技 MinePulse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', info: '#3b82f6',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(201,169,110,0.1); }
    input:focus, textarea:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
    .mineral-tag { background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.25); }
    .tab-active { border-bottom: 2px solid #c9a96e; color: #c9a96e; }
    .tab-inactive { color: #64748b; }
    .tab-inactive:hover { color: #94a3b8; }
  </style>
</head>
<body class="min-h-screen">
  <main class="pt-20 pb-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- 用户信息 -->
    <div class="mb-8 p-6 rounded-2xl bg-mine-surface border border-mine-border">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-mine-gold/20 flex items-center justify-center text-2xl font-bold text-mine-gold border border-mine-gold/30" id="user-avatar"></div>
        <div class="flex-1">
          <h1 class="text-xl font-bold mb-1" id="dashboard-name">加载中...</h1>
          <p class="text-sm text-mine-text2" id="dashboard-org">加载中...</p>
        </div>
        <div class="flex gap-2">
          <span id="role-badge" class="px-3 py-1 text-xs rounded-full mineral-tag text-mine-gold"></span>
        </div>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="flex gap-6 border-b border-mine-border mb-6 overflow-x-auto">
      <button class="tab-btn tab-active pb-3 text-sm font-medium whitespace-nowrap" data-tab="projects">项目浏览</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="favorites">我的关注</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="inquiries">意向沟通</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="ai">AI分析</button>
      <button class="tab-btn tab-inactive pb-3 text-sm font-medium whitespace-nowrap" data-tab="reports">报告上传</button>
    </div>

    <!-- 项目浏览 -->
    <div id="tab-projects" class="tab-content">
      <div class="flex flex-wrap gap-3 mb-6">
        <input type="text" id="search-input" class="flex-1 min-w-[200px] px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="搜索项目名称、编号、地区..." />
        <select id="filter-mineral" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm">
          <option value="">全部矿种</option>
          <option value="gold">金矿</option>
          <option value="silver">银矿</option>
          <option value="copper">铜矿</option>
        </select>
        <select id="filter-stage" class="px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm">
          <option value="">全部阶段</option>
          <option value="general-exploration">普查</option>
          <option value="detailed-exploration">详查</option>
          <option value="production-ready">待产</option>
        </select>
      </div>
      <div id="dashboard-projects" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- 我的关注 -->
    <div id="tab-favorites" class="tab-content hidden">
      <div id="favorites-list" class="space-y-4"></div>
    </div>

    <!-- 意向沟通 -->
    <div id="tab-inquiries" class="tab-content hidden">
      <div id="inquiries-list" class="space-y-4"></div>
    </div>

    <!-- AI分析 -->
    <div id="tab-ai" class="tab-content hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
          <h3 class="text-lg font-semibold mb-4">AI矿权分析</h3>
          <textarea id="ai-input" rows="6" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm mb-4" placeholder="粘贴报告内容或描述项目情况，AI将为您分析..."></textarea>
          <button onclick="runAIAnalysis()" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">开始分析</button>
          <div id="ai-result" class="mt-4 hidden"></div>
        </div>
        <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
          <h3 class="text-lg font-semibold mb-4">AI咨询对话</h3>
          <div id="chat-history" class="h-64 overflow-y-auto space-y-3 mb-4 p-3 rounded-lg bg-mine-surface2 border border-mine-border"></div>
          <div class="flex gap-2">
            <input type="text" id="chat-input" class="flex-1 px-4 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="输入您的问题..." />
            <button onclick="sendChat()" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">发送</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 报告上传 -->
    <div id="tab-reports" class="tab-content hidden">
      <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold">上传矿权报告</h3>
          <a href="/upload.html" class="px-4 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight transition-colors">专业上传页面 →</a>
        </div>
        <p class="text-xs text-mine-text3 mb-4">推荐使用专业上传页面，包含完整资料清单引导，资料越完整AI分析越精准</p>
        <div class="border-2 border-dashed border-mine-border rounded-xl p-8 text-center mb-4">
          <div class="w-12 h-12 rounded-lg bg-mine-gold/15 flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-mine-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
          </div>
          <p class="text-sm text-mine-text2 mb-2">拖拽或点击上传报告文件</p>
          <p class="text-xs text-mine-text3">支持 PDF、Word、图片格式</p>
          <input type="file" id="report-file" class="hidden" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" />
          <button onclick="document.getElementById('report-file').click()" class="mt-4 px-6 py-2 rounded-lg border border-mine-gold/40 text-mine-gold text-sm hover:bg-mine-gold/10 transition-colors">选择文件</button>
        </div>
        <div id="report-list" class="space-y-3"></div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('mine_token');
    if (!token) { window.location.href = '/auth.html'; }

    function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

    async function loadUser() {
      try {
        const res = await fetch('/api/auth/me', { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { logout(); return; }
        const u = data.user;
        document.getElementById('user-name').textContent = u.name;
        document.getElementById('dashboard-name').textContent = u.name;
        document.getElementById('dashboard-org').textContent = (u.organization || '未填写机构') + ' · ' + (u.email || '');
        document.getElementById('user-avatar').textContent = u.avatar_letter || u.name.charAt(0);
        document.getElementById('role-badge').textContent = u.role === 'investor' ? '投资机构' : u.role === 'mine_enterprise' ? '矿业企业' : u.role;
      } catch (e) { logout(); }
    }

    function logout() {
      localStorage.removeItem('mine_token');
      localStorage.removeItem('mine_user');
      window.location.href = '/auth.html';
    }

    // Tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
        btn.classList.remove('tab-inactive'); btn.classList.add('tab-active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
        if (btn.dataset.tab === 'projects') loadDashboardProjects();
        if (btn.dataset.tab === 'inquiries') loadInquiries();
        if (btn.dataset.tab === 'reports') loadReports();
      });
    });

    async function loadDashboardProjects() {
      const keyword = document.getElementById('search-input').value;
      const mineral = document.getElementById('filter-mineral').value;
      const stage = document.getElementById('filter-stage').value;
      let url = '/api/mine-projects?limit=50';
      if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
      if (mineral) url += '&mineral=' + mineral;
      if (stage) url += '&stage=' + stage;

      try {
        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const grid = document.getElementById('dashboard-projects');
        grid.innerHTML = '';

        const mineralLabels = { gold: '金矿', silver: '银矿', copper: '铜矿', lead: '铅矿', zinc: '锌矿' };
        const stageLabels = { 'general-exploration': '普查', 'detailed-exploration': '详查', 'prospecting': '勘探', 'feasibility': '可研', 'production-ready': '待产', 'production': '生产中' };

        data.projects.forEach(p => {
          const minerals = p.mineral_types.split(',').map(m => mineralLabels[m] || m).join(' · ');
          const div = document.createElement('div');
          div.className = 'p-5 rounded-2xl bg-mine-surface border border-mine-border card-hover cursor-pointer';
          div.innerHTML = `
            <div class="flex items-center justify-between mb-3">
              <span class="text-xs text-mine-text3 font-mono">${p.code}</span>
              <span class="text-xs px-2 py-0.5 rounded mineral-tag text-mine-gold">${stageLabels[p.development_stage] || p.development_stage}</span>
            </div>
            <h3 class="text-base font-semibold mb-2">${p.name}</h3>
            <p class="text-xs text-mine-text3 mb-1">${p.province} · ${p.city} · ${minerals}</p>
            <p class="text-sm text-mine-text2 mb-3 line-clamp-2">${p.description || p.description_masked}</p>
            <div class="flex items-center justify-between pt-3 border-t border-mine-border">
              <div>
                <div class="text-xs text-mine-text3">挂牌价</div>
                <div class="text-base font-bold gold-gradient">${p.asking_price}</div>
              </div>
              <div class="flex gap-2">
                <button onclick="event.stopPropagation(); showInquiryModal(${p.id}, '${p.name}')" class="px-3 py-1.5 text-xs rounded-lg bg-mine-gold/10 text-mine-gold border border-mine-gold/30 hover:bg-mine-gold/20">意向沟通</button>
              </div>
            </div>
          `;
          div.addEventListener('click', () => window.location.href = '/project-detail.html?id=' + p.id);
          grid.appendChild(div);
        });
      } catch (e) {}
    }

    async function loadInquiries() {
      try {
        const res = await fetch('/api/mine-inquiries', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const list = document.getElementById('inquiries-list');
        list.innerHTML = '';
        if (!data.inquiries || data.inquiries.length === 0) {
          list.innerHTML = '<p class="text-sm text-mine-text3 text-center py-8">暂无意向沟通记录</p>'; return;
        }
        data.inquiries.forEach(i => {
          const div = document.createElement('div');
          div.className = 'p-4 rounded-xl bg-mine-surface border border-mine-border';
          const statusMap = { pending: '待处理', accepted: '已通过', rejected: '已拒绝' };
          const statusColor = { pending: 'text-mine-gold', accepted: 'text-mine-success', rejected: 'text-mine-danger' };
          div.innerHTML = `
            <div class="flex items-center justify-between mb-2">
              <span class="font-medium text-sm">${i.project_name || '未知项目'}</span>
              <span class="text-xs ${statusColor[i.status] || 'text-mine-text3'}">${statusMap[i.status] || i.status}</span>
            </div>
            <p class="text-xs text-mine-text3 mb-1">${i.project_code || ''}</p>
            ${i.budget ? `<p class="text-xs text-mine-text2 mb-1">预算: ${i.budget}</p>` : ''}
            ${i.message ? `<p class="text-xs text-mine-text2">${i.message}</p>` : ''}
          `;
          list.appendChild(div);
        });
      } catch (e) {}
    }

    async function loadReports() {
      try {
        const res = await fetch('/api/mine-reports', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const list = document.getElementById('report-list');
        list.innerHTML = '';
        const typeMap = { exploration: '勘查报告', reserve: '储量报告', feasibility: '可研报告', filing: '备案报告' };
        (data.reports || []).forEach(r => {
          const div = document.createElement('div');
          div.className = 'p-3 rounded-lg bg-mine-surface2 border border-mine-border flex items-center justify-between';
          div.innerHTML = `
            <div>
              <div class="text-sm font-medium">${r.original_filename}</div>
              <div class="text-xs text-mine-text3">${typeMap[r.report_type] || r.report_type} · ${r.parse_status === 'pending' ? '待解析' : '已解析'}</div>
            </div>
            <span class="text-xs px-2 py-0.5 rounded ${r.parse_status === 'done' ? 'bg-mine-success/20 text-mine-success' : 'bg-mine-gold/20 text-mine-gold'}">${r.parse_status === 'done' ? '已解析' : '待解析'}</span>
          `;
          list.appendChild(div);
        });
      } catch (e) {}
    }

    async function runAIAnalysis() {
      const input = document.getElementById('ai-input').value;
      if (!input.trim()) return;
      const resultDiv = document.getElementById('ai-result');
      resultDiv.innerHTML = '<p class="text-sm text-mine-text2">分析中...</p>';
      resultDiv.classList.remove('hidden');
      try {
        const res = await fetch('/api/mine-analysis/analyze', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ report_text: input, analysis_type: 'value_assessment' }) });
        const data = await res.json();
        if (data.analysis) {
          const a = data.analysis;
          resultDiv.innerHTML = `
            <div class="p-4 rounded-xl bg-mine-surface2 border border-mine-border">
              <div class="flex items-center justify-between mb-3">
                <span class="font-semibold">AI综合评分</span>
                <span class="text-2xl font-bold gold-gradient">${a.overallScore}</span>
              </div>
              <div class="grid grid-cols-2 gap-2 mb-3">
                ${Object.entries(a.dimensions || {}).map(([k,v]) => `<div class="text-xs text-mine-text3">${k}: <span class="text-mine-text">${v}</span></div>`).join('')}
              </div>
              <p class="text-sm text-mine-text2 mb-2">${a.summary}</p>
              ${a.recommendations ? `<div class="text-xs text-mine-text3"><div class="font-medium text-mine-text mb-1">建议：</div>${a.recommendations.map(r => `<div class="mb-0.5">• ${r}</div>`).join('')}</div>` : ''}
            </div>
          `;
        }
      } catch (e) { resultDiv.innerHTML = '<p class="text-sm text-mine-danger">分析失败</p>'; }
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;
      const history = document.getElementById('chat-history');
      history.innerHTML += `<div class="text-right"><span class="inline-block px-3 py-2 rounded-lg bg-mine-gold/20 text-mine-text text-sm">${msg}</span></div>`;
      input.value = '';
      try {
        const res = await fetch('/api/mine-analysis/chat', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ message: msg }) });
        const data = await res.json();
        history.innerHTML += `<div><span class="inline-block px-3 py-2 rounded-lg bg-mine-surface3 text-mine-text text-sm">${data.reply}</span></div>`;
        history.scrollTop = history.scrollHeight;
      } catch (e) {}
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });

    document.getElementById('search-input').addEventListener('input', debounce(loadDashboardProjects, 300));
    document.getElementById('filter-mineral').addEventListener('change', loadDashboardProjects);
    document.getElementById('filter-stage').addEventListener('change', loadDashboardProjects);

    document.getElementById('report-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        await fetch('/api/mine-reports', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ original_filename: file.name, file_size: file.size, file_type: file.type }) });
        loadReports();
      } catch (e) {}
    });

    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    function showInquiryModal(projectId, projectName) {
      const budget = prompt(`对「${projectName}」表达意向沟通\n请输入您的预算范围（可选）：`);
      if (budget === null) return;
      fetch('/api/mine-inquiries', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ project_id: projectId, budget }) })
        .then(() => alert('意向已提交'))
        .catch(() => alert('提交失败'));
    }

    loadUser();
    loadDashboardProjects();
  </script>
  <script src="/nav-component.js"></script>
</body>
</html>
