<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目详情 — 矿脉科技 MinePulse</title>
  <link rel="icon" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', warning: '#f59e0b',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    .mineral-tag { background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.25); }
    .score-bar-bg { background: #1a1a26; border-radius: 4px; height: 8px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .ai-panel { background: linear-gradient(180deg, rgba(201,169,110,0.06) 0%, rgba(18,18,26,0) 100%); border: 1px solid rgba(201,169,110,0.15); }
    .risk-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
    .risk-medium { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); }
    .risk-low { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; width: 100%; max-width: 460px; padding: 28px; }
    .form-input { width: 100%; background: #1a1a26; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: rgba(201,169,110,0.5); }
    .form-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  </style>
</head>
<body class="min-h-screen">
  <main class="pt-20 pb-12 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div id="project-content"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const projectId = params.get('id');
    const token = localStorage.getItem('mine_token');
    let currentProject = null;
    let isInternalUser = false; // 由服务端 /api/auth/me 验证后设置

    // 将纯文本描述转为结构化HTML：按段落换行，识别"标题："格式
    function formatDescription(text) {
      if (!text) return '';
      return text.split(/\n+/).map(line => {
        line = line.trim();
        if (!line) return '';
        // 识别"关键词：内容"格式，加粗关键词
        const colonMatch = line.match(/^([^：:]{2,10})[：:](.+)$/);
        if (colonMatch) {
          return `<p class="text-sm text-mine-text2 leading-relaxed mb-2"><span class="font-medium text-mine-text">${colonMatch[1]}：</span>${colonMatch[2]}</p>`;
        }
        return `<p class="text-sm text-mine-text2 leading-relaxed mb-2">${line}</p>`;
      }).join('');
    }

    async function loadProject() {
      if (!projectId) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">项目不存在</p>'; return; }
      try {
        // 先从服务端验证当前用户角色（防止localStorage缓存被篡改）
        if (token) {
          try {
            const meRes = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
            if (meRes.ok) {
              const meData = await meRes.json();
              const role = meData.user?.role || meData.role || 'investor';
              isInternalUser = (role === 'admin' || role === 'mine_enterprise');
            }
          } catch(e) {}
        }
        const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
        const res = await fetch('/api/mine-projects/' + projectId, { headers });
        const p = await res.json();
        if (!res.ok) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">' + (p.error || '加载失败') + '</p>'; return; }
        currentProject = p;

        const mineralLabels = { gold: '金矿', silver: '银矿', copper: '铜矿', lead: '铅矿', zinc: '锌矿' };
        const stageLabels = { 'general-exploration': '普查', 'detailed-exploration': '详查', 'prospecting': '勘探', 'feasibility': '可研', 'production-ready': '待产', 'production': '生产中' };
        const mineTypeLabels = { 'open-pit': '露天矿', 'underground': '地下矿', 'combined': '联合开采' };
        const licenseLabels = { valid: '有效', expired: '过期', 'about-to-expire': '即将过期' };

        const minerals = p.mineral_types.split(',').map(m => `<span class="text-xs px-2 py-0.5 rounded mineral-tag text-mine-gold">${mineralLabels[m] || m}</span>`).join('');
        const highlights = p.highlights ? p.highlights.split('|').map(h => `<span class="text-xs text-mine-text2 bg-mine-surface2 px-3 py-1 rounded-full">${h}</span>`).join('') : '';
        const isLoggedIn = !!token && !p.notice;

        // 如果已登录且有AI评分，显示分级徽章
        const gradeBadge = (isLoggedIn && p.ai_grade)
          ? `<span class="text-xs px-2 py-0.5 rounded font-bold ${
              p.ai_grade==='S'?'bg-purple-400/10 text-purple-400 border border-purple-400/30':
              p.ai_grade==='A'?'bg-mine-success/10 text-mine-success border border-mine-success/30':
              p.ai_grade==='B'?'bg-mine-warning/10 text-mine-warning border border-mine-warning/30':
              'bg-mine-danger/10 text-mine-danger border border-mine-danger/30'
            }">${p.ai_grade}级</span>`
          : '';

        document.getElementById('project-content').innerHTML = `
          <div class="mb-6">
            <div class="flex flex-wrap items-center gap-2 mb-3">
              ${minerals}
              ${p.is_hot ? '<span class="text-xs px-2 py-0.5 rounded bg-mine-danger/20 text-mine-danger border border-mine-danger/30">热门</span>' : ''}
              ${gradeBadge}
              <span class="text-xs px-2 py-0.5 rounded bg-mine-surface3 text-mine-text2">${stageLabels[p.development_stage] || p.development_stage}</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">${p.name}</h1>
            <div class="flex flex-wrap items-center gap-4 text-sm text-mine-text3">
              <span>${p.code}</span>
              <span>${p.province} · ${p.city}</span>
              <span>矿区面积 ${p.area_km2} km²</span>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 space-y-6">
              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <h2 class="text-lg font-semibold mb-4">项目描述</h2>
                <div class="description-content">${formatDescription(isLoggedIn ? (p.full_description || p.description) : (p.description_masked || p.description))}</div>
                ${p.notice ? `<div class="mt-4 p-3 rounded-lg bg-mine-gold/10 border border-mine-gold/30"><p class="text-xs text-mine-gold">${p.notice}</p></div>` : ''}
              </div>

              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <h2 class="text-lg font-semibold mb-4">核心亮点</h2>
                <div class="flex flex-wrap gap-2">${highlights}</div>
              </div>

              ${isLoggedIn && p.ai_summary ? `
                <div class="p-6 rounded-2xl ai-panel">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🤖</span>
                    <h2 class="text-lg font-semibold gold-gradient">AI 分析摘要</h2>
                  </div>
                  <div class="description-content">${formatDescription(p.ai_summary)}</div>
                  ${p.ai_score ? `<div class="mt-3 flex items-center gap-2"><span class="text-xs text-mine-text3">综合评分</span><span class="text-lg font-bold text-mine-success">${p.ai_score}</span><span class="text-xs text-mine-text3">/100</span></div>` : ''}
                </div>
              ` : ''}
            </div>

            <div class="space-y-6">
              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <div class="text-xs text-mine-text3 mb-1">挂牌价格</div>
                <div class="text-3xl font-bold gold-gradient mb-4">${p.asking_price}</div>
                ${p.ai_score ? `<div class="flex items-center justify-between mb-3"><span class="text-sm text-mine-text2">AI评分</span><span class="text-xl font-bold text-mine-success">${p.ai_score}</span></div>` : ''}
                <div class="space-y-2 text-sm">
                  <div class="flex justify-between"><span class="text-mine-text3">资源储量</span><span class="text-mine-text">${p.estimated_reserve || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">平均品位</span><span class="text-mine-text">${p.reserve_grade || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">矿床类型</span><span class="text-mine-text">${mineTypeLabels[p.mine_type] || p.mine_type}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">开采深度</span><span class="text-mine-text">${p.depth_range || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">许可证状态</span><span class="text-mine-text">${licenseLabels[p.license_status] || p.license_status}</span></div>
                  ${isLoggedIn && p.license_expires ? `<div class="flex justify-between"><span class="text-mine-text3">有效期至</span><span class="text-mine-text">${p.license_expires}</span></div>` : ''}
                </div>
              </div>

              ${isLoggedIn ? `
                <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                  <h3 class="text-sm font-semibold mb-3">联系方式</h3>
                  <p class="text-sm text-mine-text2">${p.contact_masked || '请联系平台获取'}</p>
                  <button onclick="submitInquiry(${p.id}, '${p.name}')" class="w-full mt-4 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors">提交投资意向</button>
                </div>
              ` : `
                <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                  <div class="text-center mb-4">
                    <p class="text-sm text-mine-text2 mb-3">注册会员可查看完整项目详情与联系方式</p>
                    <a href="/auth.html" class="inline-block px-6 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors">立即注册</a>
                  </div>
                  <div class="border-t border-mine-border pt-4 mt-2">
                    <p class="text-xs text-mine-text3 mb-3 text-center">或直接提交意向，我们会联系您</p>
                    <button onclick="submitInquiry(${p.id}, '${p.name}')" class="w-full py-2.5 rounded-lg border border-mine-gold/40 text-mine-gold font-semibold text-sm hover:bg-mine-gold/10 transition-colors">提交投资意向</button>
                  </div>
                </div>
              `}
            </div>
          </div>
        `;
      } catch (e) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">加载失败</p>'; }
    }

    function submitInquiry(pid, name) {
      document.getElementById('inquiry-project-name').textContent = '项目：' + name;
      document.getElementById('inquiry-modal').dataset.pid = pid;
      // 已登录用户预填信息
      const storedUser = (() => { try { return JSON.parse(localStorage.getItem('mine_user') || '{}'); } catch(e){ return {}; } })();
      if (storedUser.name) document.getElementById('inquiry-name').value = storedUser.name;
      if (storedUser.phone) document.getElementById('inquiry-phone').value = storedUser.phone;
      if (storedUser.organization) document.getElementById('inquiry-org').value = storedUser.organization;
      document.getElementById('inquiry-modal').classList.remove('hidden');
    }

    function closeInquiryModal() {
      document.getElementById('inquiry-modal').classList.add('hidden');
    }

    async function doSubmitInquiry() {
      const modal = document.getElementById('inquiry-modal');
      const pid = parseInt(modal.dataset.pid);
      const phone = document.getElementById('inquiry-phone').value.trim();
      if (!phone) { alert('联系电话必填'); return; }

      const btn = document.getElementById('inquiry-submit-btn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      try {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const res = await fetch('/api/mine-inquiries', {
          method: 'POST',
          headers,
          body: JSON.stringify({
            project_id: pid,
            contact_name: document.getElementById('inquiry-name').value.trim() || null,
            contact_phone: phone,
            contact_org: document.getElementById('inquiry-org').value.trim() || null,
            budget: document.getElementById('inquiry-budget').value.trim() || null,
            message: document.getElementById('inquiry-message').value.trim() || null,
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '提交失败');
        closeInquiryModal();
        alert('意向已提交！我们会尽快与您联系。');
      } catch(err) {
        alert('提交失败：' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '提交意向';
      }
    }

    loadProject();
  </script>

  <!-- 投资意向提交弹框 -->
  <div id="inquiry-modal" class="modal-overlay hidden">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h3 class="text-lg font-semibold text-mine-text">提交投资意向</h3>
          <p id="inquiry-project-name" class="text-xs text-mine-text3 mt-0.5"></p>
        </div>
        <button onclick="closeInquiryModal()" class="text-mine-text3 hover:text-mine-text text-xl leading-none">✕</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="form-label">联系人姓名</label>
          <input id="inquiry-name" type="text" class="form-input" placeholder="请输入您的姓名" />
        </div>
        <div>
          <label class="form-label">联系电话 <span class="text-mine-danger">*</span></label>
          <input id="inquiry-phone" type="tel" class="form-input" placeholder="请输入手机号码" />
        </div>
        <div>
          <label class="form-label">所属机构（可选）</label>
          <input id="inquiry-org" type="text" class="form-input" placeholder="公司 / 基金 / 个人投资者" />
        </div>
        <div>
          <label class="form-label">预算范围（可选）</label>
          <input id="inquiry-budget" type="text" class="form-input" placeholder="例：5000万以内、面议" />
        </div>
        <div>
          <label class="form-label">补充说明（可选）</label>
          <textarea id="inquiry-message" class="form-input" rows="3" placeholder="简述您的合作意向或关注重点..."></textarea>
        </div>
      </div>
      <div class="mt-6 flex gap-3">
        <button onclick="closeInquiryModal()" class="flex-1 py-2.5 rounded-lg border border-mine-border text-mine-text2 text-sm hover:bg-mine-surface2 transition-colors">取消</button>
        <button onclick="doSubmitInquiry()" id="inquiry-submit-btn" class="flex-1 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors">提交意向</button>
      </div>
      <p class="text-[11px] text-mine-text3 text-center mt-3">您的联系信息仅用于项目对接，不会公开展示</p>
    </div>
  </div>

  <script>
    document.getElementById('inquiry-modal').addEventListener('click', function(e) {
      if (e.target === this) closeInquiryModal();
    });
  </script>
  <script src="/nav-component.js"></script>
</body>
</html>
