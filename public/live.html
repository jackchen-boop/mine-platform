<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>项目直播 · 星链创投</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/theme.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  #local-video, #presenter-video { transform: scaleX(-1); }
  .chat-msg { animation: msgIn .2s ease; }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .speak-req-item { animation: reqIn .25s ease; }
  @keyframes reqIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
  /* 移动端聊天抽屉 */
  .chat-drawer { transition: transform .3s ease; }
  .chat-drawer.closed { transform: translateY(100%); }
  /* 控制按钮触控友好 */
  .ctrl-btn { min-width:40px; min-height:40px; display:inline-flex; align-items:center; justify-content:center; border-radius:8px; font-size:18px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); }
  .ctrl-btn:active { background:rgba(255,255,255,.1); }
  .ctrl-btn.active { background:rgba(212,175,55,.15); border-color:rgba(212,175,55,.3); }
  /* 桌面端聊天面板隐藏/显示过渡 */
  #chat-panel-desktop { transition: width 0.3s ease, opacity 0.3s ease, margin 0.3s ease, padding 0.3s ease; overflow: hidden; }
  #chat-panel-desktop.chat-panel-hidden { width: 0 !important; opacity: 0; margin: 0; padding: 0; border: none; pointer-events: none; }
</style>
</head>
<body data-page="live" class="bg-[#060b16] text-white h-[100dvh] flex flex-col overflow-hidden">

<!-- ===== NAV ===== -->
<header class="top-nav shrink-0">
  <div class="px-4 h-12 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
        <path d="M20 3 L36 12 L36 28 L20 37 L4 28 L4 12 Z" stroke="#d4af37" stroke-width="1.4" fill="rgba(212,175,55,0.06)"/>
        <path d="M14 24 L20 14 L26 24" stroke="#f1d77a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="14" r="1.6" fill="#f1d77a"/>
      </svg>
      <span class="font-serif-cn text-sm tracking-wider brand-wordmark font-bold hidden sm:inline">星链创投</span>
    </a>
    <div class="flex items-center gap-2">
      <span class="chip text-[10px]"><span class="w-1.5 h-1.5 rounded-full bg-red-500 inline-block mr-1 animate-pulse"></span>LIVE</span>
      <span id="viewer-count" class="text-[10px] text-dim">0 观看</span>
    </div>
  </div>
</header>

<!-- ===== 主内容区 ===== -->
<div class="flex-1 flex flex-col lg:flex-row gap-0 lg:gap-4 lg:max-w-[1400px] lg:mx-auto lg:px-4 lg:py-4 min-h-0">

  <!-- 视频+控制区 -->
  <div class="flex-1 flex flex-col min-h-0 lg:gap-3">
    <!-- 主视频区 -->
    <div class="flex-1 relative bg-[#0a1020] lg:rounded-xl lg:border lg:border-white/5 min-h-0">
      <video id="presenter-video" autoplay playsinline class="w-full h-full object-contain bg-black"></video>
      <video id="local-video" autoplay playsinline muted class="hidden absolute bottom-3 right-3 w-28 h-20 sm:w-40 sm:h-28 lg:w-48 lg:h-36 rounded-lg border border-white/20 object-cover z-10"></video>
      <!-- 状态覆盖层 -->
      <div id="video-overlay" class="absolute inset-0 flex items-center justify-center bg-[#0a1020]">
        <div class="text-center px-4">
          <div class="text-3xl mb-2 opacity-30">📹</div>
          <div id="overlay-text" class="text-dim text-xs sm:text-sm">等待主播开始直播...</div>
        </div>
      </div>
      <!-- 直播信息条 -->
      <div class="absolute top-0 left-0 right-0 p-2 sm:p-3 flex items-center justify-between bg-gradient-to-b from-black/60 to-transparent">
        <div class="min-w-0">
          <div id="live-title" class="font-serif-cn font-bold text-xs sm:text-sm truncate"></div>
          <div id="live-presenter" class="text-[10px] sm:text-xs text-white/60 truncate"></div>
        </div>
      </div>
    </div>

    <!-- 发言者视频条 -->
    <div id="speakers-bar" class="hidden flex gap-2 h-20 sm:h-24 lg:h-28 shrink-0"></div>

    <!-- 底部控制栏 -->
    <div class="shrink-0 flex items-center justify-between glass rounded-none lg:rounded-lg px-3 py-2.5 sm:px-4 sm:py-2 border-t border-white/5 lg:border-t-0" style="padding-bottom: max(env(safe-area-inset-bottom, 12px), 16px);">
      <div class="flex items-center gap-2" id="presenter-controls" style="display:none;">
        <button onclick="toggleCamera()" id="btn-cam" class="ctrl-btn active" title="摄像头">📷</button>
        <button onclick="toggleMic()" id="btn-mic" class="ctrl-btn active" title="麦克风">🎤</button>
        <button onclick="toggleScreen()" id="btn-screen" class="ctrl-btn hidden sm:inline-flex" title="屏幕共享">🖥️</button>
        <button onclick="endLive()" class="ctrl-btn text-red-400" title="结束直播">⏹️</button>
      </div>
      <div id="viewer-controls" class="flex items-center gap-2" style="display:none;">
        <button onclick="requestSpeak()" id="btn-speak-req" class="btn btn-gold text-xs py-2.5 px-4 font-bold rounded-lg shadow-lg shadow-yellow-900/20">✋ 申请视频发言</button>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleChat()" id="btn-chat" class="ctrl-btn" title="聊天">💬</button>
        <button onclick="toggleFullscreen()" class="ctrl-btn hidden sm:inline-flex" title="全屏">⛶</button>
      </div>
    </div>
  </div>

  <!-- 右侧：聊天 + 管控面板 (桌面显示, 移动端抽屉) -->
  <!-- 桌面端: 正常显示在右侧 -->
  <div id="chat-panel-desktop" class="hidden lg:flex w-80 flex-col gap-3 shrink-0">
    <!-- 管理员管控面板 -->
    <div id="admin-panel-desktop" class="glass rounded-lg p-4 hidden" style="max-height:40%;">
      <h3 class="font-bold text-xs mb-3 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-gold-1"></span>管理控制台
      </h3>
      <div class="mb-3">
        <div class="text-[10px] text-dim mb-1">发言申请</div>
        <div id="speak-requests-d" class="space-y-1.5 max-h-40 overflow-y-auto">
          <div class="text-dim text-[10px]">暂无申请</div>
        </div>
      </div>
      <div>
        <div class="text-[10px] text-dim mb-1">当前发言者</div>
        <div id="active-speakers-d" class="space-y-1">
          <div class="text-dim text-[10px]">暂无</div>
        </div>
      </div>
    </div>
    <!-- 聊天区 -->
    <div class="flex-1 glass rounded-lg flex flex-col overflow-hidden">
      <div class="px-4 py-2 border-b border-white/5 flex items-center justify-between">
        <span class="text-xs font-bold">互动聊天</span>
        <span id="online-count-d" class="text-[10px] text-dim">0 在线</span>
      </div>
      <div id="chat-messages-d" class="flex-1 overflow-y-auto px-4 py-2 space-y-2">
        <div class="text-dim text-xs text-center py-4">直播聊天将在开始后显示</div>
      </div>
      <div class="px-3 py-2 border-t border-white/5">
        <div class="flex gap-2">

                 onkeydown="if(event.key==='Enter')sendChat()">
          <button onclick="sendChat()" class="btn btn-gold text-xs py-1.5 px-3">发送</button>
        </div>
      </div>

  </div>
</div>

<!-- 移动端: 聊天抽屉 (从底部滑出) -->
<div id="chat-drawer" class="chat-drawer closed fixed inset-x-0 bottom-0 z-40 lg:hidden" style="height:55vh;">
  <div class="h-full flex flex-col bg-[#0d1322] rounded-t-2xl border-t border-white/10 shadow-2xl">

    <div class="flex justify-center py-2 cursor-pointer" onclick="toggleChat()">

        <h3 class="font-bold text-[10px] mb-2 flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-gold-1"></span>管理控制台
        </h3>
        <div class="mb-2">

          <div id="speak-requests-m" class="space-y-1 max-h-24 overflow-y-auto">

            <div class="text-dim text-[10px]">暂无</div>

        </div>
      </div>
    </div>
    <!-- 聊天消息 -->
    <div class="px-4 py-1 flex items-center justify-between">
      <span class="text-xs font-bold">互动聊天</span>
      <span id="online-count-m" class="text-[10px] text-dim">0 在线</span>
    </div>
    <div id="chat-messages-m" class="flex-1 overflow-y-auto px-4 py-1 space-y-2 min-h-0">
      <div class="text-dim text-xs text-center py-4">直播聊天将在开始后显示</div>
    </div>
    <div class="px-3 py-2 border-t border-white/5 shrink-0 pb-[env(safe-area-inset-bottom,8px)]">
      <div class="flex gap-2">
        <input id="chat-input-m" class="input text-sm flex-1 py-2" placeholder="输入消息..."
               onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()" class="btn btn-gold text-sm py-2 px-4">发送</button>
      </div>

<!-- 遮罩 -->
<div id="chat-overlay" class="fixed inset-0 z-30 bg-black/40 hidden lg:hidden" onclick="toggleChat()"></div>

<script src="assets/api.js"></script>
<script>
// ===== 全局变量 =====
const params = new URLSearchParams(location.search);
const ROADSHOW_ID = params.get('id');
const USER = VCPlat.getUser();
const IS_ADMIN = VCPlat.isAdmin();
const IS_PRESENTER = params.get('role') === 'presenter';
const IS_MOBILE = window.innerWidth < 1024;

let ws = null;
let localStream = null;
let presenterStream = null;
let peerConnections = new Map();
let isSpeaker = false;
let cameraOn = true;
let micOn = true;
let screenSharing = false;
let screenStream = null;
let chatOpen = !IS_MOBILE; // 桌面端默认展开聊天
let pendingViewers = []; // 主播摄像头未准备好时缓存的新观众
let broadcastStream = null; // 当前发送给观众的流（屏幕分享合成流时覆盖localStream）
let presenterWsId = null; // 主播的WebSocket ID（观众端使用）

// Canvas 合成（屏幕共享 + 摄像头画中画）
let compositeCanvas = null;
let compositeCtx = null;
let compositeStream = null;
let compositeAnimationId = null;

const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', async () => {
  if (!VCPlat.isLoggedIn()) { location.href = 'auth.html'; return; }
  if (!ROADSHOW_ID) { alert('缺少路演ID'); location.href = 'roadshow.html'; return; }

  // 非管理员携带 presenter 参数时，检查直播权限
  let hasLivePermission = true;
  if (IS_PRESENTER && !IS_ADMIN) {
    try {
      const check = await VCPlat.api('/api/live-applications/check/' + ROADSHOW_ID);
      hasLivePermission = check.canStream;
      if (!hasLivePermission) {
        alert(check.reason === 'pending'
          ? '您的直播申请正在审批中，请耐心等待管理员审核'
          : '您尚未获得该路演的直播权限，请先提交申请');
        location.href = 'roadshow.html';
        return;
      }
    } catch(e) {
      console.warn('权限检查失败:', e);
    }
  }

  if (IS_PRESENTER || IS_ADMIN) {
    document.getElementById('presenter-controls').style.display = 'flex';
    document.getElementById(IS_MOBILE ? 'admin-panel-mobile' : 'admin-panel-desktop').classList.remove('hidden');
  } else {
    document.getElementById('viewer-controls').style.display = 'flex';
  }

  await loadRoadshowInfo();
  connectWS();
  // 设置聊天按钮初始状态
  document.getElementById('btn-chat').classList.toggle('active', chatOpen);
  if (!IS_PRESENTER) {
    VCPlat.api(`/api/live/${ROADSHOW_ID}/record-viewer`, { method: 'POST' }).catch(() => {});
  }
  // 观众端：首次点击页面任意位置尝试解锁音频（绕过浏览器自动播放策略）
  if (!IS_PRESENTER) {
    const unlockAudioOnFirstClick = () => {
      const rv = document.getElementById('presenter-video');
      if (rv && rv.srcObject) rv.play().catch(() => {});
    };
    document.body.addEventListener('click', unlockAudioOnFirstClick, { once: true });
  }
});

async function loadRoadshowInfo() {
  try {
    const data = await VCPlat.api(`/api/roadshow/${ROADSHOW_ID}`);
    const r = data.roadshow;
    document.getElementById('live-title').textContent = r.title || r.project_name || '项目路演';
    document.getElementById('live-presenter').textContent = r.presenter || '';
    document.title = (r.title || '项目路演') + ' · 星链创投';
  } catch (e) { console.error('加载路演信息失败:', e); }
}

// ===== WebSocket =====
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/live`);
  ws.onopen = () => {
    wsSend({ type:'join', roomId:ROADSHOW_ID, userId:USER.id, userName:USER.name,
             role: IS_PRESENTER ? 'presenter' : (IS_ADMIN ? 'admin' : 'viewer') });
  };
  ws.onmessage = (e) => { try { handleWSMessage(JSON.parse(e.data)); } catch(err){} };
  ws.onclose = () => {
    document.getElementById('overlay-text').textContent = '连接已断开，3秒后重连...';
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {};
}
function wsSend(msg) { if (ws?.readyState === 1) ws.send(JSON.stringify(msg)); }

// ===== WS 消息处理 =====
function handleWSMessage(msg) {
  switch (msg.type) {
    case 'joined':         return onJoined(msg);
    case 'new-viewer':
      if (!IS_PRESENTER) return null;
      if (localStream) return createPeerConnection(msg.viewerWsId, msg.userId, msg.userName, true);
      // 摄像头还没准备好，缓存起来等 ready 后重试
      pendingViewers.push({ viewerWsId: msg.viewerWsId, userId: msg.userId, userName: msg.userName });
      return null;
    case 'offer':          return onOffer(msg);
    case 'answer':         return onAnswer(msg);
    case 'ice':            return onIce(msg);
    case 'chat':           return appendChat(msg.userName, msg.text, msg.time);
    case 'viewer-joined':
    case 'viewer-left':    return updateViewerCount(msg.viewerCount);
    case 'speak-request':  return (IS_ADMIN||IS_PRESENTER) ? addSpeakRequestUI(msg.userId, msg.userName, msg.reason) : null;
    case 'speak-approved': return onSpeakApproved();
    case 'speak-rejected': return onSpeakRejected();
    case 'speak-ended':    return onSpeakEnded();
    case 'speaker-added':  return onSpeakerAdded(msg);
    case 'speaker-removed':return onSpeakerRemoved(msg);
    case 'new-speaker':    return IS_PRESENTER && localStream ? createPeerConnection(msg.speakerWsId, msg.userId, msg.userName, true) : null;
    case 'muted':          return alert('你已被管理员禁言');
    case 'stream-ended':   return onStreamEnded();
  }
}

function onJoined(msg) {
  updateViewerCount(msg.viewerCount);
  const chatEl = getChatEl();
  if (msg.chatLog?.length > 0) { chatEl.innerHTML = ''; msg.chatLog.forEach(m => appendChat(m.userName, m.text, m.time)); }
  if (msg.speakRequests?.length > 0) msg.speakRequests.forEach(r => addSpeakRequestUI(r.userId, r.userName, r.reason));
  if (msg.presenterWsId) presenterWsId = msg.presenterWsId;
  if (IS_PRESENTER) startPresenterStream();
  else document.getElementById('overlay-text').textContent = '正在连接主播...';
}

function updateViewerCount(n) {
  document.getElementById('viewer-count').textContent = n + ' 观看';
  document.querySelectorAll('[id^="online-count"]').forEach(el => el.textContent = n + ' 在线');
}

function getChatEl() { return document.getElementById(IS_MOBILE ? 'chat-messages-m' : 'chat-messages-d'); }
function getChatInput() { return document.getElementById(IS_MOBILE ? 'chat-input-m' : 'chat-input-d'); }
function getSpeakReqEl() { return document.getElementById(IS_MOBILE ? 'speak-requests-m' : 'speak-requests-d'); }
function getActiveSpkEl() { return document.getElementById(IS_MOBILE ? 'active-speakers-m' : 'active-speakers-d'); }

// ===== WebRTC =====
async function startPresenterStream() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true, sampleRate:48000, channelCount:2 }
    });
    // 确认音频轨道已获取
    const audioTracks = localStream.getAudioTracks();
    console.log('音频轨道:', audioTracks.length, audioTracks.map(t => ({label:t.label, enabled:t.enabled, muted:t.muted})));
    if (audioTracks.length === 0) {
      alert('未检测到麦克风，请检查设备连接和权限设置');
    }
    document.getElementById('local-video').srcObject = localStream;
    document.getElementById('local-video').classList.remove('hidden');
    document.getElementById('video-overlay').classList.add('hidden');
    // 处理断线重连期间缓存的新观众
    if (pendingViewers.length > 0) {
      console.log('摄像头就绪，处理缓存的', pendingViewers.length, '个观众');
      pendingViewers.forEach(v => createPeerConnection(v.viewerWsId, v.userId, v.userName, true));
      pendingViewers = [];
    }
  } catch (e) {
    console.error('获取摄像头/麦克风失败:', e);
    alert('无法获取摄像头/麦克风，请检查权限设置');
  }
}

function createPeerConnection(targetWsId, targetUserId, targetUserName, isInitiator) {
  if (peerConnections.has(targetWsId)) return peerConnections.get(targetWsId);
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peerConnections.set(targetWsId, pc);
  const stream = broadcastStream || localStream || presenterStream;
  if (stream) stream.getTracks().forEach(track => pc.addTrack(track, stream));
  pc.ontrack = (e) => {
    const track = e.track;
    // 主播端收到观众的音频轨道（发言者），单独播放避免混到自己视频流
    if (isInitiator && track.kind === 'audio') {
      const audioEl = document.createElement('audio');
      audioEl.autoplay = true;
      audioEl.srcObject = new MediaStream([track]);
      audioEl.play().catch(() => {});
      // 绑定到speaker UI以便结束发言时清理
      const spkBar = document.getElementById('speakers-bar');
      const spkDiv = spkBar.querySelector(`[data-speaker-user="${targetUserId}"]`);
      if (spkDiv) spkDiv._audioEl = audioEl;
      return;
    }
    const rv = document.getElementById('presenter-video');
    const stream = e.streams[0];
    // WebRTC 视频和音频轨道分批到达，每次 ontrack 的 stream 只有当前到达的轨道
    // 必须把新轨道添加到视频元素的流中，否则音频轨道会被漏掉
    if (!rv.srcObject) {
      rv.srcObject = stream; presenterStream = stream;
    } else {
      // 将新轨道追加到已有流中（避免遗漏音频轨道）
      e.track && rv.srcObject.addTrack(e.track);
    }
    document.getElementById('video-overlay').classList.add('hidden');
    // 强制取消静音、音量最大，然后显式播放
    rv.muted = false;
    rv.volume = 1;
    const audioTracks = rv.srcObject.getAudioTracks();
    console.log('视频元素当前轨道:', rv.srcObject.getTracks().map(t => ({kind:t.kind, enabled:t.enabled})));
    if (audioTracks.length === 0) console.warn('⚠️ 尚未收到音频轨道');
    rv.play().catch(err => {
      console.log('自动播放被阻止，需要用户交互:', err);
      showAudioUnlock();
    });
  };
  pc.onicecandidate = (e) => { if (e.candidate) wsSend({type:'ice', targetWsId, candidate:e.candidate}); };
  pc.onconnectionstatechange = () => { if (pc.connectionState==='failed'||pc.connectionState==='closed') peerConnections.delete(targetWsId); };
  // 处理重新协商（观众添加麦克风轨道后会触发）
  pc.onnegotiationneeded = async () => {
    try {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      wsSend({type:'offer', targetWsId, sdp: pc.localDescription});
    } catch (err) { console.error('negotiationneeded failed:', err); }
  };
  if (isInitiator) pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => wsSend({type:'offer', targetWsId, sdp:pc.localDescription}));
  return pc;
}
async function onOffer(msg) {
  const pc = createPeerConnection(msg.fromWsId, msg.fromUser?.userId, msg.fromUser?.userName, false);
  await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
  const a = await pc.createAnswer(); await pc.setLocalDescription(a);
  wsSend({type:'answer', targetWsId:msg.fromWsId, sdp:pc.localDescription});
}
async function onAnswer(msg) { const pc = peerConnections.get(msg.fromWsId); if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)); }
function onIce(msg) { const pc = peerConnections.get(msg.fromWsId); if (pc) pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(()=>{}); }

// ===== 主播控制 =====
function toggleCamera() {
  if (!localStream) return;
  const t = localStream.getVideoTracks()[0]; if (!t) return;
  cameraOn = !cameraOn; t.enabled = cameraOn;
  document.getElementById('btn-cam').classList.toggle('active', cameraOn);
  document.getElementById('btn-cam').textContent = cameraOn ? '📷' : '🚫📷';
}
function toggleMic() {
  if (!localStream) return;
  const t = localStream.getAudioTracks()[0]; if (!t) return;
  micOn = !micOn; t.enabled = micOn;
  document.getElementById('btn-mic').classList.toggle('active', micOn);
  document.getElementById('btn-mic').textContent = micOn ? '🎤' : '🔇';
}
async function toggleScreen() {
  if (screenSharing) {
    // 停止屏幕共享
    screenStream?.getTracks().forEach(t => t.stop()); screenSharing = false;
    document.getElementById('btn-screen').classList.remove('active');
    stopCompositeStream();
    broadcastStream = null;
    // 恢复摄像头
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: { echoCancellation:true, noiseSuppression:true }
    });
    document.getElementById('local-video').srcObject = localStream;
    document.getElementById('presenter-video').style.transform = 'scaleX(-1)';
    replaceStreamForAllPeers(localStream);
    // 处理断线重连期间缓存的新观众
    if (pendingViewers.length > 0) {
      pendingViewers.forEach(v => createPeerConnection(v.viewerWsId, v.userId, v.userName, true));
      pendingViewers = [];
    }
  } else {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
      screenSharing = true; document.getElementById('btn-screen').classList.add('active');
      // 主播自己看到屏幕共享
      document.getElementById('presenter-video').srcObject = screenStream;
      document.getElementById('presenter-video').style.transform = 'none';
      document.getElementById('video-overlay').classList.add('hidden');
      // 启动 canvas 合成（屏幕共享 + 摄像头画中画），发送给观众
      startCompositeStream();
      if (compositeStream) {
        broadcastStream = compositeStream;
        replaceStreamForAllPeers(compositeStream);
      }
      screenStream.getVideoTracks()[0].onended = () => toggleScreen();
    } catch(e) { console.error('屏幕共享失败:', e); }
  }
}

// Canvas 合成：屏幕共享全屏 + 摄像头右下角画中画
function startCompositeStream() {
  if (!compositeCanvas) {
    compositeCanvas = document.createElement('canvas');
    compositeCanvas.width = 1280;
    compositeCanvas.height = 720;
    compositeCtx = compositeCanvas.getContext('2d');
  }
  compositeStream = compositeCanvas.captureStream(30);

  function draw() {
    if (!screenSharing || !compositeCtx) return;
    const screenVideo = document.getElementById('presenter-video');
    const cameraVideo = document.getElementById('local-video');

    // 绘制屏幕共享（全屏背景）
    if (screenVideo.videoWidth > 0) {
      const scale = Math.max(compositeCanvas.width / screenVideo.videoWidth, compositeCanvas.height / screenVideo.videoHeight);
      const dx = (compositeCanvas.width - screenVideo.videoWidth * scale) / 2;
      const dy = (compositeCanvas.height - screenVideo.videoHeight * scale) / 2;
      compositeCtx.drawImage(screenVideo, dx, dy, screenVideo.videoWidth * scale, screenVideo.videoHeight * scale);
    } else {
      compositeCtx.fillStyle = '#0a1020';
      compositeCtx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);
    }

    // 绘制摄像头（右下角画中画）
    if (cameraVideo.videoWidth > 0) {
      const pipW = 240, pipH = 180;
      const pipX = compositeCanvas.width - pipW - 16;
      const pipY = compositeCanvas.height - pipH - 16;
      // 背景+边框
      compositeCtx.fillStyle = 'rgba(0,0,0,0.4)';
      compositeCtx.fillRect(pipX - 3, pipY - 3, pipW + 6, pipH + 6);
      compositeCtx.drawImage(cameraVideo, pipX, pipY, pipW, pipH);
      compositeCtx.strokeStyle = 'rgba(212,175,55,0.6)';
      compositeCtx.lineWidth = 2;
      compositeCtx.strokeRect(pipX, pipY, pipW, pipH);
      // 主播标签
      compositeCtx.fillStyle = 'rgba(0,0,0,0.6)';
      compositeCtx.fillRect(pipX, pipY + pipH - 22, pipW, 22);
      compositeCtx.fillStyle = '#f1d77a';
      compositeCtx.font = 'bold 12px sans-serif';
      compositeCtx.fillText('主播', pipX + 8, pipY + pipH - 6);
    }

    compositeAnimationId = requestAnimationFrame(draw);
  }
  draw();
}

function stopCompositeStream() {
  if (compositeAnimationId) {
    cancelAnimationFrame(compositeAnimationId);
    compositeAnimationId = null;
  }
  compositeStream = null;
}
function replaceStreamForAllPeers(newStream) {
  for (const [,pc] of peerConnections) {
    // 替换视频轨道
    const vt = newStream.getVideoTracks()[0];
    const videoSender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (videoSender && vt) videoSender.replaceTrack(vt);
    // 替换音频轨道（如果新流有音频；屏幕共享通常无音频，此时保留原麦克风音频）
    const at = newStream.getAudioTracks()[0];
    const audioSender = pc.getSenders().find(s => s.track?.kind === 'audio');
    if (audioSender && at) audioSender.replaceTrack(at);
  }
}
async function endLive() {
  if (!confirm('确定结束直播？')) return;
  wsSend({type:'end-stream'});
  try { await VCPlat.api(`/api/live/${ROADSHOW_ID}/end`, {method:'POST'}); } catch{}
  localStream?.getTracks().forEach(t=>t.stop()); location.href = 'roadshow.html';
}
function onStreamEnded() { alert('直播已结束'); localStream?.getTracks().forEach(t=>t.stop()); location.href = 'roadshow.html'; }

// ===== 聊天 =====
function sendChat() {
  const input = getChatInput(); const text = input.value.trim();
  if (!text) return; wsSend({type:'chat', text}); input.value = '';
}
function appendChat(name, text, time) {
  const t = time ? new Date(time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '';
  const html = `<div class="chat-msg"><span class="text-gold-2 text-xs font-bold">${esc(name)}</span> <span class="text-[10px] text-dim">${t}</span><div class="text-xs text-white/80 mt-0.5">${esc(text)}</div></div>`;
  // 写入两端（桌面+移动），保持同步
  ['chat-messages-d','chat-messages-m'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.innerHTML += html; el.scrollTop = el.scrollHeight; }
  });
}

// ===== 聊天面板切换 =====
function toggleChat() {
  chatOpen = !chatOpen;
  // 更新按钮状态
  document.getElementById('btn-chat').classList.toggle('active', chatOpen);

  if (IS_MOBILE) {
    // 移动端：抽屉模式
    const drawer = document.getElementById('chat-drawer');
    const overlay = document.getElementById('chat-overlay');
    if (chatOpen) { drawer.classList.remove('closed'); overlay.classList.remove('hidden'); }
    else { drawer.classList.add('closed'); overlay.classList.add('hidden'); }
  } else {
    // 桌面端：显示/隐藏右侧面板
    const panel = document.getElementById('chat-panel-desktop');
    if (chatOpen) {
      panel.classList.remove('chat-panel-hidden');
    } else {
      panel.classList.add('chat-panel-hidden');
    }
  }
}

// ===== 发言管控 =====
function requestSpeak() {
  const reason = prompt('请输入发言理由（可选）：') || '';
  wsSend({type:'speak-request', reason});
  const btn = document.getElementById('btn-speak-req');
  btn.textContent = '⏳ 等待审批'; btn.disabled = true;
}
function addSpeakRequestUI(userId, userName, reason) {
  ['speak-requests-d','speak-requests-m'].forEach(id => {
    const el = document.getElementById(id);
    if (el.querySelector('.text-dim')) el.innerHTML = '';
    el.innerHTML += `<div class="speak-req-item hairline rounded-lg p-2" data-req-user="${userId}">
      <div class="flex items-center justify-between gap-2">
        <span class="text-xs font-bold truncate">${esc(userName)}</span>
        <div class="flex gap-1 shrink-0">
          <button onclick="approveSpeak('${userId}')" class="text-[10px] px-2 py-1 rounded bg-emerald-500/20 text-emerald-400">批准</button>
          <button onclick="rejectSpeak('${userId}')" class="text-[10px] px-2 py-1 rounded bg-red-500/20 text-red-400">拒绝</button>
        </div>
      </div>
      ${reason ? `<div class="text-[10px] text-dim mt-1">${esc(reason)}</div>` : ''}
    </div>`;
  });
}
function approveSpeak(userId) { wsSend({type:'speak-approve',userId}); document.querySelectorAll(`[data-req-user="${userId}"]`).forEach(e=>e.remove()); }
function rejectSpeak(userId) { wsSend({type:'speak-reject',userId}); document.querySelectorAll(`[data-req-user="${userId}"]`).forEach(e=>e.remove()); }
async function onSpeakApproved() {
  isSpeaker = true;
  const btn = document.getElementById('btn-speak-req');
  btn.textContent = '🎙️ 发言中';
  btn.classList.add('text-emerald-400');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    appendChat('系统','你的发言申请已批准，现在可以发言了',new Date().toISOString());
    // 将麦克风轨道添加到与主播的 peer connection（触发重新协商）
    if (presenterWsId && peerConnections.has(presenterWsId)) {
      const pc = peerConnections.get(presenterWsId);
      localStream.getTracks().forEach(track => {
        if (!pc.getSenders().find(s => s.track === track)) {
          pc.addTrack(track, localStream);
        }
      });
    }
  } catch(e) {
    alert('无法获取麦克风权限');
    btn.disabled = false;
    btn.textContent = '✋ 申请发言';
    btn.classList.remove('text-emerald-400');
    isSpeaker = false;
  }
}
function onSpeakRejected() { const b=document.getElementById('btn-speak-req'); b.textContent='✋ 申请发言'; b.disabled=false; alert('发言申请未被批准'); }
function onSpeakEnded() {
  isSpeaker=false;
  const b=document.getElementById('btn-speak-req');
  b.textContent='✋ 申请发言'; b.disabled=false; b.classList.remove('text-emerald-400');
  // 从 peer connection 中移除麦克风轨道并停止
  if (presenterWsId && peerConnections.has(presenterWsId) && localStream) {
    const pc = peerConnections.get(presenterWsId);
    localStream.getTracks().forEach(track => {
      const sender = pc.getSenders().find(s => s.track === track);
      if (sender) pc.removeTrack(sender);
      track.stop();
    });
  } else {
    localStream?.getTracks().forEach(t=>t.stop());
  }
  localStream = null;
}

function onSpeakerAdded(msg) { addActiveSpeakerUI(msg.userId, msg.userName); appendChat('系统',`${msg.userName} 开始发言`,new Date().toISOString()); }
function onSpeakerRemoved(msg) {
  document.querySelectorAll(`[data-speaker-user="${msg.userId}"]`).forEach(e => {
    if (e._audioEl) { e._audioEl.pause(); e._audioEl.srcObject = null; }
    e.remove();
  });
  if(!document.getElementById('speakers-bar').children.length) document.getElementById('speakers-bar').classList.add('hidden');
  appendChat('系统',`${msg.userName} 结束发言`,new Date().toISOString());
}
function addActiveSpeakerUI(userId, userName) {
  const bar = document.getElementById('speakers-bar'); bar.classList.remove('hidden');
  bar.innerHTML += `<div class="flex-1 relative rounded-lg overflow-hidden bg-[#0a1020] border border-white/5" data-speaker-user="${userId}">
    <div class="absolute bottom-1 left-2 text-[10px] text-gold-2 z-10">🎙️ ${esc(userName)}</div>
    ${(IS_ADMIN||IS_PRESENTER) ? `<button onclick="endSpeak('${userId}')" class="absolute top-1 right-1 text-[10px] text-red-400/60 hover:text-red-400 z-10">✕</button>` : ''}
  </div>`;
  ['active-speakers-d','active-speakers-m'].forEach(id => {
    const el = document.getElementById(id);
    if (el.querySelector('.text-dim')) el.innerHTML = '';
    el.innerHTML += `<div class="flex items-center justify-between" data-speaker-user="${userId}">
      <span class="text-xs text-gold-2">🎙️ ${esc(userName)}</span>
      ${(IS_ADMIN||IS_PRESENTER) ? `<button onclick="endSpeak('${userId}')" class="text-[10px] text-red-400">结束</button>` : ''}
    </div>`;
  });
}
function endSpeak(userId) { wsSend({type:'speak-end',userId}); }

function toggleFullscreen() {
  const el = document.getElementById('presenter-video');
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

// 音频自动播放解锁（浏览器策略要求用户交互后才能播放音频）
function showAudioUnlock() {
  const overlay = document.getElementById('video-overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <div class="text-center px-4">
      <div class="text-3xl mb-3 opacity-60">🔇</div>
      <div class="text-sm text-white/80 mb-4">浏览器阻止了自动播放，请点击开启声音</div>
      <button onclick="unlockAudio()" class="btn btn-gold text-sm py-2 px-6">🔊 点击开启声音</button>
    </div>`;
}
function unlockAudio() {
  const rv = document.getElementById('presenter-video');
  if (rv) rv.play().catch(() => {});
  document.getElementById('video-overlay').classList.add('hidden');
  // 恢复默认覆盖层内容
  document.getElementById('video-overlay').innerHTML = `
    <div class="text-center px-4">
      <div class="text-3xl mb-2 opacity-30">📹</div>
      <div id="overlay-text" class="text-dim text-xs sm:text-sm">等待主播开始直播...</div>
    </div>`;
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
</script>
