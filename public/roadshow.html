<!-- ===== Project list ===== -->
<section class="max-w-[1280px] mx-auto px-6 pt-8 pb-20">

<script src="assets/api.js"></script>
<script>
const isLoggedIn = VCPlat.isLoggedIn();

// auth tip
const tip = document.getElementById("auth-tip");
if (!isLoggedIn) {
  tip.innerHTML =
    '<div class="glass p-4 flex items-center gap-3" style="border-color:rgba(245,158,11,.4);">' +
    '  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 11V8a6 6 0 1 1 12 0v3" stroke="#fbbf24" stroke-width="1.6"/><rect x="4" y="11" width="16" height="10" rx="2" stroke="#fbbf24" stroke-width="1.6"/></svg>' +
    '  <div class="text-sm">' +
    '    <div class="text-amber-300 font-bold">您当前为<strong>访客模式</strong>，关键数据已脱敏</div>' +
    '    <div class="text-mute text-xs">注册成为认证投资人后，可解锁全量项目数据、参与路演与发起约谈。</div>' +
    '  </div>' +
    '  <a href="auth.html?tab=register" class="btn btn-gold ml-3">立即注册解锁</a>' +
    '</div>';
} else {
  const u = VCPlat.getUser();
  tip.innerHTML =
    '<div class="glass p-4 flex items-center gap-3">' +
    '  <span class="chip chip-green"><span class="pulse-dot"></span>已认证</span>' +
    '  <div class="text-sm text-mute">欢迎，<strong class="text-gold-2">' + (u.name || '用户') + '</strong>，全量项目数据已解锁。</div>' +
    '</div>';
}

function badgeColor(round) {
  if (!round) return "";
  if (round.startsWith("A")) return "chip-gold";
  if (round.startsWith("B")) return "chip-blue";
  if (round.startsWith("Pre-IPO")) return "chip-purple";
  return "";
}

function renderCard(p) {
  const amt = p.amount || "—";
  const val = p.valuation || "—";
  const score = p.ai_score || "—";
  const prog = p.funding_progress || 0;
  const fans = p.follow_count || 0;
  const code = (p.name || "项").slice(0, 1);
  return (
    '<div class="glass p-5 hover:border-yellow-500/50 transition relative">' +
    '  <div class="flex items-start justify-between">' +
    '    <div class="flex items-center gap-3">' +
    '      <div class="w-12 h-12 rounded-lg flex items-center justify-center font-serif-cn text-lg font-bold"' +
    '           style="background:linear-gradient(135deg,#1a233a,#0a0f1c);border:1px solid var(--line);color:#f1d77a;">' + code + '</div>' +
    '      <div>' +
    '        <div class="font-serif-cn font-bold text-[16px]">' + (p.name || '—') + '</div>' +
    '        <div class="text-xs text-dim">' + (p.sector || '') + (p.location ? ' · ' + p.location : '') + '</div>' +
    '      </div>' +
    '    </div>' +
    '    <div class="flex flex-col items-end gap-1">' +
    '      <span class="chip ' + badgeColor(p.stage) + '">' + (p.stage || '') + '</span>' +
    (p.is_hot ? '<span class="chip" style="background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4);color:#fca5a5;">🔥 热门</span>' : '') +
    '    </div>' +
    '  </div>' +
    '  <p class="text-mute text-[13px] leading-6 mt-3">' + (p.short_desc || p.description || '').slice(0, 80) + '</p>' +
    '  <div class="grid grid-cols-3 gap-2 mt-4 text-center">' +
    '    <div class="hairline rounded-lg py-2"><div class="text-[10px] text-dim">融资额</div><div class="text-gold-2 font-mono text-sm">' + amt + '</div></div>' +
    '    <div class="hairline rounded-lg py-2"><div class="text-[10px] text-dim">估值</div><div class="text-gold-2 font-mono text-sm">' + val + '</div></div>' +
    '    <div class="hairline rounded-lg py-2"><div class="text-[10px] text-dim">AI 评分</div><div class="text-gold-2 font-mono text-sm">' + score + '</div></div>' +
    '  </div>' +
    '  <div class="bar-track mt-4"><div class="bar-fill" style="width:' + prog + '%"></div></div>' +
    '  <div class="flex items-center justify-between text-xs text-dim mt-2">' +
    '    <span>融资进度 ' + prog + '%</span><span>' + fans + ' 家机构关注</span>' +
    '  </div>' +
    '  <div class="flex gap-2 mt-4">' +
    '    <a href="analysis.html?id=' + (p.id || '') + '" class="btn btn-ghost flex-1" style="padding:8px 12px;font-size:13px;">查看分析</a>' +
    (isLoggedIn
      ? '    <button class="btn btn-gold" style="padding:8px 12px;font-size:13px;" onclick="doFollow(' + (p.id || 0) + ', this)">+ 关注</button>'
      : '    <a href="auth.html?tab=register" class="btn btn-gold" style="padding:8px 12px;font-size:13px;">注册参与</a>') +
    '  </div>' +
    (isLoggedIn
      ? '  <div class="flex gap-1 mt-2 flex-wrap">' +
        '    <button class="skill-btn" style="padding:5px 10px;font-size:11px;" data-skill="pe-vc-investment:筛项目"' +
        '            data-context="公司：' + (p.name || '') + '；行业：' + (p.sector || '') + '；轮次：' + (p.stage || '') + '；融资 ' + amt + '；估值 ' + val + '。">' +
        '      <span class="skill-btn-icon">🎯</span>筛项目</button>' +
        '    <button class="skill-btn" style="padding:5px 10px;font-size:11px;" data-skill="pe-vc-investment:投决备忘录"' +
        '            data-context="项目：' + (p.name || '') + '；轮次：' + (p.stage || '') + '；融资 ' + amt + '；估值 ' + val + '；AI 评分 ' + score + '。">' +
        '      <span class="skill-btn-icon">🗂️</span>IC Memo</button>' +
        '  </div>'
      : '') +
    '</div>'
  );
}

async function doFollow(projectId, btn) {
  if (!projectId) return;
  try {
    btn.disabled = true;
    await VCPlat.api('/api/follows/' + projectId, { method: 'POST' });
    btn.textContent = '已关注';
    btn.classList.remove('btn-gold');
    btn.classList.add('btn-ghost');
  } catch (e) {
    btn.disabled = false;
    if (e.message.includes('已关注') || e.message.includes('Already')) {
      btn.textContent = '已关注';
    } else {
      alert('操作失败：' + e.message);
    }
  }
}

// 加载路演项目列表
async function loadProjects() {
  const grid = document.getElementById("project-grid");
  grid.innerHTML = '<div class="col-span-3 text-center py-12 text-dim">加载中…</div>';
  try {
    const data = await VCPlat.api('/api/roadshow?page=1&limit=12');
    const list = data.roadshows || data.projects || data.data || [];
    grid.innerHTML = '';
    if (list.length === 0) {
      grid.innerHTML = '<div class="col-span-3 text-center py-12 text-dim">暂无路演项目</div>';
      return;
    }
    list.forEach(p => grid.insertAdjacentHTML("beforeend", renderCard(p)));
  } catch (e) {
    try {
      const data2 = await VCPlat.api('/api/projects?page=1&limit=12');
      const list2 = data2.projects || data2.data || [];
      grid.innerHTML = '';
      list2.forEach(p => grid.insertAdjacentHTML("beforeend", renderCard(p)));
    } catch (e2) {
      grid.innerHTML = '<div class="col-span-3 text-center py-12 text-dim">加载失败：' + e.message + '</div>';
    }
  }
}

// 加载直播/即将开始的路演
async function loadLiveRoadshows() {
  const liveGrid = document.getElementById("live-grid");
  const liveCount = document.getElementById("live-count");
  try {
    const data = await VCPlat.api('/api/roadshow/live');
    const list = data.roadshows || [];
    liveCount.textContent = '· ' + list.length + ' 场';
    liveGrid.innerHTML = '';
    if (list.length === 0) {
      liveGrid.innerHTML = '<div class="col-span-3 text-center py-6 text-dim text-sm">暂无直播路演</div>';
      return;
    }
    const gradients = [
      'radial-gradient(at 30% 20%, rgba(212,175,55,.25), transparent 60%), linear-gradient(135deg,#0d1322,#1a233a)',
      'radial-gradient(at 70% 30%, rgba(79,141,255,.25), transparent 60%), linear-gradient(135deg,#0d1322,#1a233a)',
      'radial-gradient(at 50% 50%, rgba(139,92,246,.25), transparent 60%), linear-gradient(135deg,#0d1322,#1a233a)',
    ];
    list.slice(0, 3).forEach((r, i) => {
      const isLive = r.status === 'live';
      const isUpcoming = r.status === 'upcoming' || r.status === 'scheduled';
      const viewers = r.viewer_count || 0;
      const reservations = r.reservation_count || 0;
      liveGrid.insertAdjacentHTML("beforeend",
        '<div class="hairline rounded-xl overflow-hidden">' +
        '  <div class="relative aspect-video" style="background:' + gradients[i % 3] + ';">' +
        (isLive
          ? '    <div class="absolute top-3 left-3 chip" style="background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:#fca5a5;">' +
            '      <span class="w-2 h-2 rounded-full bg-red-400 inline-block mr-1"></span>LIVE</div>'
          : '    <div class="absolute top-3 left-3 chip">' + (r.scheduled_at ? new Date(r.scheduled_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) + ' 开始' : '即将开始') + '</div>') +
        '    <div class="absolute top-3 right-3 chip">' +
        (isLive
          ? '观看 <span class="font-mono text-gold-2 ml-1">' + viewers.toLocaleString() + '</span>'
          : '已预约 <span class="font-mono text-gold-2 ml-1">' + reservations + '</span>') +
        '</div>' +
        '    <div class="absolute bottom-3 left-3 right-3">' +
        '      <div class="font-serif-cn text-base font-bold">' + (r.title || '').replace(/\.\.\.\[登录查看完整内容\]/g, '') + '</div>' +
        '      <div class="text-xs text-mute mt-1">' + (r.presenter || '') + (r.duration_min ? ' · ' + r.duration_min + '分钟' : '') + '</div>' +
        (VCPlat.isAdmin() && !isLive ? '      <button onclick="startLive(' + r.id + ')" class="btn btn-gold text-[10px] mt-1 py-0.5 px-2">开播</button>' :
         !isLive ? '      <button onclick="applyLiveStream(' + r.id + ')" class="btn btn-ghost text-[10px] mt-1 py-0.5 px-2">申请直播</button>' : '') +
        '    </div>' +
        (isLive
          ? '    <button class="absolute inset-0 m-auto w-14 h-14 rounded-full flex items-center justify-center" style="background:rgba(212,175,55,.85);" onclick="location.href=\'live.html?id=' + r.id + '\'">' +
            '      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#0a0f1c" d="M8 5v14l11-7z"/></svg></button>'
          : '    <button class="absolute inset-0 m-auto w-14 h-14 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,.08);border:1px solid var(--line);" onclick="doReserve(' + r.id + ', this)">' +
            '      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#f1d77a" stroke-width="1.6"/><path d="M12 7v5l3 2" stroke="#f1d77a" stroke-width="1.6" stroke-linecap="round"/></svg></button>') +
        '  </div>' +
        '</div>'
      );
    });
  } catch (e) {
    liveGrid.innerHTML = '<div class="col-span-3 text-center py-6 text-dim text-sm">直播信息加载失败</div>';
  }
}

async function doReserve(roadshowId, btn) {
  if (!VCPlat.isLoggedIn()) { location.href = 'auth.html'; return; }
  try {
    await VCPlat.api('/api/roadshow/' + roadshowId + '/reserve', { method: 'POST' });
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#5eead4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    btn.style.borderColor = 'rgba(94,234,212,.4)';
    btn.style.background = 'rgba(94,234,212,.1)';
  } catch (e) { alert('预约失败：' + e.message); }
}

loadLiveRoadshows();
loadProjects();

// 管理员直接开播
async function startLive(roadshowId) {
  if (!confirm('确定开始直播？')) return;
  try {
    await VCPlat.api('/api/live/' + roadshowId + '/start', { method: 'POST' });
    location.href = 'live.html?id=' + roadshowId + '&role=presenter';
  } catch (e) { alert('开播失败：' + e.message); }
}

// 创业者申请直播权限
async function applyLiveStream(roadshowId) {
  if (!VCPlat.isLoggedIn()) { location.href = 'auth.html'; return; }
  const reason = prompt('请简要说明申请直播的原因（如：我是该项目创始人，准备进行融资路演）：') || '';
  try {
    await VCPlat.api('/api/live-applications', { method: 'POST', body: { roadshowId, reason } });
    alert('直播申请已提交，请等待管理员审批');
  } catch (e) {
    alert(e.message || '申请失败');
  }
}
</script>
</body>
