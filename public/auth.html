<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 / 注册 — 矿脉科技 MinePulse</title>
  <link rel="icon" href="logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <main class="flex-1 flex items-center justify-center px-4 pt-20 pb-12">
    <div class="w-full max-w-md">
      <div class="flex mb-8 rounded-xl bg-mine-surface border border-mine-border p-1">
        <button id="tab-login" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors bg-mine-gold/15 text-mine-gold">登录</button>
        <button id="tab-register" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors text-mine-text2 hover:text-mine-gold">注册</button>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">邮箱 / 手机号</label>
          <input type="text" id="login-account" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="your@email.com 或 13800138000" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">密码</label>
          <input type="password" id="login-password" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="至少8位" />
        </div>
        <div id="login-error" class="hidden text-sm text-mine-danger"></div>
        <button type="submit" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">登录</button>

        <!-- 微信扫码登录 -->
        <div class="relative my-4">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-mine-border"></div></div>
          <div class="relative flex justify-center"><span class="bg-mine-surface px-3 text-xs text-mine-text3">或</span></div>
        </div>
        <div id="wx-login-section">
          <button type="button" id="wx-login-btn" onclick="wxLogin()"
                  class="w-full py-3 rounded-lg bg-[#07C160] text-white font-semibold flex items-center justify-center gap-2 hover:bg-[#06AD56] transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.531c0 2.227 1.213 4.243 3.203 5.641l-.798 2.399 2.79-1.395c.962.267 1.972.416 3.016.444l-.002-.042c0-3.934 3.717-7.127 8.296-7.127.269 0 .535.012.798.034C16.667 4.934 13.005 2.188 8.691 2.188zm-2.97 4.742a1.01 1.01 0 110 2.02 1.01 1.01 0 010-2.02zm5.94 0a1.01 1.01 0 110 2.02 1.01 1.01 0 010-2.02zM16.505 9.73c-4.146 0-7.51 2.805-7.51 6.267 0 3.462 3.364 6.267 7.51 6.267.837 0 1.643-.12 2.397-.34l2.203 1.1-.63-1.89c1.588-1.117 2.54-2.747 2.54-4.537 0-3.462-3.364-6.267-7.51-6.267zm-2.49 3.78a.808.808 0 110 1.616.808.808 0 010-1.616zm4.98 0a.808.808 0 110 1.616.808.808 0 010-1.616z"/></svg>
            微信扫码登录
          </button>
          <div id="wx-login-tip" class="hidden mt-3 p-3 rounded-lg bg-mine-surface2 border border-mine-border text-xs text-mine-text3 text-center">
            <div class="mb-2">请使用微信扫描下方二维码登录</div>
            <div id="wx-qr-placeholder" class="w-32 h-32 mx-auto bg-mine-surface border border-mine-border rounded-lg flex items-center justify-center text-mine-text3">
              配置后显示
            </div>
            <div class="mt-2 text-[10px]">需管理员配置 WX_APPID 环境变量</div>
          </div>
          <!-- 微信绑定表单 -->
          <div id="wx-bind-form" class="hidden mt-3 space-y-2 p-3 rounded-lg bg-mine-surface2 border border-mine-border">
            <p class="text-xs text-mine-text3">首次微信登录需绑定已有账号</p>
            <input type="email" id="wx-bind-email" class="w-full px-3 py-2 rounded-lg bg-mine-surface border border-mine-border text-mine-text text-sm" placeholder="绑定的邮箱" />
            <input type="password" id="wx-bind-password" class="w-full px-3 py-2 rounded-lg bg-mine-surface border border-mine-border text-mine-text text-sm" placeholder="密码" />
            <button type="button" onclick="wxBind()" class="w-full py-2 rounded-lg bg-[#07C160] text-white text-sm font-medium">绑定并登录</button>
          </div>
        </div>

        <div class="text-center mt-2">
          <button type="button" id="admin-login-btn" class="text-xs text-mine-text3 hover:text-mine-gold underline">管理员登录</button>
        </div>
      </form>

      <form id="register-form" class="space-y-5 hidden">
        <!-- 注册方式切换 -->
        <div class="flex rounded-lg bg-mine-surface2 border border-mine-border p-1">
          <button type="button" id="reg-tab-email" class="flex-1 py-1.5 text-xs font-medium rounded-md transition-colors bg-mine-gold/15 text-mine-gold">邮箱注册</button>
          <button type="button" id="reg-tab-phone" class="flex-1 py-1.5 text-xs font-medium rounded-md transition-colors text-mine-text2 hover:text-mine-gold">手机号注册</button>
        </div>

        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">机构类型</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="cursor-pointer">
              <input type="radio" name="reg-role" value="investor" checked class="peer sr-only" />
              <div class="text-center py-3 rounded-lg border border-mine-border bg-mine-surface2 peer-checked:border-mine-gold peer-checked:bg-mine-gold/10 peer-checked:text-mine-gold text-sm text-mine-text2 transition-colors">投资机构</div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="reg-role" value="mine_enterprise" class="peer sr-only" />
              <div class="text-center py-3 rounded-lg border border-mine-border bg-mine-surface2 peer-checked:border-mine-gold peer-checked:bg-mine-gold/10 peer-checked:text-mine-gold text-sm text-mine-text2 transition-colors">矿业企业</div>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">姓名 / 联系人</label>
          <input type="text" id="reg-name" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="真实姓名" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">机构名称</label>
          <input type="text" id="reg-org" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="公司名称" />
        </div>

        <!-- 邮箱注册字段 -->
        <div id="reg-email-field">
          <label class="block text-sm text-mine-text2 mb-1.5">邮箱</label>
          <input type="email" id="reg-email" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="your@email.com" />
        </div>

        <!-- 手机号注册字段 -->
        <div id="reg-phone-field" class="hidden">
          <label class="block text-sm text-mine-text2 mb-1.5">手机号</label>
          <div class="flex gap-2">
            <input type="tel" id="reg-phone" class="flex-1 px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="13800138000" maxlength="11" />
            <button type="button" id="btn-send-code" class="px-3 py-2 rounded-lg bg-mine-gold/20 border border-mine-gold/40 text-mine-gold text-xs font-medium whitespace-nowrap hover:bg-mine-gold/30 transition-colors">获取验证码</button>
          </div>
          <div class="mt-2">
            <input type="text" id="reg-sms-code" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="短信验证码" maxlength="6" />
          </div>
        </div>

        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">密码</label>
          <input type="password" id="reg-password" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="至少8位" />
        </div>
        <div id="reg-error" class="hidden text-sm text-mine-danger"></div>
        <button type="submit" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">注册</button>
        <p class="text-xs text-mine-text3 text-center">注册即表示同意平台服务协议</p>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const initialMode = params.get('mode') || 'login';
    const initialRole = params.get('role') || 'investor';

    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    function showLogin() {
      tabLogin.classList.add('bg-mine-gold/15', 'text-mine-gold'); tabLogin.classList.remove('text-mine-text2');
      tabRegister.classList.remove('bg-mine-gold/15', 'text-mine-gold'); tabRegister.classList.add('text-mine-text2');
      loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
    }
    function showRegister() {
      tabRegister.classList.add('bg-mine-gold/15', 'text-mine-gold'); tabRegister.classList.remove('text-mine-text2');
      tabLogin.classList.remove('bg-mine-gold/15', 'text-mine-gold'); tabLogin.classList.add('text-mine-text2');
      registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    }

    tabLogin.addEventListener('click', showLogin);
    tabRegister.addEventListener('click', showRegister);
    if (initialMode === 'register') showRegister();
    if (initialRole === 'mine_enterprise') document.querySelector('input[value="mine_enterprise"]').checked = true;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const account = document.getElementById('login-account').value.trim();
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ account, email: account, password }) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
        } else { err.textContent = data.error || '登录失败'; err.classList.remove('hidden'); }
      } catch (e) { err.textContent = '网络错误'; err.classList.remove('hidden'); }
    });

    document.getElementById('admin-login-btn').addEventListener('click', () => {
      document.getElementById('login-account').value = 'admin@mine-cap.com';
      document.getElementById('login-password').value = 'password';
    });

    // ── 注册方式切换 ──
    let regMode = 'email';
    const regTabEmail = document.getElementById('reg-tab-email');
    const regTabPhone = document.getElementById('reg-tab-phone');
    const regEmailField = document.getElementById('reg-email-field');
    const regPhoneField = document.getElementById('reg-phone-field');

    regTabEmail.addEventListener('click', () => {
      regMode = 'email';
      regTabEmail.classList.add('bg-mine-gold/15', 'text-mine-gold');
      regTabEmail.classList.remove('text-mine-text2');
      regTabPhone.classList.remove('bg-mine-gold/15', 'text-mine-gold');
      regTabPhone.classList.add('text-mine-text2');
      regEmailField.classList.remove('hidden');
      regPhoneField.classList.add('hidden');
    });

    regTabPhone.addEventListener('click', () => {
      regMode = 'phone';
      regTabPhone.classList.add('bg-mine-gold/15', 'text-mine-gold');
      regTabPhone.classList.remove('text-mine-text2');
      regTabEmail.classList.remove('bg-mine-gold/15', 'text-mine-gold');
      regTabEmail.classList.add('text-mine-text2');
      regPhoneField.classList.remove('hidden');
      regEmailField.classList.add('hidden');
    });

    // ── 发送短信验证码 ──
    document.getElementById('btn-send-code').addEventListener('click', async () => {
      const phone = document.getElementById('reg-phone').value.trim();
      const btn = document.getElementById('btn-send-code');
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入正确的11位手机号码');
        return;
      }
      try {
        btn.disabled = true;
        btn.textContent = '发送中...';
        const res = await fetch('/api/auth/send-sms-code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone }) });
        const data = await res.json();
        if (res.ok) {
          let countdown = 60;
          btn.textContent = `${countdown}s`;
          const timer = setInterval(() => {
            countdown--;
            if (countdown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '获取验证码'; }
            else { btn.textContent = `${countdown}s`; }
          }, 1000);
        } else {
          alert(data.error || '发送失败');
          btn.disabled = false;
          btn.textContent = '获取验证码';
        }
      } catch (e) {
        alert('发送失败');
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    });

    // ── 微信扫码登录 ──
    let wxOpenid = null;
    function wxLogin() {
      // 先检查后端是否配置了微信
      // 如果有 WX_APPID，跳微信授权页；否则提示
      const tip = document.getElementById('wx-login-tip');
      tip.classList.toggle('hidden');
    }
    // 微信回调处理（从微信授权页跳回时 URL 会带 code）
    async function handleWxCallback() {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      if (!code) return;
      try {
        const res = await fetch('/api/auth/wx-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        if (data.bound) {
          // 已绑定 → 登录成功
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          // 未绑定 → 显示绑定表单
          wxOpenid = data.openid;
          document.getElementById('wx-login-tip').classList.remove('hidden');
          document.getElementById('wx-bind-form').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('login-error').textContent = '微信登录失败';
        document.getElementById('login-error').classList.remove('hidden');
      }
    }
    async function wxBind() {
      const email = document.getElementById('wx-bind-email').value;
      const password = document.getElementById('wx-bind-password').value;
      if (!email || !password || !wxOpenid) return;
      try {
        const res = await fetch('/api/auth/wx-bind', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ openid: wxOpenid, email, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          document.getElementById('login-error').textContent = data.error || '绑定失败';
          document.getElementById('login-error').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('login-error').textContent = '绑定失败';
        document.getElementById('login-error').classList.remove('hidden');
      }
    }
    // 自动检测微信回调
    handleWxCallback();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = document.querySelector('input[name="reg-role"]:checked').value;
      const name = document.getElementById('reg-name').value.trim();
      const org = document.getElementById('reg-org').value.trim();
      const password = document.getElementById('reg-password').value;
      const err = document.getElementById('reg-error');
      err.classList.add('hidden');

      let body;
      if (regMode === 'phone') {
        const phone = document.getElementById('reg-phone').value.trim();
        const smsCode = document.getElementById('reg-sms-code').value.trim();
        if (!name || !phone || !password || !smsCode) { err.textContent = '请填写所有必填项'; err.classList.remove('hidden'); return; }
        if (password.length < 8) { err.textContent = '密码至少8位'; err.classList.remove('hidden'); return; }
        body = { name, phone, password, sms_code: smsCode, organization: org, role, org_type: role };
      } else {
        const email = document.getElementById('reg-email').value.trim();
        if (!name || !email || !password) { err.textContent = '请填写必填项'; err.classList.remove('hidden'); return; }
        if (password.length < 8) { err.textContent = '密码至少8位'; err.classList.remove('hidden'); return; }
        body = { name, email, password, organization: org, role, org_type: role };
      }

      try {
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else { err.textContent = data.error || '注册失败'; err.classList.remove('hidden'); }
      } catch (e) { err.textContent = '网络错误'; err.classList.remove('hidden'); }
    });
  </script>
  <script src="/nav-component.js"></script>
</body>
</html>
