<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目详情 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', warning: '#f59e0b',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    .mineral-tag { background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.25); }
    .score-bar-bg { background: #1a1a26; border-radius: 4px; height: 8px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .ai-panel { background: linear-gradient(180deg, rgba(201,169,110,0.06) 0%, rgba(18,18,26,0) 100%); border: 1px solid rgba(201,169,110,0.15); }
    .risk-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
    .risk-medium { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); }
    .risk-low { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); }
  </style>
</head>
<body class="min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-mine-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-mine-gold/20 flex items-center justify-center border border-mine-gold/30"><span class="text-lg">⛏️</span></div>
          <span class="text-lg font-bold gold-gradient">矿资资本</span>
        </a>
        <div class="flex items-center gap-6">
          <a href="/live.html" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">直播路演</a>
          <a href="/dashboard.html" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">会员中心</a>
          <a href="/" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">返回首页</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-20 pb-12 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div id="project-content"></div>
    <div id="ai-analysis-panel"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const projectId = params.get('id');
    const token = localStorage.getItem('mine_token');
    let currentProject = null;

    async function loadProject() {
      if (!projectId) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">项目不存在</p>'; return; }
      try {
        const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
        const res = await fetch('/api/mine-projects/' + projectId, { headers });
        const p = await res.json();
        if (!res.ok) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">' + (p.error || '加载失败') + '</p>'; return; }
        currentProject = p;

        const mineralLabels = { gold: '金矿', silver: '银矿', copper: '铜矿', lead: '铅矿', zinc: '锌矿' };
        const stageLabels = { 'general-exploration': '普查', 'detailed-exploration': '详查', 'prospecting': '勘探', 'feasibility': '可研', 'production-ready': '待产', 'production': '生产中' };
        const mineTypeLabels = { 'open-pit': '露天矿', 'underground': '地下矿', 'combined': '联合开采' };
        const licenseLabels = { valid: '有效', expired: '过期', 'about-to-expire': '即将过期' };

        const minerals = p.mineral_types.split(',').map(m => `<span class="text-xs px-2 py-0.5 rounded mineral-tag text-mine-gold">${mineralLabels[m] || m}</span>`).join('');
        const highlights = p.highlights ? p.highlights.split('|').map(h => `<span class="text-xs text-mine-text2 bg-mine-surface2 px-3 py-1 rounded-full">${h}</span>`).join('') : '';
        const isLoggedIn = !!token && !p.notice;

        document.getElementById('project-content').innerHTML = `
          <div class="mb-6">
            <div class="flex flex-wrap items-center gap-2 mb-3">
              ${minerals}
              ${p.is_hot ? '<span class="text-xs px-2 py-0.5 rounded bg-mine-danger/20 text-mine-danger border border-mine-danger/30">热门</span>' : ''}
              <span class="text-xs px-2 py-0.5 rounded bg-mine-surface3 text-mine-text2">${stageLabels[p.development_stage] || p.development_stage}</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">${p.name}</h1>
            <div class="flex flex-wrap items-center gap-4 text-sm text-mine-text3">
              <span>${p.code}</span>
              <span>${p.province} · ${p.city}</span>
              <span>矿区面积 ${p.area_km2} km²</span>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 space-y-6">
              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <h2 class="text-lg font-semibold mb-4">项目描述</h2>
                <p class="text-sm text-mine-text2 leading-relaxed">${isLoggedIn ? (p.full_description || p.description) : (p.description_masked || p.description)}</p>
                ${p.notice ? `<div class="mt-4 p-3 rounded-lg bg-mine-gold/10 border border-mine-gold/30"><p class="text-xs text-mine-gold">${p.notice}</p></div>` : ''}
              </div>

              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <h2 class="text-lg font-semibold mb-4">核心亮点</h2>
                <div class="flex flex-wrap gap-2">${highlights}</div>
              </div>

              ${isLoggedIn && p.ai_summary ? `
                <div class="p-6 rounded-2xl ai-panel">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🤖</span>
                    <h2 class="text-lg font-semibold gold-gradient">AI 分析摘要</h2>
                  </div>
                  <p class="text-sm text-mine-text2 leading-relaxed">${p.ai_summary}</p>
                  ${p.ai_score ? `<div class="mt-3 flex items-center gap-2"><span class="text-xs text-mine-text3">综合评分</span><span class="text-lg font-bold text-mine-success">${p.ai_score}</span><span class="text-xs text-mine-text3">/100</span></div>` : ''}
                </div>
              ` : ''}
            </div>

            <div class="space-y-6">
              <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                <div class="text-xs text-mine-text3 mb-1">挂牌价格</div>
                <div class="text-3xl font-bold gold-gradient mb-4">${p.asking_price}</div>
                ${p.ai_score ? `<div class="flex items-center justify-between mb-3"><span class="text-sm text-mine-text2">AI评分</span><span class="text-xl font-bold text-mine-success">${p.ai_score}</span></div>` : ''}
                <div class="space-y-2 text-sm">
                  <div class="flex justify-between"><span class="text-mine-text3">资源储量</span><span class="text-mine-text">${p.estimated_reserve || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">平均品位</span><span class="text-mine-text">${p.reserve_grade || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">矿床类型</span><span class="text-mine-text">${mineTypeLabels[p.mine_type] || p.mine_type}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">开采深度</span><span class="text-mine-text">${p.depth_range || '-'}</span></div>
                  <div class="flex justify-between"><span class="text-mine-text3">许可证状态</span><span class="text-mine-text">${licenseLabels[p.license_status] || p.license_status}</span></div>
                  ${isLoggedIn && p.license_expires ? `<div class="flex justify-between"><span class="text-mine-text3">有效期至</span><span class="text-mine-text">${p.license_expires}</span></div>` : ''}
                </div>
              </div>

              ${isLoggedIn ? `
                <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                  <h3 class="text-sm font-semibold mb-3">联系方式</h3>
                  <p class="text-sm text-mine-text2">${p.contact_masked || '请联系平台获取'}</p>
                  <button onclick="submitInquiry(${p.id}, '${p.name}')" class="w-full mt-4 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors">表达意向</button>
                </div>
              ` : `
                <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border text-center">
                  <p class="text-sm text-mine-text2 mb-3">注册会员可查看完整项目详情与联系方式</p>
                  <a href="/auth.html" class="inline-block px-6 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors">立即注册</a>
                </div>
              `}

              ${isLoggedIn && p.disposal_options ? `
                <div class="p-6 rounded-2xl bg-mine-surface border border-mine-border">
                  <h3 class="text-sm font-semibold mb-3">建议处置方式</h3>
                  <div class="flex flex-wrap gap-2">
                    ${p.disposal_options.split(',').map(o => `<span class="text-xs px-2 py-1 rounded bg-mine-surface2 text-mine-text2">${o.trim()}</span>`).join('')}
                  </div>
                </div>
              ` : ''}

              ${isLoggedIn ? `
                <div class="p-6 rounded-2xl ai-panel">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🤖</span>
                    <h3 class="text-sm font-semibold gold-gradient">AI 投资价值分析</h3>
                  </div>
                  <p class="text-xs text-mine-text3 mb-4">基于紫金矿业五阶段评价体系，对项目进行系统评估</p>
                  <button onclick="runAIAnalysis()" id="ai-analyze-btn" class="w-full py-2.5 rounded-lg border border-mine-gold/40 text-mine-gold font-semibold text-sm hover:bg-mine-gold/10 transition-colors">
                    生成深度分析报告
                  </button>
                </div>
              ` : `
                <div class="p-6 rounded-2xl ai-panel">
                  <div class="flex items-center gap-2 mb-3">
                    <span class="text-lg">🤖</span>
                    <h3 class="text-sm font-semibold gold-gradient">AI 投资价值分析</h3>
                  </div>
                  <p class="text-xs text-mine-text3 mb-2">基于紫金矿业五阶段评价体系，系统评估矿产项目投资价值</p>
                  <div class="space-y-1.5 mb-3">
                    <div class="flex items-center gap-1.5 text-xs text-mine-text2"><span class="text-mine-gold">◆</span>五阶段评分（草根→运营）</div>
                    <div class="flex items-center gap-1.5 text-xs text-mine-text2"><span class="text-mine-gold">◆</span>财务指标估算（NPV/IRR/AISC）</div>
                    <div class="flex items-center gap-1.5 text-xs text-mine-text2"><span class="text-mine-gold">◆</span>风险评价与处置建议</div>
                  </div>
                  <a href="/auth.html" class="block w-full py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm text-center hover:bg-mine-goldLight transition-colors">登录查看AI分析</a>
                </div>
              `}
            </div>
          </div>
        `;
      } catch (e) { document.getElementById('project-content').innerHTML = '<p class="text-center text-mine-text3 py-20">加载失败</p>'; }
    }

    async function runAIAnalysis() {
      const btn = document.getElementById('ai-analyze-btn');
      if (!btn) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="inline-block animate-spin mr-2">⟳</span>分析中...';

      try {
        const res = await fetch('/api/mine-analysis/analyze', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: parseInt(projectId), analysis_type: 'value_assessment' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '分析失败');
        renderAIAnalysis(data.analysis);
      } catch (err) {
        alert('AI分析失败: ' + err.message);
        btn.disabled = false;
        btn.innerText = '生成深度分析报告';
      }
    }

    function renderAIAnalysis(analysis) {
      const panel = document.getElementById('ai-analysis-panel');
      if (!panel) return;

      const scoreColor = analysis.overallScore >= 80 ? 'text-mine-success' : (analysis.overallScore >= 60 ? 'text-mine-warning' : 'text-mine-danger');
      const barColor = analysis.overallScore >= 80 ? '#22c55e' : (analysis.overallScore >= 60 ? '#f59e0b' : '#ef4444');

      const dimensionsHtml = (analysis.dimensions || []).map((d, i) => {
        const pct = d.max > 0 ? (d.score / d.max * 100) : 0;
        const dimColor = pct >= 70 ? '#22c55e' : (pct >= 50 ? '#f59e0b' : '#ef4444');
        return `
          <div class="mb-3">
            <div class="flex items-center justify-between text-xs mb-1">
              <span class="text-mine-text2">${d.name}</span>
              <span class="text-mine-text">${d.score}/${d.max} <span class="text-mine-text3">(${d.weight}分制)</span></span>
            </div>
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${dimColor};"></div></div>
            ${d.note ? `<p class="text-[10px] text-mine-text3 mt-0.5">${d.note}</p>` : ''}
          </div>
        `;
      }).join('');

      const fin = analysis.financials || {};
      const finHtml = fin.npv !== undefined && fin.npv !== 0 ? `
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">NPV</div>
            <div class="text-sm font-bold text-mine-success">${fin.npv > 0 ? '$' + fin.npv + 'M' : '—'}</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">IRR</div>
            <div class="text-sm font-bold text-mine-gold">${fin.irr || 0}%</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">回收期</div>
            <div class="text-sm font-bold text-mine-text">${fin.payback || 0}年</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">AISC</div>
            <div class="text-sm font-bold text-mine-text">$${fin.aisc || 0}<span class="text-[10px]">${fin.aiscUnit ? fin.aiscUnit.replace('USD/','/') : '/oz'}</span></div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">年产规模</div>
            <div class="text-sm font-bold text-mine-text">${fin.annualCapacity || 0}万吨</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">矿山寿命</div>
            <div class="text-sm font-bold text-mine-text">${fin.mineLife || 0}年</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">资本开支</div>
            <div class="text-sm font-bold text-mine-text">$${fin.totalCapex || 0}M</div>
          </div>
          <div class="p-3 rounded-xl bg-mine-surface2 border border-mine-border text-center">
            <div class="text-[10px] text-mine-text3 mb-1">成本分位</div>
            <div class="text-sm font-bold ${fin.costQuartile <= 50 ? 'text-mine-success' : 'text-mine-warning'}">${fin.costQuartile || 50}%</div>
          </div>
        </div>
        <p class="text-[10px] text-mine-text3 mb-4">* 财务指标基于项目公开信息简化估算，仅供参考，不构成投资建议</p>
      ` : `
        <div class="p-4 rounded-xl bg-mine-surface2 border border-mine-border text-center mb-4">
          <p class="text-xs text-mine-text3">当前阶段财务指标估算数据不足，建议进入技术研究阶段后获取完整财务评价</p>
        </div>
      `;

      const risksHtml = (analysis.risks || []).map(r => {
        const cls = r.level === '高' ? 'risk-high text-mine-danger' : (r.level === '中' ? 'risk-medium text-mine-warning' : 'risk-low text-mine-success');
        return `<div class="p-3 rounded-lg ${cls} text-xs mb-2"><span class="font-semibold">[${r.category}]</span> ${r.detail}</div>`;
      }).join('');

      const disposalHtml = (analysis.disposalAdvice || []).map(d => {
        const suitColor = d.suitability === '高' ? 'text-mine-success' : (d.suitability === '中' ? 'text-mine-warning' : 'text-mine-text3');
        return `
          <tr class="border-b border-mine-border">
            <td class="py-2 text-xs text-mine-text">${d.option}</td>
            <td class="py-2 text-xs font-semibold ${suitColor}">${d.suitability}</td>
            <td class="py-2 text-xs text-mine-text3">${d.note}</td>
          </tr>
        `;
      }).join('');

      const recsHtml = (analysis.recommendations || []).map(r => `<li class="text-xs text-mine-text2 mb-1 flex items-start gap-2"><span class="text-mine-gold mt-0.5">▸</span>${r}</li>`).join('');

      panel.innerHTML = `
        <div class="p-6 rounded-2xl ai-panel mb-8">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 rounded-xl bg-mine-gold/15 flex items-center justify-center border border-mine-gold/30">
              <span class="text-xl">⛏️</span>
            </div>
            <div>
              <h2 class="text-lg font-bold gold-gradient">AI 投资价值深度分析</h2>
              <p class="text-xs text-mine-text3">${analysis.evaluationModel || '紫金矿业五阶段评价体系'}</p>
            </div>
            <div class="ml-auto text-right">
              <div class="text-3xl font-bold ${scoreColor}">${analysis.overallScore}</div>
              <div class="text-[10px] text-mine-text3">综合评分/100</div>
            </div>
          </div>

          <div class="mb-2">
            <span class="text-xs px-2 py-0.5 rounded bg-mine-gold/15 text-mine-gold border border-mine-gold/25">${analysis.stage?.name || '项目评价'}</span>
            <span class="text-xs text-mine-text3 ml-2">第 ${analysis.stage?.phase || '-'} 阶段</span>
          </div>

          <div class="score-bar-bg mb-6" style="height:10px;">
            <div class="score-bar-fill" style="width:${analysis.overallScore}%;background:${barColor};"></div>
          </div>

          <p class="text-sm text-mine-text2 leading-relaxed mb-6">${analysis.summary || ''}</p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="p-5 rounded-xl bg-mine-surface border border-mine-border">
              <h3 class="text-sm font-semibold mb-4 flex items-center gap-2"><span class="text-mine-gold">◆</span>评价维度</h3>
              ${dimensionsHtml}
            </div>
            <div class="p-5 rounded-xl bg-mine-surface border border-mine-border">
              <h3 class="text-sm font-semibold mb-4 flex items-center gap-2"><span class="text-mine-gold">◆</span>财务指标估算</h3>
              ${finHtml}
            </div>
          </div>

          <div class="p-5 rounded-xl bg-mine-surface border border-mine-border mb-6">
            <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><span class="text-mine-gold">◆</span>风险评价</h3>
            ${risksHtml || '<p class="text-xs text-mine-text3">暂无风险数据</p>'}
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="p-5 rounded-xl bg-mine-surface border border-mine-border">
              <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><span class="text-mine-gold">◆</span>处置建议</h3>
              <table class="w-full text-left">
                <thead><tr class="text-[10px] text-mine-text3 border-b border-mine-border"><th class="pb-2 font-normal">方式</th><th class="pb-2 font-normal">适配度</th><th class="pb-2 font-normal">说明</th></tr></thead>
                <tbody>${disposalHtml || '<tr><td class="py-2 text-xs text-mine-text3" colspan="3">暂无建议</td></tr>'}</tbody>
              </table>
            </div>
            <div class="p-5 rounded-xl bg-mine-surface border border-mine-border">
              <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><span class="text-mine-gold">◆</span>尽调建议</h3>
              <ul class="list-none">${recsHtml || '<li class="text-xs text-mine-text3">暂无建议</li>'}</ul>
            </div>
          </div>
        </div>
      `;

      // 滚动到分析面板
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function submitInquiry(projectId, name) {
      const budget = prompt(`对「${name}」表达意向沟通\n请输入您的预算范围（可选）：`);
      if (budget === null) return;
      fetch('/api/mine-inquiries', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ project_id: projectId, budget }) })
        .then(() => alert('意向已提交'))
        .catch(() => alert('提交失败'));
    }

    loadProject();
  </script>
</body>
</html>
