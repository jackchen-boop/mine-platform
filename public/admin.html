<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>系统管理后台 · 星链创投</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/theme.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body data-page="admin">

<header class="top-nav">
  <div class="max-w-[1440px] mx-auto px-6 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <path d="M20 3 L36 12 L36 28 L20 37 L4 28 L4 12 Z" stroke="#d4af37" stroke-width="1.4" fill="rgba(212,175,55,0.06)"/>
        <path d="M14 24 L20 14 L26 24" stroke="#f1d77a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="font-serif-cn text-base brand-wordmark font-bold">星链创投</div>
    </a>
    <div class="flex items-center gap-3">
      <span class="chip chip-gold text-xs">系统管理员</span>
      <a href="/dashboard.html" class="text-xs text-dim hover:text-gold-2">用户中心</a>
      <button onclick="VCPlat.logout()" class="text-xs text-dim hover:text-red-400">退出</button>
    </div>
  </div>
</header>

<!-- 移动端管理后台屏蔽提示 -->
<div class="mobile-admin-block fixed inset-0 z-50 flex-col items-center justify-center bg-[#0a0a0f] text-center px-8">
  <div class="text-6xl mb-6 opacity-30">&#128187;</div>
  <div class="font-serif-cn text-2xl font-bold mb-3">请使用电脑端访问</div>
  <div class="text-mute text-sm mb-6">管理后台功能仅支持电脑端操作，请在电脑浏览器中打开此页面。</div>
  <a href="/dashboard.html" class="btn btn-gold">返回用户中心</a>
</div>

<div class="flex max-w-[1440px] mx-auto px-6 pt-8 pb-20 gap-6 admin-sidebar-hide">

  <!-- Sidebar -->
  <div class="w-48 flex-shrink-0">
    <div class="glass p-3 space-y-1 sticky top-24">
      <div class="text-[10px] text-dim tracking-widest px-3 py-2">管理菜单</div>
      <button onclick="showTab('overview')"  class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm active" id="nav-overview">概览</button>
      <button onclick="showTab('users')"     class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-users">用户管理</button>
      <button onclick="showTab('projects')"  class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-projects">项目管理</button>
      <button onclick="showTab('roadshows')" class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-roadshows">路演管理</button>
      <button onclick="showTab('partners')"  class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-partners">合作机构</button>
      <button onclick="showTab('reports')"   class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-reports">AI 报告</button>
      <button onclick="showTab('stats')"     class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-stats">平台统计</button>
      <button onclick="showTab('logs')"      class="admin-nav w-full text-left px-3 py-2 rounded-lg text-sm" id="nav-logs">操作日志</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="flex-1 min-w-0">

    <!-- 概览 -->
    <div id="tab-overview" class="admin-tab space-y-6">
      <h2 class="font-serif-cn text-2xl font-bold">管理控制台</h2>

      <!-- KPI Grid -->
      <div class="grid grid-cols-3 md:grid-cols-6 gap-4" id="kpi-grid">
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">注册用户</div><div class="stat-num text-2xl mt-1" id="kpi-users">—</div></div>
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">在库项目</div><div class="stat-num text-2xl mt-1" id="kpi-projects">—</div></div>
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">AI 报告</div><div class="stat-num text-2xl mt-1" id="kpi-reports">—</div></div>
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">BP 上传</div><div class="stat-num text-2xl mt-1" id="kpi-bps">—</div></div>
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">路演场次</div><div class="stat-num text-2xl mt-1" id="kpi-roadshows">—</div></div>
        <div class="glass p-4 text-center"><div class="text-[10px] text-dim">合作机构</div><div class="stat-num text-2xl mt-1" id="kpi-partners">—</div></div>
      </div>

      <!-- 今日数据 -->
      <div class="glass p-6">
        <h3 class="font-bold text-sm mb-4">今日新增</h3>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="hairline rounded-xl p-4"><div class="text-[10px] text-dim">新用户</div><div class="text-gold-2 text-xl font-mono mt-1" id="today-users">0</div></div>
          <div class="hairline rounded-xl p-4"><div class="text-[10px] text-dim">AI 报告</div><div class="text-gold-2 text-xl font-mono mt-1" id="today-reports">0</div></div>
          <div class="hairline rounded-xl p-4"><div class="text-[10px] text-dim">BP 上传</div><div class="text-gold-2 text-xl font-mono mt-1" id="today-bps">0</div></div>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-5">
        <!-- 最近用户 -->
        <div class="glass p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm">最近注册用户</h3>
            <button onclick="showTab('users')" class="text-xs text-gold-2">查看全部</button>
          </div>
          <div id="recent-users" class="space-y-2 text-sm"></div>
        </div>
        <!-- 最近报告 -->
        <div class="glass p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm">最近 AI 报告</h3>
            <button onclick="showTab('reports')" class="text-xs text-gold-2">查看全部</button>
          </div>
          <div id="recent-reports-admin" class="space-y-2 text-sm"></div>
        </div>
      </div>

      <!-- 行业分布 -->
      <div class="glass p-6">
        <h3 class="font-bold text-sm mb-4">项目行业分布</h3>
        <div id="sector-dist" class="space-y-3"></div>
      </div>
    </div>

    <!-- 用户管理 -->
    <div id="tab-users" class="admin-tab hidden">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif-cn text-xl font-bold">用户管理</h2>
        <div class="flex gap-3">
          <input id="user-search" class="input text-sm py-1.5" style="width:200px" placeholder="搜索用户名/邮箱" oninput="searchUsers()" />
          <button onclick="openUserForm()" class="btn btn-gold text-sm py-1.5">新增用户</button>
        </div>
      </div>
      <div id="users-table" class="glass overflow-hidden">
        <div class="text-dim text-sm p-6">加载中...</div>
      </div>
    </div>

    <!-- 项目管理 -->
    <div id="tab-projects" class="admin-tab hidden">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif-cn text-xl font-bold">项目管理</h2>
        <button onclick="openProjectForm()" class="btn btn-gold text-sm py-1.5">新增项目</button>
      </div>
      <div id="projects-table" class="space-y-3">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

    <!-- 路演管理 -->
    <div id="tab-roadshows" class="admin-tab hidden">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif-cn text-xl font-bold">路演管理</h2>
        <button onclick="openRoadshowForm()" class="btn btn-gold text-sm py-1.5">新增路演</button>
      </div>
      <div id="roadshows-table" class="space-y-3">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

    <!-- 合作机构 -->
    <div id="tab-partners" class="admin-tab hidden">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif-cn text-xl font-bold">合作机构管理</h2>
        <button onclick="openPartnerForm()" class="btn btn-gold text-sm py-1.5">新增机构</button>
      </div>
      <div id="partners-table" class="space-y-3">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

    <!-- AI 报告 -->
    <div id="tab-reports" class="admin-tab hidden">
      <h2 class="font-serif-cn text-xl font-bold mb-5">AI 报告总览</h2>
      <div id="all-reports-list" class="space-y-3">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

    <!-- 平台统计 -->
    <div id="tab-stats" class="admin-tab hidden">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif-cn text-xl font-bold">平台统计数据</h2>
        <button onclick="recalcStats()" class="btn btn-ghost text-sm">重新计算</button>
      </div>
      <div id="stats-content" class="space-y-5">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

    <!-- 操作日志 -->
    <div id="tab-logs" class="admin-tab hidden">
      <h2 class="font-serif-cn text-xl font-bold mb-5">操作日志</h2>
      <div id="logs-list" class="space-y-2">
        <div class="text-dim text-sm">加载中...</div>
      </div>
    </div>

  </div>
</div>

<script src="assets/api.js"></script>
<script>
// 权限检查
document.addEventListener("DOMContentLoaded", async function() {
  if (!VCPlat.isLoggedIn()) { location.href = "/auth.html"; return; }
  if (!VCPlat.isAdmin()) {
    alert("权限不足，此页面仅管理员可访问");
    location.href = "/dashboard.html"; return;
  }
  loadOverview();
});

async function loadOverview() {
  try {
    const data = await VCPlat.api("/api/admin/dashboard");
    const o = data.overview;
    document.getElementById("kpi-users").textContent     = o.userTotal;
    document.getElementById("kpi-projects").textContent  = o.projectTotal;
    document.getElementById("kpi-reports").textContent   = o.reportTotal;
    document.getElementById("kpi-bps").textContent       = o.bpTotal;
    document.getElementById("kpi-roadshows").textContent = o.roadshowTotal;
    document.getElementById("kpi-partners").textContent  = o.partnerTotal;
    document.getElementById("today-users").textContent   = data.today.users;
    document.getElementById("today-reports").textContent = data.today.reports;
    document.getElementById("today-bps").textContent     = data.today.bps;

    // 最近用户
    document.getElementById("recent-users").innerHTML = data.recentUsers.map(u =>
      `<div class="flex items-center justify-between hairline rounded-lg px-3 py-2">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-700 flex items-center justify-center text-xs font-bold text-black">${u.avatar_letter||u.name[0]}</div>
          <div><div class="text-sm font-bold">${u.name}</div><div class="text-xs text-dim">${u.email}</div></div>
        </div>
        <div class="flex items-center gap-2">
          <span class="chip text-xs">${u.role}</span>
          <span class="text-[10px] text-dim">${fmtDate(u.created_at)}</span>
        </div>
      </div>`
    ).join("") || "<div class='text-dim text-xs'>暂无</div>";

    // 最近报告
    document.getElementById("recent-reports-admin").innerHTML = data.recentReports.map(r =>
      `<div class="hairline rounded-lg px-3 py-2">
        <div class="flex items-center justify-between">
          <span class="text-sm font-bold truncate max-w-[180px]">${r.title||"AI报告"}</span>
          <span class="chip text-xs">${r.skill_key||r.report_type}</span>
        </div>
        <div class="text-xs text-dim mt-0.5">${r.user_name||"用户"} · ${r.bp_filename||r.project_name||""} · ${fmtDate(r.created_at)}</div>
      </div>`
    ).join("") || "<div class='text-dim text-xs'>暂无</div>";

    // 行业分布
    const maxCnt = Math.max(...data.sectorDist.map(s => s.cnt), 1);
    document.getElementById("sector-dist").innerHTML = data.sectorDist.map(s =>
      `<div class="flex items-center gap-3">
        <div class="w-20 text-xs text-dim text-right flex-shrink-0">${s.sector}</div>
        <div class="flex-1 bar-track"><div class="bar-fill" style="width:${(s.cnt/maxCnt*100).toFixed(0)}%"></div></div>
        <div class="w-8 text-xs font-mono text-gold-2 text-right">${s.cnt}</div>
      </div>`
    ).join("");
  } catch(e) { console.error(e.message); }
}

async function loadUsers(search = "") {
  const el = document.getElementById("users-table");
  try {
    const url = "/api/users" + (search ? `?search=${encodeURIComponent(search)}` : "");
    const { users } = await VCPlat.api(url);
    el.innerHTML = `<table class="w-full text-sm">
      <thead><tr class="border-b border-white/5 text-dim text-xs">
        <th class="text-left px-4 py-3">用户</th><th class="text-left px-4 py-3">邮箱</th>
        <th class="text-left px-4 py-3">角色</th><th class="text-left px-4 py-3">机构</th>
        <th class="text-left px-4 py-3">状态</th><th class="text-left px-4 py-3">操作</th>
      </tr></thead>
      <tbody>
        ${users.map(u => `<tr class="border-b border-white/5 hover:bg-white/2">
          <td class="px-4 py-3"><div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-700 flex items-center justify-center text-xs font-bold text-black">${u.avatar_letter||u.name[0]}</div>
            <span class="font-bold">${u.name}</span>
          </div></td>
          <td class="px-4 py-3 text-dim">${u.email}</td>
          <td class="px-4 py-3"><span class="chip text-xs">${u.role}</span></td>
          <td class="px-4 py-3 text-dim text-xs">${u.organization||"—"}</td>
          <td class="px-4 py-3"><span class="chip ${u.status==='active'?'chip-green':''} text-xs">${u.status==='active'?'正常':'禁用'}</span></td>
          <td class="px-4 py-3">
            <div class="flex gap-2 items-center">
              <button onclick="openUserForm(${u.id})" class="text-xs text-blue-300 hover:text-blue-200">编辑</button>
              <button onclick="deleteUser(${u.id},'${(u.name||'').replace(/'/g,"\\'")}')" class="text-xs text-red-400 hover:text-red-300">删除</button>
              <select onchange="changeUserRole(${u.id},this.value)" class="text-xs bg-transparent border border-white/10 rounded px-1 py-0.5">
                <option value="investor" ${u.role==='investor'?'selected':''}>投资人</option>
                <option value="entrepreneur" ${u.role==='entrepreneur'?'selected':''}>创业者</option>
                <option value="admin" ${u.role==='admin'?'selected':''}>管理员</option>
              </select>
              <button onclick="toggleUserStatus(${u.id},'${u.status==='active'?'suspended':'active'}',this)" class="text-xs ${u.status==='active'?'text-red-400 hover:text-red-300':'text-green-400 hover:text-green-300'}">${u.status==='active'?'禁用':'启用'}</button>
            </div>
          </td>
        </tr>`).join("")}
      </tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<div class="text-red-400 text-sm p-4">${e.message}</div>`; }
}

let searchTimer;
function searchUsers() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadUsers(document.getElementById("user-search")?.value), 400);
}

async function changeUserRole(id, role) {
  try { await VCPlat.api(`/api/users/${id}/role`, { method:"PUT", body:{role} }); }
  catch(e) { alert(e.message); }
}

async function toggleUserStatus(id, newStatus, btn) {
  try {
    await VCPlat.api(`/api/users/${id}/status`, { method:"PUT", body:{status:newStatus} });
    btn.closest("tr").querySelector(".chip:last-of-type").textContent = newStatus==='active'?'正常':'禁用';
    btn.textContent = newStatus==='active'?'禁用':'启用';
    btn.className = `text-xs ${newStatus==='active'?'text-red-400 hover:text-red-300':'text-green-400 hover:text-green-300'}`;
    btn.onclick = () => toggleUserStatus(id, newStatus==='active'?'suspended':'active', btn);
  } catch(e) { alert(e.message); }
}

async function loadProjects() {
  const el = document.getElementById("projects-table");
  try {
    const { projects } = await VCPlat.api("/api/projects?limit=20");
    el.innerHTML = projects.map(p =>
      `<div class="glass p-4 flex items-center justify-between hover:border-yellow-500/30 transition">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg glass flex items-center justify-center font-serif-cn font-bold text-gold-2">${p.code_letter||p.name[0]}</div>
          <div>
            <div class="font-bold text-sm">${p.name} <span class="text-xs text-dim">${p.name_en||""}</span></div>
            <div class="text-xs text-dim">${p.sector} · ${p.round||""} · ${p.location||""}</div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="font-mono text-xs text-gold-2">AI ${p.ai_score||"--"}</span>
          ${p.is_hot ? '<span class="chip chip-gold text-xs">热门</span>' : ''}
          <span class="chip text-xs">${p.status}</span>
          <button onclick="toggleHot(${p.id},${p.is_hot?0:1},this)" class="text-xs text-dim hover:text-gold-2">${p.is_hot?'取消热门':'设为热门'}</button>
          <button onclick="openProjectForm(${p.id})" class="text-xs text-blue-300 hover:text-blue-200">编辑</button>
          <button onclick="deleteProject(${p.id},'${(p.name||'').replace(/'/g,"\\'")}')" class="text-xs text-red-400 hover:text-red-300">删除</button>
        </div>
      </div>`
    ).join("") || "<div class='text-dim text-sm'>暂无项目</div>";
  } catch(e) { el.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function toggleHot(id, val, btn) {
  try {
    await VCPlat.api(`/api/projects/${id}`, { method:"PUT", body:{ is_hot: val } });
    btn.textContent = val ? "取消热门" : "设为热门";
    btn.onclick = () => toggleHot(id, val?0:1, btn);
  } catch(e) { alert(e.message); }
}

async function loadRoadshows() {
  const el = document.getElementById("roadshows-table");
  try {
    const { roadshows } = await VCPlat.api("/api/roadshow?limit=20");
    el.innerHTML = roadshows.map(r =>
      `<div class="glass p-4 flex items-center justify-between">
        <div>
          <div class="font-bold text-sm">${r.title}</div>
          <div class="text-xs text-dim">${r.presenter||""} · ${r.scheduled_at||""}</div>
        </div>
        <div class="flex items-center gap-3">
          <span class="chip text-xs">${r.status}</span>
          <span class="text-xs text-mute">${r.viewer_count||0} 观看 / ${r.reservation_count||0} 预约</span>
          <select onchange="updateRoadshowStatus(${r.id},this.value)" class="text-xs bg-transparent border border-white/10 rounded px-1 py-0.5">
            <option value="upcoming" ${r.status==='upcoming'?'selected':''}>预约中</option>
            <option value="live"     ${r.status==='live'?'selected':''}>直播中</option>
            <option value="completed" ${r.status==='completed'?'selected':''}>已结束</option>
          </select>
          <button onclick="openRoadshowForm(${r.id})" class="text-xs text-blue-300 hover:text-blue-200">编辑</button>
          <button onclick="deleteRoadshow(${r.id},'${(r.title||'').replace(/'/g,"\\'")}')" class="text-xs text-red-400 hover:text-red-300">删除</button>
        </div>
      </div>`
    ).join("") || "<div class='text-dim text-sm'>暂无路演</div>";
  } catch(e) { el.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function updateRoadshowStatus(id, status) {
  try { await VCPlat.api(`/api/roadshow/${id}`, { method:"PUT", body:{status} }); }
  catch(e) { alert(e.message); }
}

async function loadPartners() {
  const el = document.getElementById("partners-table");
  try {
    const { partners } = await VCPlat.api("/api/partners?limit=20");
    el.innerHTML = partners.map(p =>
      `<div class="glass p-4 flex items-center justify-between">
        <div>
          <div class="font-serif-cn font-bold text-sm">${p.name} <span class="text-dim text-xs">${p.name_en||""}</span></div>
          <div class="text-xs text-dim">${p.type} · ${p.stage_preference||""} · ${p.sector_count||0} 赛道</div>
        </div>
        <div class="flex items-center gap-3">
          ${p.is_featured ? '<span class="chip chip-gold text-xs">精选</span>' : ''}
          <span class="text-xs font-mono text-gold-2">${p.platform_deals||0} 单</span>
          ${p.fund_size ? `<span class="text-xs text-dim">${p.fund_size}</span>` : ''}
          <button onclick="openPartnerForm(${p.id})" class="text-xs text-blue-300 hover:text-blue-200">编辑</button>
          <button onclick="deletePartner(${p.id},'${(p.name||'').replace(/'/g,"\\'")}')" class="text-xs text-red-400 hover:text-red-300">删除</button>
        </div>
      </div>`
    ).join("") || "<div class='text-dim text-sm'>暂无机构</div>";
  } catch(e) { el.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function loadStats() {
  try {
    const data = await VCPlat.api("/api/admin/stats");
    const { stats, userByRole, projectBySector, reportTrend } = data;

    const statsHtml = Object.entries(stats).map(([k, v]) =>
      `<div class="glass p-4 flex items-center justify-between">
        <div><div class="text-sm font-bold">${k}</div><div class="text-xs text-dim">${v.description||""}</div></div>
        <div class="text-gold-2 font-mono text-xl">${v.displayValue}</div>

    ).join("");

    const roleHtml = userByRole.map(r =>
      `<div class="flex items-center justify-between text-sm"><span class="text-dim">${r.role}</span><span class="font-mono text-gold-2">${r.cnt}</span></div>`
    ).join("");

    const trendHtml = reportTrend.map(t =>
      `<div class="flex items-center justify-between text-sm"><span class="text-dim">${t.month}</span><span class="font-mono">${t.cnt} 份</span></div>`
    ).join("");

    document.getElementById("stats-content").innerHTML = `
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">${statsHtml}</div>
      <div class="grid md:grid-cols-2 gap-5">
        <div class="glass p-5"><h3 class="font-bold text-sm mb-4">用户角色分布</h3>${roleHtml}</div>
        <div class="glass p-5"><h3 class="font-bold text-sm mb-4">报告月度趋势</h3>${trendHtml||"<div class='text-dim text-xs'>暂无数据</div>"}</div>
      </div>`;
  } catch(e) { document.getElementById("stats-content").innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }

async function loadLogs() {

    el.innerHTML = logs.map(l =>

function showTab(name) {
  document.querySelectorAll(".admin-tab").forEach(t => t.classList.add("hidden"));
  document.querySelectorAll(".admin-nav").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name)?.classList.remove("hidden");
  document.getElementById("nav-" + name)?.classList.add("active");
  if (name === "users")     loadUsers();
  if (name === "projects")  loadProjects();
  if (name === "roadshows") loadRoadshows();
  if (name === "partners")  loadPartners();
  if (name === "stats")     loadStats();
  if (name === "logs")      loadLogs();
}

function fmtDate(s) {
  if (!s) return "";
  return new Date(s).toLocaleDateString("zh-CN", {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

/* ===== 通用弹窗 ===== */
function openModal(title, fields, values, onSubmit) {
  closeModal();
  const wrap = document.createElement('div');
  wrap.id = 'crud-modal';
  wrap.className = 'fixed inset-0 z-50 flex items-center justify-center';
  wrap.innerHTML = `
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative glass p-6 w-full max-w-lg mx-4 max-h-[85vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-serif-cn text-lg font-bold">${title}</h3>
        <button onclick="closeModal()" class="text-dim hover:text-white text-xl">&times;</button>
      </div>
      <form id="crud-form" class="space-y-4">
        ${fields.map(f => {
          const val = values ? (values[f.key] ?? '') : '';
          if (f.type === 'select') {
            return `<div><label class="text-xs text-dim block mb-1">${f.label}${f.required?' *':''}</label>
              <select name="${f.key}" class="input text-sm" ${f.required?'required':''}>
                ${f.options.map(o => `<option value="${o.value}" ${val==o.value?'selected':''}>${o.label}</option>`).join('')}
              </select></div>`;
          } else if (f.type === 'textarea') {
            return `<div><label class="text-xs text-dim block mb-1">${f.label}${f.required?' *':''}</label>
              <textarea name="${f.key}" class="input text-sm" rows="3" ${f.required?'required':''}>${val}</textarea></div>`;
          } else if (f.type === 'checkbox') {
            return `<div class="flex items-center gap-2">
              <input type="checkbox" name="${f.key}" ${val?'checked':''} class="w-4 h-4 accent-yellow-500" />
              <label class="text-sm">${f.label}</label></div>`;
          } else if (f.type === 'datetime-local') {
            const dv = val ? new Date(val).toISOString().slice(0,16) : '';
            return `<div><label class="text-xs text-dim block mb-1">${f.label}${f.required?' *':''}</label>
              <input type="datetime-local" name="${f.key}" value="${dv}" class="input text-sm" ${f.required?'required':''} /></div>`;
          } else {
            return `<div><label class="text-xs text-dim block mb-1">${f.label}${f.required?' *':''}</label>
              <input type="${f.type||'text'}" name="${f.key}" value="${String(val).replace(/"/g,'&quot;')}" class="input text-sm" ${f.required?'required':''} ${f.placeholder?`placeholder="${f.placeholder}"`:''} /></div>`;
          }
        }).join('')}
      </form>
      <div class="flex gap-3 mt-5">
        <button onclick="closeModal()" class="btn btn-ghost text-sm flex-1">取消</button>
        <button id="crud-save-btn" class="btn btn-gold text-sm flex-1">保存</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  document.getElementById('crud-save-btn').onclick = async () => {
    const form = document.getElementById('crud-form');
    const data = {};
    fields.forEach(f => {
      const el = form.querySelector(`[name="${f.key}"]`);
      if (f.type === 'checkbox') data[f.key] = el.checked ? 1 : 0;
      else data[f.key] = el.value.trim();
    });
    await onSubmit(data);
  };
  // ESC 关闭
  wrap._escHandler = (e) => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', wrap._escHandler);
}

function closeModal() {
  const m = document.getElementById('crud-modal');
  if (m) { document.removeEventListener('keydown', m._escHandler); m.remove(); }
}
