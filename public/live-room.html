<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播间 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', info: '#3b82f6',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    video { background: #0a0a0f; object-fit: cover; }
    .chat-msg-own { background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.25); }
    .chat-msg-other { background: #1a1a26; border: 1px solid #2a2a3a; }
    input:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 2px rgba(201,169,110,0.15); }
    .speaker-request-item { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body class="min-h-screen">
  <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-mine-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-md bg-mine-gold/20 flex items-center justify-center border border-mine-gold/30"><span class="text-sm">⛏️</span></div>
          <span class="text-base font-bold gold-gradient">矿资资本</span>
        </a>
        <div class="flex items-center gap-3">
          <a href="/live.html" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">直播列表</a>
          <span id="room-status" class="text-xs px-2 py-0.5 rounded-full bg-mine-success/20 text-mine-success border border-mine-success/30">加载中</span>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-14 pb-4 h-screen flex flex-col lg:flex-row overflow-hidden">
    <!-- 视频区 -->
    <div class="flex-1 flex flex-col min-h-0">
      <div class="flex-1 bg-black relative flex items-center justify-center">
        <!-- 主播视频 -->
        <video id="broadcaster-video" class="w-full h-full" autoplay playsinline muted></video>
        <!-- 发言者视频（画中画） -->
        <div id="speaker-video-container" class="hidden absolute bottom-4 right-4 w-48 h-36 rounded-lg overflow-hidden border border-mine-border bg-mine-surface shadow-lg">
          <video id="speaker-video" class="w-full h-full" autoplay playsinline></video>
        </div>
        <!-- 直播信息浮层 -->
        <div class="absolute top-4 left-4 right-4 flex items-start justify-between pointer-events-none">
          <div>
            <h1 id="stream-title" class="text-lg font-bold text-white drop-shadow-lg">加载中...</h1>
            <p id="stream-presenter" class="text-sm text-white/80 drop-shadow-lg mt-0.5">加载中...</p>
          </div>
          <div id="viewer-count" class="text-xs text-white/80 drop-shadow-lg flex items-center gap-1 bg-black/40 px-2 py-1 rounded-full">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
            <span id="viewer-num">0</span>
          </div>
        </div>
        <!-- 主播控制栏 -->
        <div id="broadcaster-controls" class="hidden absolute bottom-4 left-4 right-4 flex items-center justify-center gap-3 pointer-events-auto">
          <button onclick="toggleMic()" id="btn-mic" class="w-10 h-10 rounded-full bg-mine-surface/80 border border-mine-border flex items-center justify-center text-mine-text hover:bg-mine-surface transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
          </button>
          <button onclick="toggleCamera()" id="btn-camera" class="w-10 h-10 rounded-full bg-mine-surface/80 border border-mine-border flex items-center justify-center text-mine-text hover:bg-mine-surface transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          </button>
          <button onclick="shareScreen()" id="btn-screen" class="w-10 h-10 rounded-full bg-mine-surface/80 border border-mine-border flex items-center justify-center text-mine-text hover:bg-mine-surface transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </button>
          <button onclick="endStream()" class="px-4 py-2 rounded-full bg-mine-danger/80 text-white text-sm font-medium hover:bg-mine-danger transition-colors">结束直播</button>
        </div>
        <!-- 观众控制栏 -->
        <div id="viewer-controls" class="hidden absolute bottom-4 left-4 right-4 flex items-center justify-center gap-3 pointer-events-auto">
          <button onclick="requestSpeaker()" id="btn-request" class="px-5 py-2.5 rounded-full bg-mine-gold/90 text-mine-bg text-sm font-semibold hover:bg-mine-gold transition-colors">申请发言</button>
          <button onclick="cancelSpeaker()" id="btn-cancel-request" class="hidden px-5 py-2.5 rounded-full bg-mine-surface/80 border border-mine-border text-mine-text text-sm hover:bg-mine-surface transition-colors">取消申请</button>
        </div>
        <!-- 发言人控制栏 -->
        <div id="speaker-controls" class="hidden absolute bottom-4 left-4 right-4 flex items-center justify-center gap-3 pointer-events-auto">
          <button onclick="toggleSpeakerMic()" id="btn-spk-mic" class="w-10 h-10 rounded-full bg-mine-success/80 flex items-center justify-center text-white hover:bg-mine-success transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
          </button>
          <span class="text-sm text-white drop-shadow-lg bg-black/40 px-3 py-1 rounded-full">您正在发言</span>
          <button onclick="leaveSpeaker()" class="px-4 py-2 rounded-full bg-mine-danger/80 text-white text-sm hover:bg-mine-danger transition-colors">结束发言</button>
        </div>
      </div>
    </div>

    <!-- 侧边栏 -->
    <div class="w-full lg:w-80 bg-mine-surface border-t lg:border-t-0 lg:border-l border-mine-border flex flex-col h-96 lg:h-auto">
      <!-- Tab -->
      <div class="flex border-b border-mine-border">
        <button class="side-tab flex-1 py-3 text-sm font-medium text-mine-gold border-b-2 border-mine-gold" data-side="chat">互动聊天</button>
        <button class="side-tab flex-1 py-3 text-sm font-medium text-mine-text3" data-side="speakers">发言管理</button>
      </div>

      <!-- 聊天面板 -->
      <div id="side-chat" class="flex-1 flex flex-col min-h-0">
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-3 border-t border-mine-border">
          <div class="flex gap-2">
            <input type="text" id="chat-input" class="flex-1 px-3 py-2 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="输入消息..." />
            <button onclick="sendChat()" class="px-3 py-2 rounded-lg bg-mine-gold text-mine-bg text-sm font-medium hover:bg-mine-goldLight">发送</button>
          </div>
        </div>
      </div>

      <!-- 发言管理面板 -->
      <div id="side-speakers" class="hidden flex-1 flex flex-col min-h-0">
        <div class="p-4 border-b border-mine-border">
          <h3 class="text-sm font-semibold">发言申请</h3>
          <p class="text-xs text-mine-text3 mt-1">管理员/主播可审批观众发言请求</p>
        </div>
        <div id="speaker-requests" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const streamId = params.get('id');
    const token = localStorage.getItem('mine_token');
    const user = JSON.parse(localStorage.getItem('mine_user') || '{}');

    let streamInfo = null;
    let ws = null;
    let isBroadcaster = false;
    let isSpeaker = false;
    let localStream = null;
    let speakerStream = null;
    let broadcasterPCs = new Map(); // viewerId -> RTCPeerConnection (broadcaster side)
    let viewerPC = null; // viewer's PC to receive from broadcaster
    let speakerPC = null; // speaker's PC to send to broadcaster

    const statusMap = { live: '正在直播', scheduled: '即将开始', ended: '已结束' };

    function authHeaders() { return token ? { 'Authorization': 'Bearer ' + token } : {}; }

    async function init() {
      if (!streamId) { alert('直播ID缺失'); window.location.href = '/live.html'; return; }
      await loadStreamInfo();
      setupSideTabs();
      if (streamInfo.status === 'live') {
        connectWebSocket();
      } else if (streamInfo.status === 'scheduled') {
        document.getElementById('room-status').textContent = '即将开始';
        document.getElementById('room-status').className = 'text-xs px-2 py-0.5 rounded-full bg-mine-info/20 text-mine-info border border-mine-info/30';
      } else {
        document.getElementById('room-status').textContent = '已结束';
        document.getElementById('room-status').className = 'text-xs px-2 py-0.5 rounded-full bg-mine-text3/20 text-mine-text3 border border-mine-text3/30';
      }
    }

    async function loadStreamInfo() {
      try {
        const res = await fetch('/api/live/' + streamId);
        const data = await res.json();
        if (!res.ok) { alert(data.error || '直播不存在'); window.location.href = '/live.html'; return; }
        streamInfo = data.stream;
        document.getElementById('stream-title').textContent = streamInfo.title;
        document.getElementById('stream-presenter').textContent = streamInfo.presenter_name + (streamInfo.project_name ? ' · ' + streamInfo.project_name : '');
        document.getElementById('room-status').textContent = statusMap[streamInfo.status] || streamInfo.status;
        if (streamInfo.status === 'live') {
          document.getElementById('room-status').className = 'text-xs px-2 py-0.5 rounded-full bg-mine-danger/20 text-mine-danger border border-mine-danger/30 live-badge';
        }

        // 判断角色
        isBroadcaster = (user.id === streamInfo.presenter_id) || (user.role === 'admin');
        if (isBroadcaster) {
          document.getElementById('broadcaster-controls').classList.remove('hidden');
          startBroadcasting();
        } else {
          if (streamInfo.status === 'live') {
            document.getElementById('viewer-controls').classList.remove('hidden');
          }
        }
      } catch (e) { console.error(e); }
    }

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host + '/ws/live');

      ws.onopen = () => {
        let role = isBroadcaster ? 'broadcaster' : 'viewer';
        if (isSpeaker) role = 'speaker';
        ws.send(JSON.stringify({
          type: 'join-room',
          roomToken: streamInfo.room_token,
          role: role,
          userId: user.id || 'guest-' + Math.random().toString(36).slice(2,8),
          userName: user.name || '游客'
        }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleWsMessage(msg);
      };

      ws.onclose = () => {
        console.log('WS disconnected');
        setTimeout(() => { if (streamInfo && streamInfo.status === 'live') connectWebSocket(); }, 3000);
      };
    }

    function handleWsMessage(msg) {
      switch (msg.type) {
        case 'joined':
          if (msg.viewerCount !== undefined) document.getElementById('viewer-num').textContent = msg.viewerCount;
          break;
        case 'viewer-joined':
          document.getElementById('viewer-num').textContent = msg.count;
          if (isBroadcaster) createOfferForViewer(msg.userId, msg.userName);
          break;
        case 'viewer-left':
          document.getElementById('viewer-num').textContent = msg.count;
          if (isBroadcaster && broadcasterPCs.has(msg.userId)) {
            broadcasterPCs.get(msg.userId).close();
            broadcasterPCs.delete(msg.userId);
          }
          break;
        case 'offer':
          if (!isBroadcaster) handleViewerOffer(msg);
          else handleBroadcasterOffer(msg);
          break;
        case 'answer':
          if (isBroadcaster) handleBroadcasterAnswer(msg);
          else handleViewerAnswer(msg);
          break;
        case 'ice-candidate':
          if (isBroadcaster) handleBroadcasterIce(msg);
          else handleViewerIce(msg);
          break;
        case 'chat':
        case 'chat-history':
          displayChat(msg);
          break;
        case 'speaker-requested':
          if (isBroadcaster) addSpeakerRequest(msg.userId, msg.userName);
          break;
        case 'speaker-approved':
          if (!isBroadcaster && !isSpeaker) becomeSpeaker();
          break;
        case 'speaker-denied':
          if (!isBroadcaster) {
            alert('您的发言申请未通过');
            document.getElementById('btn-request').classList.remove('hidden');
            document.getElementById('btn-cancel-request').classList.add('hidden');
          }
          break;
        case 'speaker-approved-broadcast':
          if (isBroadcaster) addChatSystem(`${msg.userName} 开始发言`);
          break;
        case 'broadcaster-left':
          addChatSystem('主播已离开直播间');
          break;
        case 'speaker-offer':
          if (isBroadcaster) handleSpeakerOffer(msg);
          break;
        case 'speaker-answer':
          if (isSpeaker) handleSpeakerAnswer(msg);
          break;
        case 'speaker-ice':
          if (isBroadcaster) handleSpeakerIce(msg);
          else if (isSpeaker) handleSpeakerIceFromBroadcaster(msg);
          break;
        case 'broadcaster-joined':
          if (!isBroadcaster) {
            // Reconnect as viewer
            if (viewerPC) { viewerPC.close(); viewerPC = null; }
            setupViewerPC();
          }
          break;
      }
    }

    // ========== WebRTC: Broadcaster ==========
    async function startBroadcasting() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('broadcaster-video').srcObject = localStream;
      } catch (e) {
        console.log('getUserMedia failed:', e);
        alert('无法获取摄像头，请检查权限设置');
      }
    }

    function createOfferForViewer(viewerId, viewerName) {
      if (!localStream) return;
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      broadcasterPCs.set(viewerId, pc);

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = (e) => {
        if (e.candidate && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'ice-candidate', candidate: e.candidate, targetUserId: viewerId }));
        }
      };

      pc.createOffer().then(offer => {
        pc.setLocalDescription(offer);
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'offer', sdp: offer, targetUserId: viewerId }));
        }
      }).catch(e => console.error('createOffer error:', e));
    }

    function handleBroadcasterOffer(msg) {
      // Speaker offers to broadcaster
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      // Store speaker PC separately or reuse map with speaker ID
      broadcasterPCs.set('speaker-' + msg.fromUserId, pc);

      pc.ontrack = (e) => {
        document.getElementById('speaker-video').srcObject = e.streams[0];
        document.getElementById('speaker-video-container').classList.remove('hidden');
      };

      pc.onicecandidate = (e) => {
        if (e.candidate && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'speaker-ice', candidate: e.candidate, targetUserId: msg.fromUserId }));
        }
      };

      pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)).then(() => {
        pc.createAnswer().then(answer => {
          pc.setLocalDescription(answer);
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'speaker-answer', sdp: answer, targetUserId: msg.fromUserId }));
          }
        });
      });
    }

    function handleBroadcasterAnswer(msg) {
      const pc = broadcasterPCs.get(msg.fromUserId);
      if (pc) pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    }

    function handleBroadcasterIce(msg) {
      const pc = broadcasterPCs.get(msg.fromUserId) || broadcasterPCs.get('speaker-' + msg.fromUserId);
      if (pc && msg.candidate) pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    // ========== WebRTC: Viewer ==========
    function setupViewerPC() {
      viewerPC = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

      viewerPC.ontrack = (e) => {
        document.getElementById('broadcaster-video').srcObject = e.streams[0];
      };

      viewerPC.onicecandidate = (e) => {
        if (e.candidate && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'ice-candidate', candidate: e.candidate }));
        }
      };

      // Viewer creates offer
      viewerPC.createOffer().then(offer => {
        viewerPC.setLocalDescription(offer);
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'offer', sdp: offer }));
        }
      }).catch(e => console.error('viewer offer error:', e));
    }

    function handleViewerOffer(msg) {
      if (!viewerPC) setupViewerPC();
      // This shouldn't normally happen since viewer creates offer, but handle it
      viewerPC.setRemoteDescription(new RTCSessionDescription(msg.sdp)).then(() => {
        viewerPC.createAnswer().then(answer => {
          viewerPC.setLocalDescription(answer);
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'answer', sdp: answer }));
          }
        });
      });
    }

    function handleViewerAnswer(msg) {
      if (viewerPC) viewerPC.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    }

    function handleViewerIce(msg) {
      if (viewerPC && msg.candidate) viewerPC.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    // ========== WebRTC: Speaker ==========
    async function becomeSpeaker() {
      isSpeaker = true;
      document.getElementById('viewer-controls').classList.add('hidden');
      document.getElementById('speaker-controls').classList.remove('hidden');

      try {
        speakerStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        speakerPC = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        speakerStream.getTracks().forEach(track => speakerPC.addTrack(track, speakerStream));

        speakerPC.onicecandidate = (e) => {
          if (e.candidate && ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'speaker-ice', candidate: e.candidate }));
          }
        };

        speakerPC.createOffer().then(offer => {
          speakerPC.setLocalDescription(offer);
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'speaker-offer', sdp: offer }));
          }
        });
      } catch (e) {
        alert('无法获取摄像头');
        leaveSpeaker();
      }
    }

    function handleSpeakerAnswer(msg) {
      if (speakerPC) speakerPC.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    }

    function handleSpeakerIce(msg) {
      if (speakerPC && msg.candidate) speakerPC.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    function handleSpeakerIceFromBroadcaster(msg) {
      if (speakerPC && msg.candidate) speakerPC.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    // ========== UI Controls ==========
    async function shareScreen() {
      try {
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        const videoTrack = screenStream.getVideoTracks()[0];
        if (localStream) {
          const oldTrack = localStream.getVideoTracks()[0];
          if (oldTrack) localStream.removeTrack(oldTrack);
          localStream.addTrack(videoTrack);
        } else {
          localStream = screenStream;
        }
        document.getElementById('broadcaster-video').srcObject = localStream;
        // Replace track in all peer connections
        broadcasterPCs.forEach(pc => {
          const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
          if (sender) sender.replaceTrack(videoTrack);
        });
        videoTrack.onended = () => { startBroadcasting(); };
      } catch (e) {}
    }

    function toggleMic() {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          document.getElementById('btn-mic').style.opacity = audioTrack.enabled ? '1' : '0.5';
        }
      }
    }

    function toggleCamera() {
      if (localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
          videoTrack.enabled = !videoTrack.enabled;
          document.getElementById('btn-camera').style.opacity = videoTrack.enabled ? '1' : '0.5';
        }
      }
    }

    function toggleSpeakerMic() {
      if (speakerStream) {
        const audioTrack = speakerStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          document.getElementById('btn-spk-mic').style.opacity = audioTrack.enabled ? '1' : '0.5';
        }
      }
    }

    async function endStream() {
      if (!confirm('确定要结束直播吗？')) return;
      try {
        await fetch('/api/live/' + streamId + '/end', { method: 'POST', headers: authHeaders() });
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (ws) ws.close();
        window.location.href = '/live.html';
      } catch (e) {}
    }

    function requestSpeaker() {
      if (!token) { alert('请先登录'); window.location.href = '/auth.html'; return; }
      fetch('/api/live/' + streamId + '/request-speaker', { method: 'POST', headers: authHeaders() })
        .then(r => r.json()).then(d => {
          if (d.success) {
            document.getElementById('btn-request').classList.add('hidden');
            document.getElementById('btn-cancel-request').classList.remove('hidden');
            if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'request-speaker' }));
          }
        });
    }

    function cancelSpeaker() {
      document.getElementById('btn-request').classList.remove('hidden');
      document.getElementById('btn-cancel-request').classList.add('hidden');
    }

    function leaveSpeaker() {
      isSpeaker = false;
      if (speakerStream) { speakerStream.getTracks().forEach(t => t.stop()); speakerStream = null; }
      if (speakerPC) { speakerPC.close(); speakerPC = null; }
      document.getElementById('speaker-controls').classList.add('hidden');
      document.getElementById('viewer-controls').classList.remove('hidden');
      document.getElementById('speaker-video-container').classList.add('hidden');
    }

    // ========== Chat ==========
    function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'chat', text }));
      input.value = '';
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });

    function displayChat(msg) {
      const container = document.getElementById('chat-messages');
      if (msg.type === 'chat-history') {
        container.innerHTML = '';
        msg.messages.forEach(m => appendChatMessage(m));
      } else {
        appendChatMessage(msg);
      }
      container.scrollTop = container.scrollHeight;
    }

    function appendChatMessage(m) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      const isOwn = m.userId === user.id;
      div.className = isOwn ? 'text-right' : 'text-left';
      div.innerHTML = `
        <div class="inline-block max-w-[85%] px-3 py-2 rounded-lg text-sm ${isOwn ? 'chat-msg-own text-mine-text' : 'chat-msg-other text-mine-text2'}">
          <div class="text-xs ${isOwn ? 'text-mine-gold' : 'text-mine-text3'} mb-0.5">${m.userName}</div>
          <div>${escapeHtml(m.text)}</div>
        </div>
      `;
      container.appendChild(div);
    }

    function addChatSystem(text) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'text-center';
      div.innerHTML = `<span class="text-xs text-mine-text3 bg-mine-surface2 px-3 py-1 rounded-full">${escapeHtml(text)}</span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
    }

    // ========== Speaker Management (Broadcaster) ==========
    const pendingSpeakers = new Map();

    function addSpeakerRequest(userId, userName) {
      if (pendingSpeakers.has(userId)) return;
      pendingSpeakers.set(userId, userName);
      renderSpeakerRequests();
    }

    function renderSpeakerRequests() {
      const container = document.getElementById('speaker-requests');
      if (pendingSpeakers.size === 0) {
        container.innerHTML = '<p class="text-sm text-mine-text3 text-center py-8">暂无言申请</p>'; return;
      }
      container.innerHTML = '';
      pendingSpeakers.forEach((name, uid) => {
        const div = document.createElement('div');
        div.className = 'speaker-request-item p-3 rounded-lg bg-mine-surface2 border border-mine-border flex items-center justify-between';
        div.innerHTML = `
          <div>
            <div class="text-sm font-medium">${name}</div>
            <div class="text-xs text-mine-text3">申请发言</div>
          </div>
          <div class="flex gap-2">
            <button onclick="approveSpeaker('${uid}', '${name}')" class="px-3 py-1.5 text-xs rounded bg-mine-success/20 text-mine-success hover:bg-mine-success/30">批准</button>
            <button onclick="denySpeaker('${uid}')" class="px-3 py-1.5 text-xs rounded bg-mine-danger/20 text-mine-danger hover:bg-mine-danger/30">拒绝</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function approveSpeaker(userId, userName) {
      pendingSpeakers.delete(userId);
      renderSpeakerRequests();
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'approve-speaker', userId, userName }));
      }
    }

    function denySpeaker(userId) {
      pendingSpeakers.delete(userId);
      renderSpeakerRequests();
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'deny-speaker', userId }));
      }
    }

    // ========== Side Tabs ==========
    function setupSideTabs() {
      document.querySelectorAll('.side-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.side-tab').forEach(t => {
            t.classList.remove('text-mine-gold', 'border-b-2', 'border-mine-gold');
            t.classList.add('text-mine-text3');
          });
          tab.classList.remove('text-mine-text3');
          tab.classList.add('text-mine-gold', 'border-b-2', 'border-mine-gold');
          document.getElementById('side-chat').classList.add('hidden');
          document.getElementById('side-speakers').classList.add('hidden');
          document.getElementById('side-' + tab.dataset.side).classList.remove('hidden');
        });
      });
    }

    init();
  </script>
</body>
</html>
