<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 / 注册 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    input:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-mine-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-mine-gold/20 flex items-center justify-center border border-mine-gold/30"><span class="text-lg">⛏️</span></div>
          <span class="text-lg font-bold gold-gradient">矿资资本</span>
        </a>
        <a href="/" class="text-sm text-mine-text2 hover:text-mine-gold transition-colors">返回首页</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 pt-20 pb-12">
    <div class="w-full max-w-md">
      <div class="flex mb-8 rounded-xl bg-mine-surface border border-mine-border p-1">
        <button id="tab-login" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors bg-mine-gold/15 text-mine-gold">登录</button>
        <button id="tab-register" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors text-mine-text2 hover:text-mine-gold">注册</button>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">邮箱</label>
          <input type="email" id="login-email" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="your@email.com" value="demo@mine-cap.com" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">密码</label>
          <input type="password" id="login-password" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="至少8位" value="password" />
        </div>
        <div id="login-error" class="hidden text-sm text-mine-danger"></div>
        <button type="submit" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">登录</button>
        <div class="text-center">
          <button type="button" id="admin-login-btn" class="text-xs text-mine-text3 hover:text-mine-gold underline">管理员登录</button>
        </div>
      </form>

      <form id="register-form" class="space-y-5 hidden">
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">机构类型</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="cursor-pointer">
              <input type="radio" name="reg-role" value="investor" checked class="peer sr-only" />
              <div class="text-center py-3 rounded-lg border border-mine-border bg-mine-surface2 peer-checked:border-mine-gold peer-checked:bg-mine-gold/10 peer-checked:text-mine-gold text-sm text-mine-text2 transition-colors">投资机构</div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="reg-role" value="mine_enterprise" class="peer sr-only" />
              <div class="text-center py-3 rounded-lg border border-mine-border bg-mine-surface2 peer-checked:border-mine-gold peer-checked:bg-mine-gold/10 peer-checked:text-mine-gold text-sm text-mine-text2 transition-colors">矿业企业</div>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">姓名 / 联系人</label>
          <input type="text" id="reg-name" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="真实姓名" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">机构名称</label>
          <input type="text" id="reg-org" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="公司名称" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">邮箱</label>
          <input type="email" id="reg-email" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="your@email.com" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">手机号</label>
          <input type="tel" id="reg-phone" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="手机号" />
        </div>
        <div>
          <label class="block text-sm text-mine-text2 mb-1.5">密码</label>
          <input type="password" id="reg-password" class="w-full px-4 py-3 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text placeholder-mine-text3 text-sm" placeholder="至少8位" />
        </div>
        <div id="reg-error" class="hidden text-sm text-mine-danger"></div>
        <button type="submit" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">注册</button>
        <p class="text-xs text-mine-text3 text-center">注册即表示同意平台服务协议</p>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const initialMode = params.get('mode') || 'login';
    const initialRole = params.get('role') || 'investor';

    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    function showLogin() {
      tabLogin.classList.add('bg-mine-gold/15', 'text-mine-gold'); tabLogin.classList.remove('text-mine-text2');
      tabRegister.classList.remove('bg-mine-gold/15', 'text-mine-gold'); tabRegister.classList.add('text-mine-text2');
      loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
    }
    function showRegister() {
      tabRegister.classList.add('bg-mine-gold/15', 'text-mine-gold'); tabRegister.classList.remove('text-mine-text2');
      tabLogin.classList.remove('bg-mine-gold/15', 'text-mine-gold'); tabLogin.classList.add('text-mine-text2');
      registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    }

    tabLogin.addEventListener('click', showLogin);
    tabRegister.addEventListener('click', showRegister);
    if (initialMode === 'register') showRegister();
    if (initialRole === 'mine_enterprise') document.querySelector('input[value="mine_enterprise"]').checked = true;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
        } else { err.textContent = data.error || '登录失败'; err.classList.remove('hidden'); }
      } catch (e) { err.textContent = '网络错误'; err.classList.remove('hidden'); }
    });

    document.getElementById('admin-login-btn').addEventListener('click', () => {
      document.getElementById('login-email').value = 'admin@mine-cap.com';
      document.getElementById('login-password').value = 'password';
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = document.querySelector('input[name="reg-role"]:checked').value;
      const name = document.getElementById('reg-name').value;
      const org = document.getElementById('reg-org').value;
      const email = document.getElementById('reg-email').value;
      const phone = document.getElementById('reg-phone').value;
      const password = document.getElementById('reg-password').value;
      const err = document.getElementById('reg-error');
      err.classList.add('hidden');
      if (!name || !email || !password) { err.textContent = '请填写必填项'; err.classList.remove('hidden'); return; }
      if (password.length < 8) { err.textContent = '密码至少8位'; err.classList.remove('hidden'); return; }
      try {
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password, phone, organization: org, role, org_type: role }) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('mine_token', data.token);
          localStorage.setItem('mine_user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else { err.textContent = data.error || '注册失败'; err.classList.remove('hidden'); }
      } catch (e) { err.textContent = '网络错误'; err.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
