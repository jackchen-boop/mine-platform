<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>直播路演 — 矿资资本 MineCapital</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mine: {
              bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26', surface3: '#22222f',
              gold: '#c9a96e', goldLight: '#e0c88a', goldDark: '#9a7d4a',
              text: '#e2e8f0', text2: '#94a3b8', text3: '#64748b',
              border: '#2a2a3a', danger: '#ef4444', success: '#22c55e', info: '#3b82f6',
            }
          },
          fontFamily: { sans: ['"Noto Sans SC"', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; color: #e2e8f0; }
    .gold-gradient { background: linear-gradient(135deg, #c9a96e, #e0c88a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-blur { backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(201,169,110,0.1); }
    .live-badge { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="min-h-screen">
  <main class="pt-20 pb-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold mb-1">矿权项目<span class="gold-gradient">直播路演</span></h1>
        <p class="text-sm text-mine-text2">项目方实时宣讲，投资方可在线观看并申请交流</p>
      </div>
      <div id="create-btn-area"></div>
    </div>

    <div class="flex gap-4 mb-6 overflow-x-auto pb-1">
      <button class="filter-tab px-4 py-2 text-sm rounded-lg border border-mine-gold/40 bg-mine-gold/15 text-mine-gold font-medium" data-filter="all">全部</button>
      <button class="filter-tab px-4 py-2 text-sm rounded-lg border border-mine-border text-mine-text2 hover:border-mine-gold/40 hover:text-mine-gold transition-colors" data-filter="live">正在直播</button>
      <button class="filter-tab px-4 py-2 text-sm rounded-lg border border-mine-border text-mine-text2 hover:border-mine-gold/40 hover:text-mine-gold transition-colors" data-filter="scheduled">即将开始</button>
      <button class="filter-tab px-4 py-2 text-sm rounded-lg border border-mine-border text-mine-text2 hover:border-mine-gold/40 hover:text-mine-gold transition-colors" data-filter="ended">已结束</button>
    </div>

    <div id="streams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- 创建直播弹窗 -->
    <div id="create-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
      <div class="w-full max-w-lg bg-mine-surface border border-mine-border rounded-2xl p-6">
        <div class="flex items-center justify-between mb-5">
          <h3 class="text-lg font-semibold">创建直播</h3>
          <button onclick="closeModal()" class="text-mine-text3 hover:text-mine-text"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-mine-text2 mb-1.5">直播标题</label>
            <input type="text" id="new-title" class="w-full px-4 py-2.5 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="例如：金岭金矿项目线上路演" />
          </div>
          <div>
            <label class="block text-sm text-mine-text2 mb-1.5">关联项目（可选）</label>
            <select id="new-project" class="w-full px-4 py-2.5 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm">
              <option value="">不关联项目</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-mine-text2 mb-1.5">直播描述</label>
            <textarea id="new-desc" rows="3" class="w-full px-4 py-2.5 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" placeholder="直播内容介绍..."></textarea>
          </div>
          <div>
            <label class="block text-sm text-mine-text2 mb-1.5">计划开始时间（可选）</label>
            <input type="datetime-local" id="new-time" class="w-full px-4 py-2.5 rounded-lg bg-mine-surface2 border border-mine-border text-mine-text text-sm" />
          </div>
          <button onclick="createStream()" class="w-full py-3 rounded-lg bg-mine-gold text-mine-bg font-semibold hover:bg-mine-goldLight transition-colors">创建直播</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('mine_token');
    const user = JSON.parse(localStorage.getItem('mine_user') || '{}');

    if (user.name) document.getElementById('user-name').textContent = user.name;

    // 管理员/项目方才显示创建按钮
    if (user.role === 'admin' || user.role === 'mine_enterprise') {
      document.getElementById('create-btn-area').innerHTML = `
        <button onclick="openModal()" class="px-5 py-2.5 rounded-lg bg-mine-gold text-mine-bg font-semibold text-sm hover:bg-mine-goldLight transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          创建直播
        </button>
      `;
    }

    function authHeaders() { return token ? { 'Authorization': 'Bearer ' + token } : {}; }

    async function loadStreams(filter = 'all') {
      try {
        let url = '/api/live';
        if (filter !== 'all') url += '?status=' + filter;
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();
        const grid = document.getElementById('streams-grid');
        grid.innerHTML = '';

        if (!data.streams || data.streams.length === 0) {
          grid.innerHTML = '<div class="col-span-full text-center py-16 text-mine-text3">暂无直播</div>'; return;
        }

        const statusMap = { live: '正在直播', scheduled: '即将开始', ended: '已结束' };
        const statusColor = { live: 'bg-mine-danger/20 text-mine-danger border-mine-danger/30', scheduled: 'bg-mine-info/20 text-mine-info border-mine-info/30', ended: 'bg-mine-text3/20 text-mine-text3 border-mine-text3/30' };

        data.streams.forEach(s => {
          const div = document.createElement('div');
          div.className = 'rounded-2xl bg-mine-surface border border-mine-border overflow-hidden card-hover cursor-pointer';
          div.innerHTML = `
            <div class="relative h-44 bg-mine-surface2 flex items-center justify-center">
              <div class="text-center">
                <div class="w-16 h-16 rounded-full bg-mine-gold/15 flex items-center justify-center mx-auto mb-3 border border-mine-gold/30">
                  <svg class="w-8 h-8 text-mine-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>
                <span class="text-xs text-mine-text3">${s.status === 'live' ? '点击进入直播间' : '查看详情'}</span>
              </div>
              <div class="absolute top-3 left-3">
                <span class="text-xs px-2.5 py-1 rounded-full border ${statusColor[s.status]} ${s.status === 'live' ? 'live-badge' : ''}">${statusMap[s.status]}</span>
              </div>
              ${s.viewer_count > 0 ? `<div class="absolute top-3 right-3 text-xs text-mine-text2 flex items-center gap-1"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>${s.viewer_count}</div>` : ''}
            </div>
            <div class="p-5">
              <h3 class="text-base font-semibold mb-2 truncate">${s.title}</h3>
              <p class="text-xs text-mine-text3 mb-3">${s.presenter_name || ''}${s.project_name ? ' · ' + s.project_name : ''}</p>
              <p class="text-sm text-mine-text2 mb-3 line-clamp-2">${s.description || ''}</p>
              <div class="flex items-center justify-between pt-3 border-t border-mine-border">
                <span class="text-xs text-mine-text3">${s.scheduled_at ? formatTime(s.scheduled_at) : (s.started_at ? formatTime(s.started_at) : '')}</span>
                <span class="text-xs text-mine-gold font-medium">${s.status === 'live' ? '进入直播间 →' : '查看详情 →'}</span>
              </div>
            </div>
          `;
          div.addEventListener('click', () => {
            window.location.href = '/live-room.html?id=' + s.id;
          });
          grid.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    async function loadProjectsForSelect() {
      try {
        const res = await fetch('/api/mine-projects?limit=100', { headers: authHeaders() });
        const data = await res.json();
        const sel = document.getElementById('new-project');
        data.projects.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });
      } catch (e) {}
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function openModal() { document.getElementById('create-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('create-modal').classList.add('hidden'); }

    async function createStream() {
      const title = document.getElementById('new-title').value;
      const projectId = document.getElementById('new-project').value;
      const desc = document.getElementById('new-desc').value;
      const time = document.getElementById('new-time').value;
      if (!title) { alert('请输入直播标题'); return; }
      try {
        const res = await fetch('/api/live', { method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' }, body: JSON.stringify({ title, project_id: projectId || null, description: desc, scheduled_at: time || null }) });
        const data = await res.json();
        if (res.ok) { closeModal(); loadStreams(); window.location.href = '/live-room.html?id=' + data.id; }
        else alert(data.error || '创建失败');
      } catch (e) { alert('创建失败'); }
    }

    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => {
          b.classList.remove('bg-mine-gold/15', 'text-mine-gold', 'border-mine-gold/40');
          b.classList.add('text-mine-text2', 'border-mine-border');
        });
        btn.classList.remove('text-mine-text2', 'border-mine-border');
        btn.classList.add('bg-mine-gold/15', 'text-mine-gold', 'border-mine-gold/40');
        loadStreams(btn.dataset.filter);
      });
    });

    loadStreams();
    loadProjectsForSelect();
  </script>
  <script src="/nav-component.js"></script>
</body>
</html>
