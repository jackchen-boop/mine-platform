<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>用户中心 · 启明资本</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/theme.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body data-page="dashboard">

<header class="top-nav">
  <div class="max-w-[1280px] mx-auto px-6 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
        <path d="M20 3 L36 12 L36 28 L20 37 L4 28 L4 12 Z" stroke="#d4af37" stroke-width="1.4" fill="rgba(212,175,55,0.06)"/>
        <path d="M14 24 L20 14 L26 24" stroke="#f1d77a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="leading-tight">
        <div class="font-serif-cn text-[18px] tracking-wider brand-wordmark font-bold">启明资本</div>
        <div class="text-[10px] text-dim tracking-[3px] uppercase">QIMING · VC PLATFORM</div>
      </div>
    </a>
    <nav class="hidden md:flex items-center gap-1">
      <a href="/"            class="nav-link" data-page="home">首页</a>
      <a href="/roadshow.html" class="nav-link" data-page="roadshow">路演</a>
      <a href="/upload.html"   class="nav-link" data-page="upload">BP上传</a>
      <a href="/analysis.html" class="nav-link" data-page="analysis">AI分析</a>
      <a href="/workshop.html" class="nav-link" data-page="workshop">投研工坊</a>
    </nav>
    <div id="nav-auth"></div>
  </div>
</header>

<div class="max-w-[1280px] mx-auto px-6 pt-10 pb-20">

  <!-- 顶部用户信息卡 -->
  <div class="glass p-8 corner-deco mb-8 flex flex-col md:flex-row items-start md:items-center gap-6">
    <div id="user-avatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-700 flex items-center justify-center text-2xl font-bold text-black flex-shrink-0">U</div>
    <div class="flex-1">
      <div class="flex items-center gap-3 flex-wrap">
        <h1 id="user-name" class="font-serif-cn text-2xl font-bold">加载中...</h1>
        <span id="user-role-badge" class="chip chip-gold"></span>
      </div>
      <div id="user-info" class="text-mute text-sm mt-1"></div>
    </div>
    <div class="flex gap-3">
      <a href="/upload.html" class="btn btn-gold">上传 BP →</a>
      <a href="/analysis.html" class="btn btn-ghost">AI 分析</a>
    </div>
  </div>

  <!-- KPI 卡片 -->
  <div class="grid grid-cols-3 gap-5 mb-8">
    <div class="glass p-6 text-center">
      <div class="text-dim text-xs mb-2">关注项目</div>
      <div class="stat-num text-3xl" id="stat-follows">0</div>
      <div class="text-xs text-mute mt-1">个项目</div>
    </div>
    <div class="glass p-6 text-center">
      <div class="text-dim text-xs mb-2">AI 报告</div>
      <div class="stat-num text-3xl" id="stat-reports">0</div>
      <div class="text-xs text-mute mt-1">份报告</div>
    </div>
    <div class="glass p-6 text-center">
      <div class="text-dim text-xs mb-2">BP 上传</div>
      <div class="stat-num text-3xl" id="stat-bps">0</div>
      <div class="text-xs text-mute mt-1">个文件</div>
    </div>
  </div>

  <div class="grid lg:grid-cols-12 gap-6">

    <!-- 左侧 sidebar -->
    <div class="lg:col-span-3">
      <div class="glass p-4 space-y-1">
        <button onclick="showTab('overview')" class="dash-nav-btn active w-full text-left px-4 py-2.5 rounded-lg text-sm" id="nav-overview">概览</button>
        <button onclick="showTab('follows')"  class="dash-nav-btn w-full text-left px-4 py-2.5 rounded-lg text-sm" id="nav-follows">关注的项目</button>
        <button onclick="showTab('reports')"  class="dash-nav-btn w-full text-left px-4 py-2.5 rounded-lg text-sm" id="nav-reports">AI 报告</button>
        <button onclick="showTab('bps')"      class="dash-nav-btn w-full text-left px-4 py-2.5 rounded-lg text-sm" id="nav-bps">我的 BP</button>
        <button onclick="showTab('profile')"  class="dash-nav-btn w-full text-left px-4 py-2.5 rounded-lg text-sm" id="nav-profile">账号设置</button>
        <div class="border-t border-white/5 mt-2 pt-2">
          <button onclick="VCPlat.logout()" class="w-full text-left px-4 py-2.5 rounded-lg text-sm text-dim hover:text-red-400 transition">退出登录</button>
        </div>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="lg:col-span-9">

      <!-- 概览 -->
      <div id="tab-overview" class="dash-tab space-y-5">
        <h2 class="font-serif-cn text-xl font-bold">最近动态</h2>

        <div class="glass p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm">最近关注的项目</h3>
            <button onclick="showTab('follows')" class="text-xs text-gold-2 hover:underline">查看全部</button>
          </div>
          <div id="recent-follows-list" class="space-y-3">
            <div class="text-dim text-sm">暂无关注项目</div>
          </div>
        </div>

        <div class="glass p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm">最近 AI 报告</h3>
            <button onclick="showTab('reports')" class="text-xs text-gold-2 hover:underline">查看全部</button>
          </div>
          <div id="recent-reports-list" class="space-y-3">
            <div class="text-dim text-sm">暂无 AI 报告</div>
          </div>
        </div>
      </div>

      <!-- 关注项目 -->
      <div id="tab-follows" class="dash-tab hidden">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-serif-cn text-xl font-bold">关注的项目</h2>
          <a href="/roadshow.html" class="btn btn-ghost text-sm">发现更多项目 →</a>
        </div>
        <div id="follows-list" class="space-y-4">
          <div class="text-dim text-sm">加载中...</div>
        </div>
      </div>

      <!-- AI 报告 -->
      <div id="tab-reports" class="dash-tab hidden">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-serif-cn text-xl font-bold">AI 分析报告</h2>
          <a href="/analysis.html" class="btn btn-gold text-sm">生成新报告 →</a>
        </div>
        <div id="reports-list" class="space-y-3">
          <div class="text-dim text-sm">加载中...</div>
        </div>
      </div>

      <!-- 我的 BP -->
      <div id="tab-bps" class="dash-tab hidden">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-serif-cn text-xl font-bold">我的 BP 文件</h2>
          <a href="/upload.html" class="btn btn-gold text-sm">上传新 BP →</a>
        </div>
        <div id="bps-list" class="space-y-3">
          <div class="text-dim text-sm">加载中...</div>
        </div>
      </div>

      <!-- 账号设置 -->
      <div id="tab-profile" class="dash-tab hidden">
        <h2 class="font-serif-cn text-xl font-bold mb-5">账号设置</h2>
        <div class="glass p-7 space-y-5">
          <div class="grid grid-cols-2 gap-5">
            <div>
              <label class="label">姓名</label>
              <input id="p-name" class="input" placeholder="您的姓名" />
            </div>
            <div>
              <label class="label">手机号</label>
              <input id="p-phone" class="input" placeholder="手机号" />
            </div>
          </div>
          <div>
            <label class="label">所在机构</label>
            <input id="p-org" class="input" placeholder="公司/机构名称" />
          </div>
          <div>
            <label class="label">邮箱（不可修改）</label>
            <input id="p-email" class="input" disabled style="opacity:.5" />
          </div>
          <button onclick="saveProfile()" class="btn btn-gold">保存修改</button>
        </div>

        <div class="glass p-7 mt-5 space-y-4">
          <h3 class="font-bold text-sm">修改密码</h3>
          <input type="password" id="old-pass" class="input" placeholder="当前密码" />
          <input type="password" id="new-pass" class="input" placeholder="新密码（8位以上）" />
          <button onclick="changePassword()" class="btn btn-ghost">更新密码</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/api.js"></script>
<script>
// 必须登录
document.addEventListener("DOMContentLoaded", async function() {
  if (!VCPlat.isLoggedIn()) { location.href = "/auth.html?redirect=/dashboard.html"; return; }

  // 加载用户信息
  try {
    const { user } = await VCPlat.api("/api/auth/me");
    VCPlat.setUser(user);
    document.getElementById("user-avatar").textContent = user.avatar_letter || user.name[0];
    document.getElementById("user-name").textContent = user.name;
    const roleLabel = { admin:"管理员", investor:"投资人", entrepreneur:"创业者" }[user.role] || user.role;
    document.getElementById("user-role-badge").textContent = "已认证 · " + roleLabel;
    document.getElementById("user-info").textContent = (user.organization||"") + (user.email ? " · " + user.email : "");
    // 填充表单
    document.getElementById("p-name").value = user.name || "";
    document.getElementById("p-phone").value = user.phone || "";
    document.getElementById("p-org").value = user.organization || "";
    document.getElementById("p-email").value = user.email || "";
  } catch(e) {}

  // 加载概览数据
  loadDashboard();
});

async function loadDashboard() {
  try {
    const data = await VCPlat.api("/api/users/dashboard");
    document.getElementById("stat-follows").textContent = data.stats.followCount;
    document.getElementById("stat-reports").textContent = data.stats.reportCount;
    document.getElementById("stat-bps").textContent = data.stats.bpCount;

    // 最近关注
    const fl = document.getElementById("recent-follows-list");
    if (data.recentFollows.length) {
      fl.innerHTML = data.recentFollows.map(f =>
        `<div class="hairline rounded-xl p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg glass flex items-center justify-center font-serif-cn font-bold text-gold-2">${f.code_letter||f.name[0]}</div>
            <div><div class="font-bold text-sm">${f.name}</div><div class="text-xs text-dim">${f.sector} · ${f.round||""}</div></div>
          </div>
          <div class="flex items-center gap-3">
            <span class="font-mono text-xs text-gold-2">${f.ai_score||"--"} 分</span>
            <button onclick="unfollow(${f.project_id}, this)" class="text-xs text-dim hover:text-red-400">取消关注</button>
          </div>
        </div>`
      ).join("");
    } else {
      fl.innerHTML = '<div class="text-dim text-sm py-4 text-center">暂无关注项目，<a href="/roadshow.html" class="text-gold-2">去发现项目</a></div>';
    }

    // 最近报告
    const rl = document.getElementById("recent-reports-list");
    if (data.recentReports.length) {
      rl.innerHTML = data.recentReports.map(r =>
        `<div class="hairline rounded-xl p-4 flex items-center justify-between cursor-pointer hover:border-yellow-500/40 transition" onclick="viewReport(${r.id})">
          <div>
            <div class="font-bold text-sm">${r.title||"AI 分析报告"}</div>
            <div class="text-xs text-dim mt-1">${r.project_name||""}${r.project_name?" · ":""}${formatDate(r.created_at)}</div>
          </div>
          <span class="chip text-xs">${r.skill_key||r.report_type}</span>
        </div>`
      ).join("");
    } else {
      rl.innerHTML = '<div class="text-dim text-sm py-4 text-center">暂无报告，<a href="/analysis.html" class="text-gold-2">去生成分析</a></div>';
    }
  } catch(e) { console.warn(e.message); }
}

async function loadFollows() {
  const list = document.getElementById("follows-list");
  try {
    const { follows } = await VCPlat.api("/api/follows");
    if (!follows.length) {
      list.innerHTML = '<div class="text-dim text-sm py-8 text-center">暂无关注项目</div>'; return;
    }
    list.innerHTML = follows.map(f =>
      `<div class="glass p-5 flex items-center justify-between hover:border-yellow-500/40 transition">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-lg glass flex items-center justify-center font-serif-cn font-bold text-gold-2 text-lg">${f.code_letter||f.name[0]}</div>
          <div>
            <div class="font-serif-cn font-bold text-[15px]">${f.name}</div>
            <div class="text-xs text-dim">${f.sector} · ${f.round||""} · ${f.location||""}</div>
            <div class="text-xs text-gold-2 font-mono mt-1">${f.amount||""}</div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-mute font-mono">AI ${f.ai_score||"--"}</span>
          <button onclick="unfollow(${f.project_id}, this)" class="btn btn-ghost text-xs py-1 px-3">取消关注</button>
        </div>
      </div>`
    ).join("");
  } catch(e) { list.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function loadReports() {
  const list = document.getElementById("reports-list");
  try {
    const { reports } = await VCPlat.api("/api/reports");
    if (!reports.length) {
      list.innerHTML = '<div class="text-dim text-sm py-8 text-center">暂无分析报告</div>'; return;
    }
    list.innerHTML = reports.map(r =>
      `<div class="glass p-5 cursor-pointer hover:border-yellow-500/40 transition" onclick="viewReport(${r.id})">
        <div class="flex items-center justify-between">
          <div class="font-bold text-sm">${r.title||"AI 分析报告"}</div>
          <div class="flex items-center gap-2">
            <span class="chip text-xs">${r.skill_key||r.report_type}</span>
            <button onclick="event.stopPropagation();deleteReport(${r.id},this)" class="text-xs text-dim hover:text-red-400">删除</button>
          </div>
        </div>
        <div class="text-xs text-dim mt-2">${r.bp_filename||r.project_name||""} ${(r.bp_filename||r.project_name)?"·":""} ${formatDate(r.created_at)} · ${r.model_used||"AI"}</div>
      </div>`
    ).join("");
  } catch(e) { list.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function loadBPs() {
  const list = document.getElementById("bps-list");
  try {
    const { uploads } = await VCPlat.api("/api/bp/list");
    if (!uploads.length) {
      list.innerHTML = '<div class="text-dim text-sm py-8 text-center">暂无上传记录</div>'; return;
    }
    list.innerHTML = uploads.map(u =>
      `<div class="glass p-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 glass rounded-lg flex items-center justify-center text-xs font-mono text-gold-2">${(u.file_type||"").split('/').pop().toUpperCase().slice(0,3)||"BP"}</div>
          <div>
            <div class="font-bold text-sm">${u.original_filename}</div>
            <div class="text-xs text-dim mt-0.5">${formatFileSize(u.file_size)} · ${formatDate(u.created_at)}</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="chip text-xs ${u.parse_status==='done'?'chip-green':''}">${{pending:'待解析',extracted:'待解析',parsing:'解析中',done:'已完成'}[u.parse_status]||u.parse_status}</span>
          ${u.parse_status==='done'||u.parse_status==='extracted' ? `<a href="/analysis.html?bpId=${u.id}${u.report_id?'&view=report':'&action=analyze'}" class="btn ${u.report_id?'btn-ghost':'btn-gold'} text-xs py-1 px-3">${u.report_id?'查看报告':'AI 分析'}</a>` : ''}
          <button onclick="deleteBP(${u.id},'${u.original_filename.replace(/'/g,"\\'")}')" class="text-xs text-dim hover:text-red-400 px-2">&#10005;</button>
        </div>
      </div>`
    ).join("");
  } catch(e) { list.innerHTML = `<div class="text-red-400 text-sm">${e.message}</div>`; }
}

async function unfollow(projectId, btn) {
  if (!confirm("确认取消关注？")) return;
  try {
    await VCPlat.api(`/api/follows/${projectId}`, { method: "DELETE" });
    btn.closest("[class*='glass']").remove();
    loadDashboard();
  } catch(e) { alert(e.message); }
}

async function viewReport(id) {
  try {
    const { report } = await VCPlat.api(`/api/reports/${id}`);
    const modal = document.createElement("div");
    modal.className = "fixed inset-0 z-50 flex items-center justify-center p-4";
    modal.style.background = "rgba(0,0,0,0.8)";
    modal.innerHTML = `<div class="glass max-w-3xl w-full max-h-[80vh] overflow-y-auto p-8 rounded-2xl relative">
      <button onclick="this.closest('.fixed').remove()" class="absolute top-4 right-4 text-dim hover:text-white text-xl">✕</button>
      <h3 class="font-serif-cn text-xl font-bold mb-2">${report.title||"AI 分析报告"}</h3>
      <div class="text-xs text-dim mb-6">${report.project_name||""} · ${formatDate(report.created_at)}</div>
      <div class="prose-vc text-sm leading-7">${VCPlat.mdToHtml(report.content||"内容为空")}</div>
    </div>`;
    document.body.appendChild(modal);
  } catch(e) { alert(e.message); }
}

async function deleteReport(id, btn) {
  if (!confirm("确认删除此报告？")) return;
  try {
    await VCPlat.api(`/api/reports/${id}`, { method: "DELETE" });
    btn.closest("[class*='glass']").remove();
  } catch(e) { alert(e.message); }
}

async function deleteBP(bpId, name) {
  if (!confirm(`确认删除「${name}」？\n\n关联的 AI 分析报告也将一并删除，且不可恢复。`)) return;
  try {
    await VCPlat.api(`/api/bp/${bpId}`, { method: "DELETE" });
    loadBPs();
  } catch(e) { alert("删除失败：" + e.message); }
}

async function saveProfile() {
  const name = document.getElementById("p-name").value.trim();
  const phone = document.getElementById("p-phone").value.trim();
  const org = document.getElementById("p-org").value.trim();
  try {
    const { user } = await VCPlat.api("/api/auth/profile", {
      method: "PUT", body: { name, phone, organization: org }
    });
    VCPlat.setUser(user);
    document.getElementById("user-name").textContent = user.name;
    alert("保存成功");
  } catch(e) { alert(e.message); }
}

async function changePassword() {
  const oldPass = document.getElementById("old-pass").value;
  const newPass = document.getElementById("new-pass").value;
  if (!oldPass || !newPass) { alert("请填写密码"); return; }
  try {
    await VCPlat.api("/api/auth/change-password", {
      method: "POST", body: { oldPassword: oldPass, newPassword: newPass }
    });
    alert("密码修改成功");
    document.getElementById("old-pass").value = "";
    document.getElementById("new-pass").value = "";
  } catch(e) { alert(e.message); }
}

// Tab 切换
function showTab(name) {
  document.querySelectorAll(".dash-tab").forEach(t => t.classList.add("hidden"));
  document.querySelectorAll(".dash-nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name)?.classList.remove("hidden");
  document.getElementById("nav-" + name)?.classList.add("active");
  if (name === "follows") loadFollows();
  if (name === "reports") loadReports();
  if (name === "bps")     loadBPs();
}

// 工具函数
function formatDate(s) {
  if (!s) return "";
  return new Date(s).toLocaleDateString("zh-CN", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
}
function formatFileSize(bytes) {
  if (!bytes) return "0B";
  const k = 1024;
  if (bytes < k) return bytes + "B";
  if (bytes < k*k) return (bytes/k).toFixed(1) + "KB";
  return (bytes/k/k).toFixed(1) + "MB";
}
</script>

<style>
.dash-nav-btn { color: var(--text-2); transition: all .15s; }
.dash-nav-btn:hover { background: rgba(255,255,255,.04); color: var(--text-1); }
.dash-nav-btn.active { background: rgba(212,175,55,.1); color: var(--gold-1); border-left: 2px solid var(--gold-1); }
.prose-vc h1,.prose-vc h2,.prose-vc h3 { color: var(--gold-1); margin: 1.2em 0 .5em; }
.prose-vc table { width:100%; border-collapse:collapse; margin:1em 0; }
.prose-vc th,.prose-vc td { padding:.5em .75em; border:1px solid var(--line); font-size:.85em; }
.prose-vc th { background:rgba(212,175,55,.08); }
.prose-vc code { background:rgba(255,255,255,.05); padding:.2em .4em; border-radius:.25em; font-size:.85em; }
.chip-green { background: rgba(16,185,129,.12); color: #6ee7b7; border-color: rgba(16,185,129,.3); }
</style>

</body>
</html>
